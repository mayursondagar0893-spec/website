{id:297,cat:'doc',diff:'easy',tags:'Power of Attorney,GPA,Tax Proceedings',title:'Power of Attorney – Tax Proceedings',prompt:'Draft a General Power of Attorney authorizing a CA/advocate to represent a client before Income Tax authorities. Include: specific powers granted (appearing before AO/CIT(A)/ITAT, signing documents, receiving notices, filing applications, accepting/rejecting refunds), geographic scope, duration, revocation clause, and stamp paper requirements (state-specific). Also include a limited POA version for a specific case.'},
{id:298,cat:'doc',diff:'adv',tags:'MOU,Joint Venture,Agreement',title:'Memorandum of Understanding – Joint Venture',prompt:'Draft an MOU for a joint venture between two companies for setting up a manufacturing facility. Cover: purpose and scope of JV, capital contribution (60:40), governance structure (board composition, decision-making threshold), IP contribution and usage rights, profit/loss sharing, exit provisions (put/call options), confidentiality, and indicative timeline for definitive agreements.'},
{id:299,cat:'doc',diff:'easy',tags:'DPDP,Data Protection,Privacy Policy',title:'Client Data Protection Policy for CA Firm',prompt:'Draft a Client Data Protection Policy for a CA firm under India\'s Digital Personal Data Protection (DPDP) Act 2023. Cover: types of personal data collected (PAN, Aadhaar, financial data), purpose of collection, storage and security measures, data sharing with third parties (IT portal, GST portal, banks), retention period, client consent mechanism, and data subject rights (correction, erasure request process).'},

// ═══ PRACTICE MANAGEMENT – BATCH 3 ═══
{id:300,cat:'pm',diff:'med',tags:'Firm Branding,Logo,Identity,ICAI',title:'CA Firm Brand Identity Development',prompt:'Guide a CA firm on developing a professional brand identity. Cover: firm name selection (compliance with ICAI naming guidelines), logo design brief (professional, trustworthy, Indian context), tagline crafting, color palette selection, stationery design (letterhead, visiting card, envelope), digital assets (LinkedIn banner, WhatsApp DP, website header), and brand voice guidelines for all client communications.'},
{id:301,cat:'pm',diff:'med',tags:'Proposal,Pitch,New Client,Presentation',title:'New Client Proposal Template',prompt:'Create a professional proposal template for a CA firm to submit to prospective clients. Sections: Executive Summary (who we are, why we are right for you), Understanding of Your Needs (show you\'ve researched the client), Proposed Scope of Services (detailed), Our Team (relevant experience), Methodology (how we work), Fees (tiered options), References (2-3 client names with permission), and Acceptance Terms.'},
{id:302,cat:'pm',diff:'adv',tags:'KYC,AML,PMLA,CA Firm Compliance',title:'KYC & AML Compliance for CA Firm',prompt:'Design a KYC and Anti-Money Laundering compliance framework for a CA firm. Cover: ICAI guidelines on KYC for CAs, suspicious transaction reporting obligations under PMLA, beneficial ownership verification, client risk categorization (low/medium/high), Enhanced Due Diligence (EDD) for high-risk clients, record maintenance requirements, and staff awareness training program.'},
{id:303,cat:'pm',diff:'easy',tags:'Delegation,Task Management,Productivity',title:'Task Delegation Matrix for CA Firm',prompt:'Design a task delegation matrix for a CA firm with: 1 partner, 2 senior CAs, 3 article assistants, and 1 admin staff. Map each type of work (income tax litigation, GST compliance, payroll, bookkeeping, ROC filings, client calls, billing) to the appropriate person. Include: complexity level, supervision requirement, quality check process, and estimated time per task for billing rate calculation.'},
{id:304,cat:'pm',diff:'med',tags:'Business Continuity,BCP,Disaster Recovery',title:'CA Firm Business Continuity Plan',prompt:'Create a Business Continuity Plan (BCP) for a CA firm. Cover: client data backup (cloud + local), access controls if partner is unavailable, critical filing deadlines calendar (who is backup for each client type), client communication in case of emergency, key-person dependency mitigation (cross-training), vendor/IT recovery plan, and a one-page BCP summary card for all staff.'},

// ═══ VALUATION – BATCH 2 ═══
{id:305,cat:'val',diff:'adv',tags:'Goodwill,Impairment,Ind AS 36',title:'Goodwill Impairment Testing – Ind AS 36',prompt:'Perform goodwill impairment testing for a cash-generating unit (CGU) under Ind AS 36. CGU carrying value ₹20 crore including goodwill ₹5 crore. Recoverable amount: value in use (DCF with 5-year projections + terminal value) and fair value less costs of disposal. Determine if impairment exists, compute the impairment charge, and draft disclosure note for annual report.'},
{id:306,cat:'val',diff:'med',tags:'Registered Valuer,IBBI,Certification',title:'IBBI Registered Valuer – Requirements',prompt:'Explain requirements for becoming a Registered Valuer under IBBI Registered Valuers and Valuation Rules 2017. Cover: eligibility criteria (CA/engineer/MBA), qualification exam, registration with Registered Valuer Organisation (RVO), annual fee, continuing education requirements, professional misconduct provisions, and types of asset classes (Securities & Financial Assets, Plant & Machinery, Land & Building).'},

// ═══ SECTOR-SPECIFIC – BATCH 2 ═══
{id:307,cat:'sector',diff:'med',tags:'Hospitality,Hotels,GST,Tax',title:'Hospitality Sector – GST & Tax Advisory',prompt:'Advise a hotel chain on tax and GST compliance. Cover: GST on room tariff (12% for ≤₹7,500, 18% for >₹7,500), GST on restaurant (5% without ITC, 18% for star hotel restaurants), GST on banquet/conference halls, income tax deduction for hotels in SEZ, transfer pricing for management fee charged by foreign parent, and TDS on room booking commission to OTA platforms.'},
{id:308,cat:'sector',diff:'med',tags:'Media,Entertainment,OTT,Digital Content',title:'Media & Entertainment – Tax & GST',prompt:'Analyze tax and GST issues for a media company. Cover: GST on OTT subscription (18%), GST on royalties paid to artists (applicable TDS rate under S.194H/194J), income tax on celebrity income (S.44ADA or business income), copyright income vs. royalty distinction, TDS on payment to foreign streaming platforms, withholding tax on content licensing to foreign entities, and digital advertising GST implications.'},
{id:309,cat:'sector',diff:'med',tags:'Retail,E-Commerce,TCS,GST',title:'E-Commerce Operator – Tax Compliance',prompt:'Advise an e-commerce operator (marketplace model) on tax compliance. Cover: TCS under S.206C(1H) and GST TCS (S.52 CGST Act – 1% net of returns), GSTR-8 filing by e-commerce operator, distinction between marketplace vs. inventory model GST implications, payment aggregator TDS obligations, seller onboarding KYC requirements, and state-wise GST registration implications for nationwide operations.'},
{id:310,cat:'sector',diff:'adv',tags:'Power Sector,Infrastructure,S.80IA',title:'Power Sector – Tax Benefits & Compliance',prompt:'Advise a power generation company on tax and regulatory compliance. Cover: S.80IA deduction for eligible power undertakings (10 consecutive years from 15), accelerated depreciation (40% for windmills, 80% for energy saving devices under S.32), renewable energy certificate income, CDM credits, GST on transmission and distribution of electricity (exempt vs. taxable components), and RERC/CERC tariff order accounting implications.'},

// ═══ LITIGATION – BATCH 2 ═══
{id:311,cat:'litigation',diff:'adv',tags:'Stay,Demand,Application,CIT',title:'Stay of Demand Application Before AO/CIT',prompt:'Draft a stay of demand application during pendency of appeal before CIT(A)/ITAT. Cover: legal provisions (S.220(6), Rule 35A, Instruction No.96/2016), grounds for stay (prima facie case, financial hardship, balance of convenience, irreparable injury), deposit of 20% of disputed demand requirement, and format of application with supporting annexures for financial hardship.'},
{id:312,cat:'litigation',diff:'adv',tags:'High Court,Writ,Jurisdiction,Tax',title:'High Court Writ – Tax Matter Advisory',prompt:'Advise when to file a writ petition before High Court in a tax matter. Cover: S.226(3) garnishee notice challenge, cases where no adequate alternative remedy exists (jurisdictional error, CBDT circular challenge), urgency situations (bank account attachment), format of writ petition, prayer for interim stay, cost-benefit analysis of writ vs. appeal route, and risk management.'},
{id:313,cat:'litigation',diff:'adv',tags:'Survey,S.133A,Statement,Rights',title:'Survey Under S.133A – Rights & Strategy',prompt:'Advise a client whose business premises are under survey under S.133A. Cover: scope of survey (vs. search), books/documents that can be impounded (not removed), statement under S.131 during survey (voluntary vs. compelled), retraction of statement within 24-48 hours strategy, what to surrender vs. contest, how to compute undisclosed income offer, and post-survey assessment process.'},
{id:314,cat:'litigation',diff:'adv',tags:'Equalisation Levy,Digital Tax,Foreign Platform',title:'Equalisation Levy – Compliance Guide',prompt:'Advise a foreign digital advertising platform and its Indian advertisers on Equalisation Levy (EL) compliance. Cover: 6% EL on digital advertising services (Form 1 by Indian payer), annual return (Form 2), challan payment details, DTAA credit in home country for EL paid, penalties for default (S.166B), and advisory for Indian companies paying for digital advertising to foreign platforms.'},
{id:315,cat:'litigation',diff:'adv',tags:'Customs,Appeal,CESTAT,Classification',title:'CESTAT Appeal – Customs Classification Dispute',prompt:'Prepare a CESTAT appeal for a customs classification dispute. Imported goods classified under CTH [X] by customs, importer claims CTH [Y] at lower rate. Include: grounds of appeal, Notes to Section/Chapter analysis, HSN Explanatory Notes supporting importer\'s classification, binding CESTAT precedents, SC/HC rulings, and relief sought (refund of excess duty paid with interest).'},

// ═══ IND AS – BATCH 2 ═══
{id:316,cat:'indas',diff:'adv',tags:'Ind AS 107,Financial Risk,Disclosure',title:'Financial Risk Disclosures – Ind AS 107',prompt:'Prepare financial risk management disclosures under Ind AS 107 for a manufacturing company with: ₹15 crore trade receivables, ₹8 crore foreign currency payables, ₹20 crore floating rate debt. Cover: credit risk (concentration analysis, ECL policy), liquidity risk (maturity analysis of liabilities), market risk (currency sensitivity analysis, interest rate risk), and hedge accounting disclosures.'},
{id:317,cat:'indas',diff:'adv',tags:'Ind AS 37,Provisions,Contingencies',title:'Provisions & Contingencies – Ind AS 37',prompt:'Apply Ind AS 37 to: (1) product warranty obligation, (2) environmental restoration obligation for mining company, (3) pending litigation – probable loss, (4) restructuring provision – management announced restructuring, (5) onerous contract – contract now unprofitable due to raw material price increase. For each: whether to recognize provision, how to measure it, and draft disclosure note.'},
{id:318,cat:'indas',diff:'adv',tags:'Ind AS 32,Financial Instruments,Classification',title:'Financial Instruments – Ind AS 32 Classification',prompt:'Classify the following instruments as equity or financial liability under Ind AS 32: (1) compulsorily convertible preference shares (CCPS), (2) optionally convertible debentures (OCD), (3) redeemable preference shares with fixed dividend, (4) shares with put option for holder, (5) perpetual debt. For each: basis of classification, balance sheet impact, and tax treatment of distribution.'},
{id:319,cat:'indas',diff:'adv',tags:'Ind AS 12,Deferred Tax,Temporary Difference',title:'Deferred Tax – Ind AS 12 Comprehensive',prompt:'Compute deferred tax for a manufacturing company with temporary differences: (1) Ind AS 116 lease (ROU asset vs. lease liability), (2) Ind AS 36 impairment loss not deductible until written off, (3) accelerated depreciation in tax books vs. SLM in accounts, (4) warranty provision (allowed only on actual payment under S.43B), (5) ECL provision on trade receivables. Prepare deferred tax computation and journal entries.'},
{id:320,cat:'indas',diff:'med',tags:'EPS,Ind AS 33,Diluted,Basic',title:'Earnings Per Share – Ind AS 33',prompt:'Compute basic and diluted EPS under Ind AS 33. PAT ₹8 crore, preference dividend ₹50 lakh, weighted average equity shares 1 crore. Dilutive instruments: 20 lakh convertible debentures (each convertible to 2 equity shares, interest saved ₹40 lakh net of tax). Compute: basic EPS, dilutive effect of convertible debentures, diluted EPS, and anti-dilutive instrument test.'},

// ═══ ESG – BATCH 2 ═══
{id:321,cat:'esg',diff:'med',tags:'Green Bond,Sustainable Finance,SEBI',title:'Green Bond Framework – SEBI Guidelines',prompt:'Guide a company on issuing a Green Bond under SEBI guidelines. Cover: eligible green projects (renewable energy, energy efficiency, sustainable water, sustainable land use), use of proceeds documentation, green bond framework preparation, second-party opinion requirement, SEBI registration, periodic impact reporting (annual report), and green bond premium (greenium) possibility vs. regular bond.'},
{id:322,cat:'esg',diff:'easy',tags:'CSR,Impact Report,Schedule VII',title:'CSR Impact Report Drafting',prompt:'Draft a CSR impact report for a company that spent ₹1.2 crore on three CSR projects: (1) school sanitation improvement, (2) skill development for rural youth, (3) clean drinking water access. For each project: target beneficiaries, amount spent, specific outcomes achieved, third-party assessment summary, photographs reference, and alignment with SDGs. Suitable for Annual Report inclusion.'},
{id:323,cat:'esg',diff:'med',tags:'Carbon Footprint,Scope 1,Scope 2,Scope 3',title:'Carbon Footprint Calculation Guide',prompt:'Guide a manufacturing company in computing its carbon footprint for ESG reporting. Cover: Scope 1 (direct emissions – fuel combustion, company vehicles), Scope 2 (indirect – purchased electricity), Scope 3 (value chain – supply chain, employee commuting, product use phase), emission factor sources (IPCC, GHG Protocol), base year selection, target setting (Science Based Targets), and disclosure in BRSR.'},

// ═══ DIGITAL & TECH – BATCH 2 ═══
{id:324,cat:'digital',diff:'med',tags:'Tally,TDL,Custom Reports',title:'Tally Prime Custom Reports via TDL',prompt:'Guide through customizing Tally Prime reports using TDL (Tally Definition Language). Cover: identifying report to customize (e.g., Party Ledger with GST details, Vendor Aging with MSME flag), basic TDL structure (Object, Collection, Field, Part, Report), adding a custom column to an existing report, creating a new menu option, and testing the TDL definition. Provide a ready-to-use TDL snippet for a client-specific GST report.'},
{id:325,cat:'digital',diff:'med',tags:'Power BI,Financial Dashboard,Data Visualization',title:'Power BI Dashboard for CA Practice',prompt:'Design a Power BI dashboard for a CA firm to monitor practice health. Data sources: billing software, compliance tracker Excel. Visuals: revenue by service line (bar chart), client concentration (Pareto chart), due date compliance rate (gauge), billing vs. collection waterfall, staff utilization heat map, new vs. lost clients trend (line chart). Cover: data model setup, DAX measures, and automated refresh.'},
{id:326,cat:'digital',diff:'easy',tags:'ChatGPT,Prompt Engineering,Research',title:'Effective Prompt Engineering for Tax Research',prompt:'Create a guide on effective prompt engineering for using Claude/ChatGPT for income tax and GST research. Cover: role-playing prompts (act as a tax expert), chain-of-thought prompting (step-by-step reasoning), providing context (jurisdiction, assessee type, facts), asking for case law citations, iterative refinement, verification of AI responses against original sources, and hallucination risk mitigation. Include 10 example prompts.'},
{id:327,cat:'digital',diff:'med',tags:'Cyber Security,Data Protection,CA Firm',title:'Cybersecurity for CA Firm – Practical Guide',prompt:'Develop a cybersecurity guide for a CA firm handling sensitive client financial data. Cover: essential measures (two-factor authentication on all portals, encrypted file sharing – avoid unsecured WhatsApp for sensitive docs), password manager usage, phishing email recognition, ransomware prevention, secure cloud storage (Google Workspace Business vs. Microsoft 365), data backup frequency, and response plan if a data breach occurs.'},
{id:328,cat:'digital',diff:'adv',tags:'RPA,Power Automate,Tax Automation',title:'RPA for GST Return Filing – Power Automate',prompt:'Design an RPA workflow using Power Automate for automating monthly GST return filing. Cover: data extraction from accounting software (Tally/Zoho API), reconciliation of GSTR-2B vs. purchase register (automated matching), auto-population of GSTR-3B fields, payment computation, portal login automation using browser actions, filing confirmation, and error alert mechanism with email notification to partner.'},

// ═══ CUSTOMS – BATCH 2 ═══
{id:329,cat:'customs',diff:'med',tags:'Customs Valuation,Transaction Value,Related Party',title:'Customs Valuation – Transaction Value Method',prompt:'Explain customs valuation under the Customs Valuation Rules 2007. Cover: transaction value method (Rule 3) – CIF basis, what is included (assists, royalties, licenses), deduction of post-importation charges, when transaction value is rejected (related party transactions), fallback methods in sequence (Rules 4-9), and documentation to support transaction value in related party imports.'},
{id:330,cat:'customs',diff:'med',tags:'Duty Drawback,Refund,Export',title:'Customs Duty Drawback Claim',prompt:'Guide an exporter through claiming Customs Duty Drawback on exported goods. Cover: All Industry Rates (AIR) drawback vs. Brand Rate fixation (for specific inputs), online claim filing through ICES system, timelines (3 months from export date), reasons for rejection (SB not let export, ECGC claim paid), and duty drawback vs. refund of IGST on exports – which to opt for.'},

// ═══ INTERNATIONAL TAX – BATCH 2 ═══
{id:331,cat:'intax',diff:'adv',tags:'Thin Capitalization,Interest Limitation,S.94B',title:'Thin Capitalization – S.94B Interest Limitation',prompt:'Analyze S.94B for an Indian company with: borrowing ₹200 crore from foreign AE parent, interest ₹20 crore, EBITDA ₹30 crore. Compute: excess interest (interest > 30% of EBITDA), deductible and non-deductible portion, carry-forward of excess interest (8 years), exceptions (banking/insurance, interest ≤₹1 crore), and interaction with transfer pricing provisions.'},
{id:332,cat:'intax',diff:'adv',tags:'MLI,Multilateral Instrument,DTAA,BEPS',title:'MLI Impact on India\'s Tax Treaties',prompt:'Explain how the Multilateral Instrument (MLI) under BEPS Action 15 modifies India\'s bilateral tax treaties. Cover: India\'s MLI positions (covered tax agreements, reservations), impact on India-Singapore DTAA (PPT clause added), minimum standards (treaty abuse prevention, dispute resolution improvements), grandfathering provisions, and practical impact on investments structured through treaty jurisdictions.'},
{id:333,cat:'intax',diff:'med',tags:'Royalty,FTS,S.9,Source Rule,DTAA',title:'Royalty & Fee for Technical Services – S.9',prompt:'Analyze Indian source rules for Royalty and Fee for Technical Services (FTS) under S.9(1)(vi) and (vii). Cover: definition of royalty (including software payments debate), FTS definition (make available clause in some DTAAs), treaty override where DTAA rate is lower, beneficial ownership requirement for treaty benefit, domestic law rate vs. DTAA rate comparison for top 10 India bilateral treaties.'},

// ═══ MORE GENERAL PROMPTS ═══
{id:334,cat:'it',diff:'easy',tags:'Salary,Standard Deduction,Chapter VIA',title:'Salary Income Tax Computation – Step by Step',prompt:'Compute income tax for a salaried employee for FY [year]. Gross salary ₹15 lakh (basic ₹8 lakh, HRA ₹3.5 lakh, LTA ₹50,000, special allowance ₹3 lakh). Employee lives in rented accommodation (rent ₹20,000/month). Investments: PPF ₹1.5 lakh, health insurance ₹25,000. Compute: HRA exemption, standard deduction, Chapter VI-A deductions, tax under new regime vs. old regime.'},
{id:335,cat:'gst',diff:'easy',tags:'GST,New Business,First Return,Basics',title:'GST Basics for New Business – First 6 Months',prompt:'Create a GST compliance guide for a new business owner who just got GST registration. Cover: what is GSTR-1 (outward supplies), what is GSTR-3B (summary return and payment), GSTR-2B (auto-populated ITC), ITC matching concept, e-way bill basics, GST invoice requirements (mandatory fields), tax payment due date, and the 5 most common mistakes made by new GST registrants.'},
{id:336,cat:'audit',diff:'easy',tags:'Bookkeeping,Accounting,Tally,Basics',title:'Bookkeeping Standards for Small Business',prompt:'Create a bookkeeping standards guide for a small business client. Cover: chart of accounts setup (income, expense, assets, liabilities heads), daily voucher entry discipline (sales, purchase, payment, receipt, journal), bank reconciliation (weekly), expense voucher approval process, petty cash management, monthly closing entries (prepaid, accruals), and minimum documentation required for audit readiness.'},
{id:337,cat:'mis',diff:'easy',tags:'Ratio,Financial Health Check,Annual Report',title:'Quick Financial Health Check – 10 Key Ratios',prompt:'Compute and interpret 10 key financial ratios for a company\'s annual report assessment. Ratios: (1) Current Ratio, (2) Quick Ratio, (3) Debt-Equity, (4) Interest Coverage, (5) Gross Profit Margin, (6) Net Profit Margin, (7) ROCE, (8) Asset Turnover, (9) Debtor Days, (10) Inventory Turnover. For each: formula, computation from provided data, industry benchmark reference, and red flag interpretation.'},
{id:338,cat:'corp',diff:'easy',tags:'Private Limited,Benefits,Registration',title:'Why Private Limited Company – Benefits vs LLP',prompt:'Advise a first-time entrepreneur on choosing between a Private Limited Company and LLP for a service business with 2 founders planning to raise angel investment in 2 years. Cover: credibility with investors (Pvt Ltd preferred), ESOP issuance (not possible in LLP), compliance burden comparison, tax rates, personal liability, exit options, and cost of incorporation vs. annual maintenance.'},
{id:339,cat:'it',diff:'med',tags:'HUF,Hindu Undivided Family,Tax Planning',title:'HUF – Formation and Tax Planning',prompt:'Advise a client on forming a Hindu Undivided Family (HUF) for tax planning. Cover: who can form HUF, HUF deed drafting, PAN application, bank account opening, contributions to HUF (Karta\'s contribution vs. gifts from strangers vs. ancestral property), tax benefits (separate basic exemption limit, S.80C for HUF), partition procedure, and situations where HUF planning is challenged by tax authorities.'},
{id:340,cat:'it',diff:'adv',tags:'Staggered Income,Year-End Planning,Clubbing',title:'Year-End Tax Planning Strategies – Master List',prompt:'Create a comprehensive year-end tax planning checklist for an individual with income ₹25 lakh (salary + business). Cover: maximizing S.80C (exact instruments best for tax + return), S.80D medical premium optimization, NPS S.80CCD(1B), home loan interest claim, advance tax catch-up, harvesting capital losses before March 31, donation planning (80G), and clubbing income issues with spouse/minor child.'},
{id:341,cat:'gst',diff:'med',tags:'GST,Healthcare,Exemption,Medical',title:'GST Exemptions in Healthcare Sector',prompt:'Analyze GST exemptions applicable to the healthcare sector. Cover: health care services exemption (clinical establishments, authorized medical practitioners, paramedics), diagnostic services exemption, ambulance service, blood banks, food supply to patients (hospital canteen rates), supplies to hospitals (medical devices at 12%), rent for hospital premises, and ITC implications for hospitals on taxable and exempt inputs.'},
{id:342,cat:'it',diff:'med',tags:'RNOR,Partial Tax Exemption,NRI Return',title:'Returning NRI – RNOR Tax Status Advisory',prompt:'Advise a person returning to India after 15 years overseas on the Resident but Not Ordinarily Resident (RNOR) tax status. Cover: conditions for RNOR (NRI in 9 out of 10 preceding years OR stay in India < 729 days in 7 preceding years), income scope under RNOR (India-sourced only, not foreign income), RNOR period (up to 3 years), NRE account interest exemption, and transition planning for investments.'},
{id:343,cat:'fema',diff:'med',tags:'LRS,Overseas Investment,Mutual Fund,GIFT City',title:'GIFT City – Investment & Tax Benefits',prompt:'Advise on investing through GIFT City (Gujarat International Finance Tec-City) IFSC. Cover: GIFT City IFSC regulatory framework, tax benefits for units in IFSC (10-year tax holiday under S.80LA), exemptions on capital gains, dividend income from IFSC companies, GST exemption for services to SEZ, NRI investment through GIFT City funds, and comparison with offshore jurisdictions (Mauritius, Singapore) post-MLI.'},
{id:344,cat:'dd',diff:'med',tags:'Pre-IPO,Clean Up,Due Diligence',title:'Pre-IPO Cleanup – Due Diligence',prompt:'Guide a company through pre-IPO cleanup to prepare for a public listing. Cover: related party transaction rationalization (arm\'s length justification or discontinuation), past financial statement restatement (Ind AS conversion), capital structure simplification (convert CCPS, OCDs to equity), pending litigation disclosure and resolution, employee contract documentation, IP assignment, and DRHP preparation readiness checklist.'},
{id:345,cat:'bank',diff:'med',tags:'Priority Sector,PSL,MSME,Agriculture',title:'Priority Sector Lending – MSME Advisory',prompt:'Advise an MSME on leveraging Priority Sector Lending (PSL) requirements. Cover: PSL categories (agriculture, MSME, affordable housing, education, weaker sections), MSME sub-limits within PSL, collateral-free loans under CGTMSE (up to ₹2 crore), interest rates under PSL vs. regular loans, documentation required, and how to negotiate with bank by highlighting PSL benefit to them.'},
{id:346,cat:'startup',diff:'med',tags:'Angel Investment,Section 56,Tax Planning',title:'Angel Investment – Tax Issues for Both Sides',prompt:'Analyze tax issues for angel investors and startups in a seed funding deal. For investor: nature of investment (capital asset), capital gains on exit (STCG/LTCG), S.56(2)(viib) angel tax risk on startup, carry-forward of angel tax loss, TDS implications. For startup: receipt of share application money, allotment within 60 days requirement, treatment if shares are not allotted, and DPIIT exemption process.'},
{id:347,cat:'corp',diff:'adv',tags:'NCLT,Oppression,Mismanagement,S.241',title:'Minority Shareholder Rights – S.241 NCLT',prompt:'Advise a minority shareholder (15% stake) on seeking relief against oppression and mismanagement under S.241 of Companies Act 2013. Cover: eligibility to file (minimum 10% or 100 members), grounds of oppression (exclusion from management, fraudulent transactions, denial of dividends), NCLT petition process, interim relief available (injunction against asset transfer), and typical remedies granted (buyout at fair value, change in management).'},
{id:348,cat:'audit',diff:'adv',tags:'PCAOB,NFRA,Quality Review,Audit Standards',title:'NFRA – Audit Standards & Enforcement',prompt:'Explain the role of National Financial Reporting Authority (NFRA) in India. Cover: NFRA\'s jurisdiction (companies with paid-up capital ≥₹500 crore, listed companies, large unlisted public companies), SAs that NFRA has notified, disciplinary proceedings process against auditors, penalties for dereliction of duty, appeal to NFRA from registrar, and how CAs should prepare for potential NFRA scrutiny.'},
{id:349,cat:'it',diff:'adv',tags:'Faceless Penalty,S.274,Faceless Scheme',title:'Faceless Penalty Scheme – Advisory',prompt:'Advise on handling penalty proceedings under the Faceless Penalty Scheme. Cover: initiation of faceless penalty (computer-generated notice), response timeline, show cause notice format, how to contest penalty under S.271(1)(c), distinction between concealment of income vs. bonafide mistake, documentary evidence to submit, DRP (Dispute Resolution Panel) if applicable, and appeal to CIT(A) against faceless penalty order.'},
{id:350,cat:'pm',diff:'adv',tags:'Succession,Partner,Senior CA,Exit',title:'CA Firm Succession Planning',prompt:'Prepare a succession planning framework for a senior CA partner (age 58) planning to retire in 5 years. Cover: client transition strategy (gradual introduction of junior partner over 2 years), knowledge transfer plan (client dossiers, relationship history), ICAI reconstitution compliance, valuation of goodwill (2-year average fee revenue method), payment structure to retiring partner, and announcement strategy to clients and staff.'},

// ═══ GST – BATCH 3 ═══
{id:351,cat:'gst',diff:'med',tags:'GST,E-Way Bill,Transportation,Detention',title:'E-Way Bill – Detention & Penalty Reply',prompt:'Draft a reply to a notice for detention of goods and conveyance for alleged e-way bill violation. Facts: e-way bill was generated but expired during transit due to vehicle breakdown. Cover: provisions under S. 129 of CGST Act, distinction between intentional violation vs. bonafide lapse, penalty computation (S. 129(1)(a)), self-assessment of tax and penalty to release goods, and appeal to appellate authority if officer does not release.'},
{id:352,cat:'gst',diff:'adv',tags:'GST,Works Contract,Construction,Rate',title:'Works Contract – GST Rate Advisory',prompt:'Determine GST rate for the following works contract scenarios: (1) construction of a hospital building for a government body, (2) interior decoration of a commercial office, (3) repair and renovation of an existing residential complex, (4) installation of a solar panel system for an industrial client. Apply Notification 11/2017-CT(Rate) and relevant amendments. Distinguish principal supply and rate applicable.'},
{id:353,cat:'gst',diff:'med',tags:'GST,Agriculture,Farmer,Exemption',title:'GST Exemptions for Agricultural Sector',prompt:'Summarize all GST exemptions relevant to agricultural businesses. Cover: fresh produce vs. processed food rates, agricultural equipment and machinery GST rates, services to farmers (transportation, warehousing, cold storage), input tax credit eligibility for agri-processing units, applicability of GST on renting of agricultural land, and advisory for a sugarcane cooperative on GST compliance.'},
{id:354,cat:'gst',diff:'med',tags:'GST,Hotel,Restaurant,Tourism',title:'GST on Hospitality Sector',prompt:'Advise a hotel operator on GST compliance. Cover: room tariff slabs and applicable rates (< ₹1000 exempt; ₹1001-₹7500 at 12%; >₹7500 at 18%), restaurant GST (5% without ITC vs. 18% with ITC), outdoor catering rate, conference/banquet facility, GST on complimentary stays, ITC restrictions in the sector, and GSTR-1 reporting of hospitality services.'},
{id:355,cat:'gst',diff:'adv',tags:'GST,Advance Ruling,AAR,Strategy',title:'Advance Ruling Application – GST AAR',prompt:'Guide through the process of filing an application for Advance Ruling before the GST Authority for Advance Rulings (AAR). Cover: eligible applicants, question categories permitted (classification, rate, time of supply, ITC eligibility), Form GST ARA-01 preparation, fee payment, hearing process, applicability of ruling (binding only on applicant and jurisdictional officer), appeal to AAAR if ruling is adverse.'},
{id:356,cat:'gst',diff:'easy',tags:'GST,Composition Scheme,Small Business',title:'GST Composition Scheme Advisory',prompt:'Advise a small trader (turnover ₹80 lakh) on opting for GST Composition Scheme. Cover: eligibility conditions, turnover threshold (₹1.5 crore for goods, ₹50 lakh for services), tax rates (1% for traders, 5% for restaurants, 6% for service providers under QRMP), restrictions (no ITC, no interstate supply), Form CMP-02 filing, quarterly return (CMP-08), annual return (GSTR-4), and exit from composition.'},
{id:357,cat:'gst',diff:'med',tags:'GST,Import Services,RCM,IGST',title:'Import of Services – GST Compliance',prompt:'Explain GST compliance for an Indian company importing services from a foreign entity (USA software vendor, UK consultant). Cover: RCM applicability on import of services (S.5(3) IGST Act), computation of GST (IGST at applicable rate on transaction value + customs value), time of supply (payment or invoice, whichever earlier), Form GSTR-3B disclosure, ITC eligibility on such self-assessed RCM tax, and Form 15CA/CB interplay.'},
{id:358,cat:'gst',diff:'adv',tags:'GST,Transfer,Business,Going Concern,ITC',title:'GST on Transfer of Business as Going Concern',prompt:'Analyze GST treatment when an entire business is transferred as a going concern (slump sale). Cover: whether transfer qualifies as exempt supply under Schedule III (Entry 7), conditions for going concern exemption (all assets and liabilities transferred, business continues), ITC transfer to buyer under Rule 41, GSTIN amendment required, and practical documentation needed to support the going concern exemption claim.'},
{id:359,cat:'gst',diff:'med',tags:'GST,Foreign Branch,Liaison Office,Compliance',title:'GST for Foreign Company Branch/Liaison Office',prompt:'Advise a multinational company on GST compliance for its India liaison office and project office. Cover: whether liaison office activities constitute a taxable supply, GST registration requirement, ITC eligibility on expenses incurred by liaison office, treatment of expenses recharged to HO as import of services, FEMA compliance for fund transfers, and income tax implications of liaison office activities.'},
{id:360,cat:'gst',diff:'med',tags:'GST,Credit Note,Debit Note,Adjustment',title:'Credit Note & Debit Note – GST Treatment',prompt:'Explain the GST treatment of credit notes and debit notes. Cover: S.34 CGST Act provisions, time limit for issuing credit notes (September 30 of following FY or annual return date, whichever earlier), reflection in GSTR-1, reduction of output tax liability, debit note treatment, situations where credit note cannot be issued, and impact on buyer\'s ITC when supplier issues credit note.'},
{id:361,cat:'gst',diff:'adv',tags:'GST,Circular,Clarification,Legal Research',title:'GST Circular & Notification Research',prompt:'Research and summarize the 5 most impactful CBIC circulars issued in the last 6 months affecting: (1) ITC availment conditions, (2) valuation of related party supplies, (3) e-invoicing amendments, (4) classification changes, and (5) GST refund procedure. For each circular: key change, effective date, impact on businesses, and action required. Cite circular numbers.'},
{id:362,cat:'gst',diff:'med',tags:'GST,Banking,Financial Services,NBFC',title:'GST on Banking & Financial Services',prompt:'Advise a bank on GST compliance for its services. Cover: exempt services (deposits, loans, life insurance – Schedule III), taxable services (processing fees, foreclosure charges, locker rent, forex transactions), place of supply for banking services (S.12(12) IGST Act), ITC eligibility restrictions for banks under Rule 38 (50% reversal for banking companies), and SAC codes for various banking services.'},

// ═══ INCOME TAX – BATCH 3 ═══
{id:363,cat:'it',diff:'med',tags:'Income Tax,S.43B,MSME,Deduction,Payment',title:'S. 43B – MSME Payment Deduction Rule',prompt:'Explain the amended S. 43B(h) provision (Finance Act 2023) requiring actual payment to MSME suppliers for deduction. Cover: which payments are covered (all MSME supplier payments), payment deadline (15 days under MSMED Act or within agreed credit period up to 45 days), disallowance computation if unpaid at year-end, interest implication under MSMED Act (3× bank rate), and practical action plan for companies with MSME suppliers.'},
{id:364,cat:'it',diff:'med',tags:'Income Tax,Depreciation,Block of Assets,S.32',title:'Depreciation – Block of Assets Concept',prompt:'Explain the block of assets concept for Income Tax depreciation computation. Cover: meaning of block (same class of assets, same depreciation rate), WDV computation at beginning of year, additions during the year (half-year rule for assets purchased after October 1), disposals (reducing WDV), terminal depreciation or short-term capital gain/loss on block becoming zero or negative, and rate schedule for key asset classes.'},
{id:365,cat:'it',diff:'adv',tags:'Income Tax,Survey,S.133A,Rights,Strategy',title:'Income Tax Survey – S. 133A Advisory',prompt:'Advise a client whose business premises are being surveyed under S. 133A. Cover: scope of survey (only books, registers, documents at business premises – residence cannot be surveyed), officer\'s powers (cannot seize but can impound), assessee\'s rights (right to ask for identification, right to be accompanied by CA), treatment of surrendered income during survey (voluntary disclosure strategy), and subsequent assessment proceedings under S. 143(3).'},
{id:366,cat:'it',diff:'med',tags:'Income Tax,HUF,Hindu Undivided Family,Tax Planning',title:'HUF – Formation & Tax Planning',prompt:'Advise a client on forming and utilizing a Hindu Undivided Family (HUF) for tax planning. Cover: HUF formation process (Deed of Declaration, PAN application), assets that can be contributed to HUF, income that qualifies as HUF income vs. individual income, partition of HUF (total/partial partition), tax benefits (separate basic exemption limit, S. 80C deductions), clubbing provisions, and situations where HUF planning is most effective.'},
{id:367,cat:'it',diff:'adv',tags:'Income Tax,Business Loss,S.72,Carry Forward,Set Off',title:'Business Loss – Carry Forward & Set Off Rules',prompt:'Explain the set-off and carry-forward rules for business losses under Income Tax Act. Cover: intra-head set-off (business loss vs. business income, same year), inter-head set-off (business loss vs. other heads except salary), carry-forward period (8 years for normal business loss, no limit for unabsorbed depreciation), filing requirement for carry-forward (must file return on time), and S.79 restriction on loss carry-forward after change in shareholding for closely held companies.'},
{id:368,cat:'it',diff:'med',tags:'Income Tax,Property Sale,S.50C,S.56,Stamp Duty',title:'Property Transaction – S. 50C and S. 56(2)(x)',prompt:'Analyze tax implications for seller and buyer in a property transaction where stamp duty value (SDV) ₹1.5 crore differs from agreement value ₹1.1 crore. Seller: S. 50C – SDV as deemed consideration for capital gains (10% variation rule under S. 50C(1) proviso), reference to DVO under S. 50C(2). Buyer: S. 56(2)(x) – difference of ₹40 lakh taxable as income. Tax mitigation strategy for both parties.'},
{id:369,cat:'it',diff:'med',tags:'Income Tax,Dividend,S.194,TDS,Shareholder',title:'Dividend Taxation – Post Finance Act 2020',prompt:'Explain dividend taxation for FY [year] after abolition of DDT. Cover: dividend taxable in hands of shareholder at applicable slab rate, S. 194 TDS (10% for resident shareholders above ₹5,000), S. 195 for NRI shareholders (20%), S. 80M deduction for domestic company receiving dividend from subsidiary, deduction for interest expense on borrowing to invest in shares (capped at 20% of dividend income), and reporting in ITR.'},
{id:370,cat:'it',diff:'adv',tags:'Income Tax,Benami,Prohibition Act,Transactions',title:'Benami Transactions – Advisory',prompt:'Advise a client on the Prohibition of Benami Property Transactions Act 2016. Cover: definition of benami transaction (property held by one person but paid for by another), exceptions (property held in fiduciary capacity, joint property with spouse/children), consequences (confiscation of benami property), prosecution provisions, initiated authority (Adjudicating Authority, Appellate Tribunal), interface with income tax assessment, and voluntary disclosure strategy.'},
{id:371,cat:'it',diff:'med',tags:'Income Tax,NRI,Residential Status,DTAA',title:'NRI Residential Status – Section 6 Analysis',prompt:'Determine residential status for FY [year] for: (1) an Indian citizen visiting India for 120 days after being abroad for 5 years, (2) an Indian citizen on a foreign ship (seaman), (3) a person born in India who migrated to Canada but visits India for 150 days. Apply S. 6 amendments (Finance Act 2020), RNOR conditions, and tax implications (income taxable as resident vs. NRI) for each case.'},
{id:372,cat:'it',diff:'med',tags:'Income Tax,Profession,S.44ADA,Doctors,Lawyers',title:'Professionals – Tax Compliance Guide',prompt:'Prepare a comprehensive tax compliance guide for professionals (doctors, lawyers, CAs, engineers) under Income Tax Act. Cover: income heads (professional income under PGBP), S. 44ADA presumptive taxation (50% of gross receipts), books of accounts requirement (S. 44AA), tax audit trigger (> ₹50 lakh gross receipts), advance tax obligation, allowable deductions (office rent, assistant salary, depreciation), and ITR-3 vs. ITR-4 selection.'},
{id:373,cat:'it',diff:'adv',tags:'Income Tax,Section 68,Unexplained Cash Credit,Notice',title:'S. 68 – Unexplained Cash Credits',prompt:'Defend a client against S. 68 addition for unexplained cash credits in books. Cover: three-pronged test (identity, creditworthiness, and genuineness of transaction), documentary evidence to prove each element, burden of proof on assessee vs. AO, when genuineness can be questioned despite KYC, post-demonetization cash deposit scenario, and leading Supreme Court/High Court judgements favoring assessee on S. 68.'},
{id:374,cat:'it',diff:'med',tags:'Income Tax,Salary,Perquisite,S.17,Valuation',title:'Perquisite Valuation – Rule 3',prompt:'Compute perquisite value for the following benefits provided to an employee: (1) company car (1800 cc) used for both official and personal purposes, (2) rent-free accommodation in a city with population > 25 lakh, (3) ESOP perquisite (1,000 shares, FMV on exercise ₹500, exercise price ₹100), (4) club membership (annual fee ₹1.2 lakh), and (5) interest-free loan of ₹5 lakh for personal use. Apply Rule 3 valuation.'},
{id:375,cat:'it',diff:'easy',tags:'Income Tax,80C,Investments,Deductions,List',title:'Complete S. 80C to 80U Deductions List',prompt:'Create a comprehensive reference guide for all deductions under Chapter VI-A for individuals. For each deduction (S. 80C, 80CCC, 80CCD, 80D, 80DD, 80DDB, 80E, 80EE, 80EEA, 80G, 80GGA, 80GGC, 80TTA, 80TTB, 80U): eligible taxpayer, qualifying payments/investments, maximum deduction limit, supporting documents needed, and eligibility in new tax regime. Format as a ready-reference table.'},
{id:376,cat:'it',diff:'adv',tags:'Income Tax,TDS Default,S.201,Interest,Penalty',title:'TDS Default – Consequences & Remedy',prompt:'Analyze consequences of TDS default for a company that failed to deduct TDS on contract payments under S. 194C for FY [year]. Cover: disallowance of expense under S. 40(a)(ia), treatment as assessee-in-default under S. 201, interest under S. 201(1A) (1% per month for non-deduction, 1.5% per month for non-deposit), penalty under S. 271C, compounding fees, and remedial steps (payment of TDS, interest, obtaining CA certificate from recipient).'},
{id:377,cat:'it',diff:'med',tags:'Income Tax,Cooperative,80P,Tax Exemption',title:'Cooperative Society – S. 80P Deductions',prompt:'Advise a primary agricultural credit cooperative society on S. 80P deductions. Cover: S. 80P(2)(a)(i) – income from banking operations with members (100% deduction), S. 80P(2)(d) – income from investments with other cooperatives, S. 80P(4) – applicability to cooperative banks post-2007 amendment, provisions applicable to urban cooperative banks (taxable now), deduction under S. 80P for non-credit cooperatives, and CBDT circular clarifications.'},
{id:378,cat:'it',diff:'adv',tags:'Income Tax,International,Royalty,FTS,S.9',title:'Royalty & FTS – S. 9(1)(vi) and (vii)',prompt:'Analyze whether the following payments to a non-resident are "royalty" or "fee for technical services" under S. 9(1)(vi) and (vii): (1) payment for software licenses (shrink-wrapped vs. customized), (2) payment for database access (online subscription), (3) technical consultancy fee for setting up a new plant (make available condition), (4) management fees to parent company. Apply DTAA provisions where applicable.'},

// ═══ AUDIT – BATCH 3 ═══
{id:379,cat:'audit',diff:'med',tags:'Audit,SA 230,Working Papers,Documentation',title:'Audit Documentation – SA 230 Standards',prompt:'Design a working paper documentation framework for a statutory audit complying with SA 230. Cover: essential elements (purpose, source of information, procedures performed, conclusions), permanent vs. current audit file contents, documentation timeline (assemble within 60 days of sign-off), review notes process, physical vs. electronic working papers, and specific documentation for risk assessment, sampling, and management representations.'},
{id:380,cat:'audit',diff:'med',tags:'Audit,Sampling,SA 530,Statistical',title:'Audit Sampling – SA 530 Application',prompt:'Design an audit sampling plan under SA 530 for testing a population of 500 purchase invoices (total value ₹3 crore). Cover: risk assessment impact on sample size, sampling risk (alpha and beta errors), stratification of population, monetary unit sampling (MUS) vs. random sampling, sample size computation using ISA tables, evaluation of results (project misstatement to population), and documentation of sampling plan.'},
{id:381,cat:'audit',diff:'adv',tags:'Audit,Financial Fraud,SAs,Red Flag',title:'Auditor\'s Responsibility – Fraud Detection',prompt:'Explain auditor\'s responsibility for fraud detection under SA 240. Cover: management vs. auditor\'s responsibility distinction, fraud risk factors (incentive, opportunity, rationalization triangle), specific audit procedures for fraud risk (journal entry testing, revenue cut-off, related party scrutiny), reporting obligation when fraud is detected (to those charged with governance, statutory authorities), CARO 2020 fraud reporting clause, and auditor\'s protection under the Companies Act.'},
{id:382,cat:'audit',diff:'adv',tags:'Audit,Key Audit Matter,KAM,SA 701',title:'Key Audit Matters – SA 701',prompt:'Identify and draft Key Audit Matters (KAMs) for inclusion in the audit report of a listed company. Potential KAMs: (1) impairment assessment of goodwill (₹50 crore), (2) revenue recognition for long-term contracts (Ind AS 115), (3) recoverability of deferred tax assets. For each KAM: describe the matter, reason for being a KAM, audit procedures performed, and conclusion. Follow SA 701 format precisely.'},
{id:383,cat:'audit',diff:'med',tags:'Audit,IT Systems,Audit Trail,CARO',title:'IT Systems Audit – CARO 2020 Clause',prompt:'Design audit procedures for verifying the audit trail requirement under CARO 2020 (Clause 3(vi)). Cover: checking if the accounting software has an audit trail feature, verifying it is enabled throughout the year, testing whether the audit trail cannot be disabled or tampered with, reviewing who has admin access, third-party certification of accounting software, and drafting the CARO reporting where audit trail is partially maintained.'},
{id:384,cat:'audit',diff:'adv',tags:'Audit,Ind AS 36,Goodwill,Impairment Test',title:'Goodwill Impairment Testing – Audit Procedures',prompt:'Design audit procedures for testing goodwill impairment under Ind AS 36 for a cash-generating unit with carrying goodwill of ₹80 crore. Cover: management\'s impairment model review (DCF assumptions – growth rate, discount rate), specialist engagement (business valuer), benchmarking discount rate against WACC, sensitivity analysis on key assumptions, comparison with market capitalization as sanity check, and disclosure requirements.'},
{id:385,cat:'audit',diff:'med',tags:'Audit,Opening Balances,SA 510,New Engagement',title:'Opening Balances – SA 510',prompt:'Design procedures for verifying opening balances under SA 510 for a company where the firm has been newly appointed as auditor. Cover: review of predecessor auditor\'s working papers, audit procedures on opening balances (inventory roll-back, fixed asset physical verification, balance confirmation for receivables/payables), qualification required if opening balances are unverifiable, and communication with predecessor auditor protocol per ICAI guidelines.'},
{id:386,cat:'audit',diff:'adv',tags:'Audit,Consolidation,CFS,Group Audit,SA 600',title:'Group Audit – SA 600 Application',prompt:'Design a group audit approach under SA 600 for a parent company with 5 subsidiaries (2 foreign). Cover: identification of significant components, instructions to component auditors (format, scope, timeline), review of component auditor work, access to component auditor working papers, understanding of foreign subsidiary auditing standards, group-level analytical procedures, consolidation adjustments testing, and group auditor\'s report responsibility.'},
{id:387,cat:'audit',diff:'med',tags:'Audit,Provision,Contingent Liability,AS 29',title:'Provisions & Contingencies – Audit Procedures',prompt:'Design audit procedures for verifying provisions and contingent liabilities under Ind AS 37/AS 29. Cover: completeness risk (management may understate provisions), legal case review (letters to lawyers), tax liability assessment (tax demand audit), warranty provision reasonableness testing (historical claim rate analysis), restructuring provision conditions (public announcement requirement), and disclosure adequacy for contingent liabilities in financial statements.'},

// ═══ COMPANY LAW – BATCH 3 ═══
{id:388,cat:'corp',diff:'med',tags:'Company Law,AGM,Notice,Proxy,Ordinary Business',title:'AGM Procedure – End-to-End Compliance',prompt:'Prepare an end-to-end AGM compliance guide for a private limited company. Cover: notice period (21 days clear days, 15 days if shorter notice consented), items of ordinary business (adoption of accounts, dividend declaration, director appointment/re-appointment, auditor appointment), items of special business (e.g., approval of related party transactions), quorum (2 members personally present), proxy voting, minutes preparation (within 30 days), and certified copy to ROC if required.'},
{id:389,cat:'corp',diff:'med',tags:'Company Law,Dividend,Interim,S.123,Companies Act',title:'Dividend Declaration – Legal Requirements',prompt:'Explain the legal requirements for declaring and paying dividend under Companies Act 2013. Cover: final dividend (declaration at AGM, from current year profits or free reserves), interim dividend (board can declare out of current year profit), restriction on dividend if company has defaulted on loan repayment, transfer to general reserve requirement (only for final dividend), unpaid dividend transfer to IEPF (Investor Education and Protection Fund) after 7 years, and S. 2(35) definition of dividend.'},
{id:390,cat:'corp',diff:'adv',tags:'Company Law,Debenture,NCD,Issue,Trustee',title:'Debenture Issue – Companies Act Compliance',prompt:'Guide through debenture issuance by a private company (NCDs to HNI investors). Cover: board resolution, creation of debenture redemption reserve (DRR), appointment of debenture trustee (mandatory if >500 investors), Form PAS-3 for allotment, charge creation for secured debentures, Form CHG-1, interest payment TDS under S. 193, SEBI LODR applicability (if listed), and repayment of principal (Form CHG-4 for satisfaction of charge on redemption).'},
{id:391,cat:'corp',diff:'med',tags:'Company Law,Director,KMP,Remuneration,S.197',title:'Director Remuneration – S. 197 Limits',prompt:'Advise on the maximum permissible remuneration for executive directors under S. 197 of Companies Act 2013. Cover: overall limit (11% of net profits), individual limits (5% for MD or WTD, 10% for all directors combined), computation of net profits (S. 198 method), approval requirements (board/shareholders/Central Government), remuneration in loss-making companies, managerial remuneration under Schedule V, and disclosure requirements in Board\'s Report.'},
{id:392,cat:'corp',diff:'adv',tags:'Company Law,Amalgamation,Fast Track,S.233',title:'Fast Track Merger – S. 233 Small Companies',prompt:'Guide through fast track merger under S. 233 of Companies Act for two small companies. Cover: eligibility (small companies or holding-subsidiary), notice to ROC and Official Liquidator (Form CAA-7), no NCLT approval required (objection-based process), 30-day objection window, filing with ROC on confirmation (Form CAA-9), tax implications (S. 72A loss carry-forward eligibility, stamp duty on merger), and effective date of merger.'},
{id:393,cat:'corp',diff:'med',tags:'Company Law,Foreign Subsidiary,Reporting,S.136',title:'Wholly Owned Subsidiary – Reporting Requirements',prompt:'Explain reporting requirements for a wholly owned subsidiary (WOS) of a foreign company incorporated in India. Cover: annual filings (AOC-4 with financial statements, MGT-7A), statutory audit requirement, mandatory Ind AS adoption threshold, reporting to parent (management accounts), repatriation of profits (dividend route, FEMA compliance), WHT on dividend to foreign parent, and TP documentation requirement for intra-group transactions.'},
{id:394,cat:'corp',diff:'med',tags:'Company Law,Charge,Satisfaction,Bank NOC,ROC',title:'Charge Satisfaction – Process & Common Issues',prompt:'Guide through satisfaction of a bank charge upon full loan repayment. Cover: bank NOC/satisfaction letter requirement, Form CHG-4 filing (within 30 days of satisfaction), late filing fee and condonation application if delayed (Form CHG-1 for new charge creation after delay), consequences of charge not being satisfied in ROC records (blocks new charges, affects creditworthiness), and checklist of documents to be obtained from bank.'},

// ═══ FEMA – BATCH 3 ═══
{id:395,cat:'fema',diff:'adv',tags:'FEMA,LRS,Liberalized Remittance Scheme,TCS',title:'Liberalised Remittance Scheme (LRS) Advisory',prompt:'Advise an individual on Liberalised Remittance Scheme (LRS). Cover: annual limit (USD 250,000 per FY), permitted uses (education, travel, investment in foreign securities, gifting to non-residents), TCS applicability (20% TCS on LRS exceeding ₹7 lakh – Finance Act 2023), credit of TCS in income tax return, prohibited uses (margin trading on foreign exchanges), AD bank compliance, and reporting requirements.'},
{id:396,cat:'fema',diff:'med',tags:'FEMA,NRI,Property,Sale,Repatriation',title:'NRI Property Sale – Repatriation Rules',prompt:'Advise an NRI on repatriation of sale proceeds from sale of immovable property in India. Cover: NRO account (current vs. savings), annual repatriation limit from NRO ($1 million per FY), Form 15CA/15CB requirement (CA certificate), 15CA Part D for repatriation exceeding threshold, TDS on sale by NRI (S.195 at 20% on capital gains or 1% TDS if buyer is individual < ₹50 lakh), DTAA benefit to reduce TDS, and Form 26QB filing by buyer.'},
{id:397,cat:'fema',diff:'adv',tags:'FEMA,FPI,Foreign Portfolio Investor,Investment',title:'FPI – Investment in Indian Securities',prompt:'Explain the regulatory framework for Foreign Portfolio Investors (FPIs) investing in India. Cover: SEBI FPI Regulations 2019, categories (FPI I – government related, FPI II – others), eligible securities (equity, debt, REITs, InvITs), investment limits (74% in listed companies, sectoral caps), KYC requirements, custodian appointment, reporting obligations, SEBI short position limits, and DTAA treaty benefits available to FPIs from Mauritius/Singapore/Netherlands.'},
{id:398,cat:'fema',diff:'med',tags:'FEMA,Export,Realization,EDPMS,Tracking',title:'Export Proceeds – Realization & FEMA Compliance',prompt:'Advise an exporter on FEMA compliance for realization of export proceeds. Cover: 9-month realization period for goods export, 15 months for EOUs/projects, EDPMS (Export Data Processing Monitoring System) tracking, AD bank role in monitoring, consequences of non-realization (compounding required), extension of realization period (application to RBI through AD bank), write-off of unrealized export proceeds (conditions), and treatment of advance payments received.'},

// ═══ TRANSFER PRICING – BATCH 2 ═══
{id:399,cat:'tp',diff:'adv',tags:'Transfer Pricing,Safe Harbour,Rule 10TD',title:'Safe Harbour Rules – Transfer Pricing',prompt:'Advise a company on applicability of Safe Harbour Rules under Rule 10TD for transfer pricing. Cover: eligible categories (IT services, software development, KPO, contract R&D, low-value-adding intra-group services, financial transactions), safe harbour margins for each category (e.g., 17% operating profit for IT services), conditions to opt in (Form 3CEFA), year of election, and when regular arm\'s length analysis is more beneficial than safe harbour.'},
{id:400,cat:'tp',diff:'adv',tags:'Transfer Pricing,MAM,Most Appropriate Method,CUP,TNMM,CPM',title:'Most Appropriate Method Selection – TP',prompt:'Guide through the selection of the Most Appropriate Method (MAM) for transfer pricing for different types of transactions: (1) sale of goods by Indian parent to foreign subsidiary (CUP vs. TNMM), (2) software services rendered to parent (TNMM vs. Cost Plus), (3) guarantee provided by parent to subsidiary (guarantee fee – CUP), and (4) IP license to subsidiary (CUT/CUP vs. Profit Split). Apply Rule 10B criteria for method selection.'},
{id:401,cat:'tp',diff:'adv',tags:'Transfer Pricing,MAP,Mutual Agreement,DTAA Article 25',title:'Mutual Agreement Procedure (MAP)',prompt:'Advise on initiating MAP proceedings under Article 25 of the India-USA DTAA for a TP addition of ₹20 crore. Cover: Indian MAP application process (competent authority in CBDT), timeline for MAP resolution, interaction with domestic appeal (APA vs. MAP), bilateral MAP vs. unilateral APA, suspension of tax demand during MAP, and outcome implementation if MAP is concluded in assessee\'s favor.'},

// ═══ VALUATION – BATCH 2 ═══
{id:402,cat:'val',diff:'adv',tags:'Valuation,Liquidation,Distressed,IBC,Asset Sale',title:'Distressed Asset Valuation – IBC Context',prompt:'Value assets of a company under CIRP for the purpose of resolution plan evaluation. Cover: going concern value vs. liquidation value distinction, fair value vs. liquidation value per IBBI (Insolvency and Bankruptcy Board) regulations, asset-wise valuation (plant & machinery – depreciated replacement cost; receivables – realizable value; brand – relief from royalty), importance of two independent registered valuers, and how the resolution professional uses valuations.'},
{id:403,cat:'val',diff:'adv',tags:'Valuation,Startup,Pre-revenue,Scorecard Method',title:'Pre-Revenue Startup Valuation Methods',prompt:'Explain valuation methodologies for pre-revenue startups. Cover: Berkus Method (5 factors × ₹X crore cap), Scorecard/Bill Payne Method (compare to median startup valuation + factor adjustments), Risk Factor Summation Method, First Chicago Method (scenario-weighted DCF), and VC Method (terminal value / expected return). For each: applicability, inputs needed, and typical output range for Indian seed-stage startups.'},
{id:404,cat:'val',diff:'med',tags:'Valuation,Registered Valuer,IBBI,ICAI,RV Exam',title:'Registered Valuer – Process & Scope',prompt:'Guide a CA interested in becoming a Registered Valuer (RV) under IBBI. Cover: eligibility (educational qualification, experience), IBBI RV exam structure (Securities & Financial Assets, Land & Building, Plant & Machinery categories), valuation professional organization (VPO – ICAI/IBBI), CPE requirements, scope of work mandated by law (IBC, Companies Act for mergers/amalgamations, FEMA for FDI), and valuation standards issued by ICAI.'},

// ═══ IBC – BATCH 2 ═══
{id:405,cat:'ibc',diff:'adv',tags:'IBC,Operational Creditor,S.9,Demand Notice',title:'Operational Creditor – S. 9 Petition',prompt:'Guide an operational creditor (vendor with ₹2 crore unpaid invoice) on initiating CIRP under S. 9 IBC. Cover: demand notice under S. 8 (10-day notice to corporate debtor), conditions to file S. 9 application (no payment within 10 days, no notice of dispute), Form 5 preparation (NCLT application), documents required, difference from financial creditor petition under S. 7, and withdrawal of application after payment.'},
{id:406,cat:'ibc',diff:'adv',tags:'IBC,Personal Guarantor,S.95,Insolvency',title:'Personal Guarantor Insolvency – S. 95',prompt:'Advise a personal guarantor of a corporate debtor that has undergone CIRP on personal insolvency proceedings under S. 95 IBC. Cover: applicability to personal guarantors of corporate debtors only (not other individuals), filing by creditor (DRT or Debt Recovery Tribunal jurisdiction), moratorium on guarantor\'s assets during proceedings, repayment plan options, impact on personal assets, and recent Supreme Court ruling on personal guarantor insolvency.'},
{id:407,cat:'ibc',diff:'med',tags:'IBC,Avoidance,S.43,Preferential Transaction',title:'Avoidance Transactions – S. 43 IBC',prompt:'Explain avoidance transaction provisions under IBC for a Resolution Professional investigating the corporate debtor\'s pre-insolvency transactions. Cover: preferential transactions (S. 43 – payments to related parties within 2 years, unrelated parties within 1 year of insolvency commencement), undervalued transactions (S. 45), extortionate credit transactions (S. 50), fraudulent transactions (S. 66), and RP\'s powers to apply to NCLT for reversal of such transactions.'},

// ═══ BANKING – BATCH 2 ═══
{id:408,cat:'bank',diff:'med',tags:'Bank,Trade Finance,Export Finance,PCFC',title:'Trade Finance – Export Finance Products',prompt:'Advise an exporter on trade finance products available from banks. Cover: Pre-Shipment Credit in Foreign Currency (PCFC – lower interest rate), Post-Shipment Export Credit (bill discounting, export bill negotiation), Buyers Credit (overseas buyer financing in foreign currency), Letter of Undertaking (LoU) – current RBI restrictions, Export Credit Guarantee Corporation (ECGC) policies, and how to choose between rupee vs. foreign currency export credit based on hedging cost.'},
{id:409,cat:'bank',diff:'adv',tags:'Bank,Debt Restructuring,S4A,S4R,RBI,Haircut',title:'Bank Debt Restructuring – RBI Frameworks',prompt:'Explain RBI\'s current debt restructuring frameworks for stressed assets. Cover: RBI June 2019 Framework (resolution plan within 180 days of default), ICA (Inter-Creditor Agreement) mechanics, RBI\'s February 2018 circular impact (post SC striking down), COVID-19 restructuring framework (Kamath Committee), credit cost and provisioning impact on bank, and haircut vs. restructuring decision framework from bank\'s perspective.'},
{id:410,cat:'bank',diff:'med',tags:'Bank,Account Aggregator,AA,Open Banking',title:'Account Aggregator Framework – Advisory',prompt:'Explain the Account Aggregator (AA) framework for a fintech company. Cover: RBI Master Direction on AA, AA as a consent layer (not data storage), financial data flow (FIP – financial information provider, FIU – financial information user), data types shared via AA (bank statements, tax data, insurance, securities), use cases for CAs (client financial analysis), regulatory approvals required, and business model opportunities in the AA ecosystem.'},
{id:411,cat:'bank',diff:'med',tags:'Bank,UPI,Payment,RBI,Compliance',title:'Payment System – RBI Compliance Guide',prompt:'Advise a company on regulatory compliance for payment aggregator/payment gateway business. Cover: RBI PA/PG Guidelines 2020, net worth requirement (₹15 crore at application, ₹25 crore by March 2023), escrow account requirements, nodal bank account, merchant onboarding KYC requirements, transaction limits, PCI DSS compliance for card data, data localisation requirement, and reporting obligations to RBI.'},

// ═══ REAL ESTATE – BATCH 2 ═══
{id:412,cat:'rera',diff:'adv',tags:'Real Estate,JDA,S.45(5A),Land,Developer',title:'JDA Tax – S. 45(5A) for Landowner',prompt:'Compute capital gains tax for a landowner under S. 45(5A) after entering into a JDA with a builder. Facts: Land cost ₹50 lakh (purchased 2005), stamp duty value of land on JDA date ₹2 crore, developer gives 40% of flats. Coverage: year of taxability (on receipt of completion certificate or transfer of possession), deemed consideration (stamp duty value of developer\'s portion), cost of acquisition (original cost of land), and LTCG vs. STCG classification.'},
{id:413,cat:'rera',diff:'med',tags:'Real Estate,Rental Income,TDS,S.194I,Commercial',title:'Commercial Property Rental – Tax & Compliance',prompt:'Advise a landlord renting commercial office space at ₹3 lakh/month to a company. Cover: TDS under S. 194I (10% TDS, no threshold for company tenants), landlord\'s ITR (income from house property vs. business income determination), municipal tax deduction, standard deduction of 30%, home loan interest deductibility, GST registration if annual rental income > ₹20 lakh, GST invoicing requirement, and Place of Supply for commercial rental.'},
{id:414,cat:'rera',diff:'med',tags:'Real Estate,SRA,Redevelopment,Mumbai',title:'SRA/Redevelopment – Tax Treatment',prompt:'Analyze tax implications for a tenant receiving an alternate accommodation in a redevelopment project in Mumbai. Cover: capital gains on surrender of tenancy rights (long-term or short-term based on period of holding), S. 54F exemption on reinvestment in new flat, GST on development rights transferred to builder, TDR (Transfer of Development Rights) treatment for original owner, and stamp duty on new flat received in lieu of tenancy.'},

// ═══ NPO – BATCH 2 ═══
{id:415,cat:'npo',diff:'med',tags:'NPO,CSR,Companies Act,Implementing Agency',title:'CSR Implementing Agency – Registration',prompt:'Guide an NGO on registering as a CSR implementing agency. Cover: Form CSR-1 registration on MCA portal (since April 2021, mandatory for NGOs receiving CSR funds), documents required, DARPAN registration requirement, annual utilization report to corporate donor, impact measurement framework, preferred project categories for corporate donors, and how to pitch CSR projects to companies.'},
{id:416,cat:'npo',diff:'adv',tags:'NPO,S.12AB,Registration,Renewal,PCIT',title:'S. 12AB Registration – Renewal & Cancellation',prompt:'Guide a trust through renewal of S. 12AB registration (which is now provisional – valid for 5 years). Cover: Form 10AB filing for regular registration (at least 6 months before expiry), documents required, PCIT scrutiny procedures, common grounds for cancellation (violation of S. 13 – income applied for private benefit, investment in prohibited modes), appeal against cancellation, and fresh registration requirements after cancellation.'},
{id:417,cat:'npo',diff:'med',tags:'NPO,PMLA,AML,KYC,FATF',title:'PMLA Compliance for NGOs – FATF Requirements',prompt:'Advise an NGO on Anti-Money Laundering (AML) compliance under PMLA 2002. Cover: FATF recommendation on NPO sector monitoring (India\'s commitments), high-risk activities (large cash donations, foreign funds from high-risk jurisdictions), KYC of major donors, suspicious transaction reporting (STR) obligation, records maintenance for 5 years, RBI guidelines on NGO accounts, and internal controls to demonstrate compliance with anti-terrorism financing laws.'},

// ═══ CLIENT COMMUNICATION – BATCH 2 ═══
{id:418,cat:'client',diff:'easy',tags:'Client,Budget,Post-Budget,Advisory,Finance Act',title:'Post-Budget Client Advisory Note',prompt:'Draft a post-Budget 2025 advisory note to send to all CA firm clients within 48 hours of Budget presentation. Cover: top 5 income tax changes (with specific before/after comparison), key GST amendments, compliance date changes, and 3 immediate action points clients should take before March 31. Format: scannable with emoji bullets, under 500 words, suitable for both email and WhatsApp forward.'},
{id:419,cat:'client',diff:'easy',tags:'Client,Onboarding,KYC,Anti Money Laundering,Due Diligence',title:'Client KYC & AML Due Diligence Framework',prompt:'Design a client onboarding KYC and AML due diligence framework for a CA firm per ICAI guidelines. Cover: documents required (PAN, Aadhaar, company documents, beneficial ownership declaration), risk classification of clients (low/medium/high risk), enhanced due diligence for high-risk clients (PEPs, high-value transactions), ongoing monitoring requirements, suspicious transaction reporting obligation, and record retention period (5 years).'},
{id:420,cat:'client',diff:'med',tags:'Client,Advisory,Succession,Business Continuity',title:'Business Succession Advisory for Client',prompt:'Prepare a business succession planning note for a first-generation entrepreneur (age 55, sole proprietorship). Cover: legal structure transition options (convert to company/LLP for easier succession), key person insurance requirement, family constitution drafting, estate planning (will, trust), ESOP for key employees if converting to company, FEMA implications if successors are NRIs, and tax planning for wealth transfer to next generation.'},
{id:421,cat:'client',diff:'easy',tags:'Client,ITR,Documents,Checklist,Season',title:'ITR Season Client Document Checklist',prompt:'Create a comprehensive ITR filing document checklist for different client types. Category 1: Salaried individual (Form 16, rent receipts, investment proofs, 26AS, AIS, home loan certificate). Category 2: Business owner (books of accounts, GST returns, TDS certificates, bank statements). Category 3: NRI (foreign income details, TRC, DTAA claim documents, NRO/NRE bank statements). Format: WhatsApp-friendly with checkboxes.'},
{id:422,cat:'client',diff:'easy',tags:'Client,Year Round,Compliance,Reminders,Calendar',title:'Year-Round Client Compliance Reminder Calendar',prompt:'Create a 12-month compliance reminder calendar for CA firm clients. For each month: key compliance deadlines (GST, TDS, advance tax, ROC filings, PF/ESI), proactive advisory tip (e.g., October – plan tax-saving investments; December – advance tax review; March – last chance for 80C investments), and action reminder specific to the month. Format for WhatsApp broadcast or email newsletter.'},

// ═══ DOCUMENT DRAFTING – BATCH 2 ═══
{id:423,cat:'doc',diff:'med',tags:'Document,SOP,Internal Control,Manual',title:'Internal Controls Manual – Finance Department',prompt:'Draft an Internal Controls Manual for the finance department of a mid-size manufacturing company. Cover: purchase-to-pay cycle (vendor onboarding, PO approval matrix, invoice processing, 3-way match), order-to-cash cycle (credit policy, billing, collections), payroll controls (dual authorization, master file access), bank reconciliation process, period-end close controls, and authority matrix (from junior accountant to CFO approval levels).'},
{id:424,cat:'doc',diff:'easy',tags:'Document,CA Certificate,Turnover,Bank,MSME',title:'CA Turnover Certificate – MSME Tender',prompt:'Draft a Turnover Certificate for an MSME company to be submitted for a government tender. Content: certified turnover for the last 3 financial years (FY [year-2], FY [year-1], FY [year]), basis (as per audited financial statements), CA\'s opinion on the reliability of figures, reference to audit report, UDIN generation requirement, and standard ICAI certification language. Include placeholders for all figures.'},
{id:425,cat:'doc',diff:'med',tags:'Document,SHA,Shareholders Agreement,Investor,Rights',title:'Shareholders Agreement – Key Clauses',prompt:'Draft key clauses of a Shareholders Agreement (SHA) for a company with a PE investor holding 30% stake. Include: information rights (quarterly financials within 45 days), affirmative voting rights (investor veto on key decisions), board representation (1 director for 20%+ holding), anti-dilution (broad-based weighted average), tag-along rights (investor can tag on promoter sale), drag-along (if 70%+ decide to sell), ROFR, and exit rights (IPO within 5 years or strategic sale).'},
{id:426,cat:'doc',diff:'med',tags:'Document,Joint Venture,Agreement,JV,Key Terms',title:'Joint Venture Agreement – Key Clauses',prompt:'Draft key clauses for a Joint Venture Agreement between an Indian company (60%) and a foreign company (40%). Include: JV company formation, board composition (3+2 directors), management control, Reserved Matters (requiring 75% approval), deadlock resolution (Russian roulette clause), non-compete (2 years, same business), IP ownership (technology licensed to JV, not transferred), exit mechanism (IPO by Year 7, failing which buy-out at fair value), and FEMA compliance.'},
{id:427,cat:'doc',diff:'easy',tags:'Document,Letter,Format,Regulatory,Authority',title:'Representation Letter to Tax Authority',prompt:'Draft a general representation letter format to be used when a CA appears before a tax authority (Income Tax / GST) on behalf of a client. Cover: authorization under S. 288 of Income Tax Act, identification of client and tax proceedings, description of relief sought, request for adjournment (if needed), professional courtesies, and standard closing. Provide 3 variations: (1) adjournment request, (2) submission of documents, (3) representation after assessment order.'},
{id:428,cat:'doc',diff:'adv',tags:'Document,Financial Statement,Notes,Disclosure',title:'Notes to Financial Statements – Complete Set',prompt:'Draft a complete set of notes to financial statements for a private limited manufacturing company (IGAAP, turnover ₹15 crore, non-Ind AS). Include: Company overview, significant accounting policies (depreciation method, revenue recognition, inventory valuation, provisions), reconciliation of share capital, movement in reserves, fixed asset schedule, borrowings (secured/unsecured), trade payables (MSME disclosure), contingent liabilities, related party transactions, and earnings per share.'},

// ═══ MIS – BATCH 2 ═══
{id:429,cat:'mis',diff:'med',tags:'MIS,Startup,Metrics,Investor,Monthly',title:'Startup Monthly Investor MIS Pack',prompt:'Design a Monthly Investor MIS report pack for a Series A funded startup. Include: Executive Dashboard (MRR, ARR, burn rate, runway, headcount), Business Metrics (customer count, CAC, LTV, churn, NPS), Financial Statements (abridged P&L, cash flow, balance sheet), Variance vs. Budget (key line items), 3-month forward forecast, and highlights & lowlights narrative. Format: 5-slide PPT-style structure for investor calls.'},
{id:430,cat:'mis',diff:'med',tags:'MIS,FMCG,Distribution,Sales,SKU',title:'FMCG Company – Sales & Distribution MIS',prompt:'Design a Sales and Distribution MIS for an FMCG company. Include: Region-wise sales (vs. target), channel-wise split (modern trade/general trade/e-commerce), SKU-wise top 20 by revenue, fill rate %, distributor-wise inventory days, return/damage rate, primary vs. secondary sales comparison, scheme utilization, and market share trend. Weekly flash report + monthly detailed format.'},
{id:431,cat:'mis',diff:'adv',tags:'MIS,Power BI,Dashboard,Visualization',title:'Power BI Dashboard Design for CFO',prompt:'Design a Power BI dashboard architecture for a CFO. Include: data sources to connect (ERP/Tally/bank feeds), key visuals (waterfall chart for P&L, bar chart for receivables aging, gauge chart for cash vs. target, heatmap for expense vs. budget), DAX measures for EBITDA, cash conversion cycle, and working capital, drill-down hierarchy (company → business unit → cost center), and automatic refresh schedule (daily at 7 AM).'},
{id:432,cat:'mis',diff:'med',tags:'MIS,Costing,Product,Contribution,CVP',title:'Product Costing & Contribution Analysis',prompt:'Prepare a product-wise contribution analysis for a company with 5 products. For each product: revenue, variable costs (material, labor, variable overhead), contribution margin (₹ and %), fixed cost allocation (machine hours basis), product profit, and breakeven units. Identify the product mix that maximizes contribution given a bottleneck constraint (machine hours limited to 10,000 hours). Apply Theory of Constraints for optimization.'},

// ═══ PAYROLL – BATCH 2 ═══
{id:433,cat:'payroll',diff:'adv',tags:'Payroll,ESIC,Maternity,Paternity,Leave,Social Security',title:'Social Security Compliance – Complete Guide',prompt:'Create a comprehensive social security compliance guide for a company with 120 employees. Cover: PF (mandatory components, voluntary contributions, International Workers\' PF), ESI (coverage thresholds, medical benefits, disability claims), Gratuity Act (payment schedule, exemption up to ₹20 lakh), Payment of Bonus Act (8.33% to 20%, eligibility ₹21,000/month), Maternity Benefit Act (26 weeks paid leave), and POSH Act (Internal Complaints Committee mandatory for 10+ employees).'},
{id:434,cat:'payroll',diff:'med',tags:'Payroll,Contract Labour,CLRA,Third Party',title:'Contract Labour – CLRA Compliance',prompt:'Advise a principal employer on Contract Labour (Regulation and Abolition) Act 1970 compliance. Cover: registration as principal employer (Form I if >20 contract workers), contractor\'s obligation (license – Form IV if >20 workers), mandatory amenities for contract workers (canteen, restrooms, first aid), wage payment through bank (not cash), EPF/ESI coverage for contract workers, wages register maintenance, and liability of principal employer if contractor defaults on wages.'},
{id:435,cat:'payroll',diff:'easy',tags:'Payroll,Investment Declaration,IT Declaration,Form 12BB',title:'Investment Declaration Form 12BB Guide',prompt:'Create a guide for employees to correctly fill Form 12BB (investment declaration for TDS on salary). Cover: HRA calculation (actual rent vs. 40%/50% of basic vs. rent - 10% of basic), LTA (block year concept – current block 2022-25), home loan interest (S. 24 limit ₹2 lakh), 80C investment options (LIC, PPF, ELSS, home loan principal, tuition fees), 80D medical insurance, 80CCD(1B) NPS additional deduction, and consequences of incorrect declaration.'},
{id:436,cat:'payroll',diff:'med',tags:'Payroll,New Wage Code,Labour Reform,Compliance',title:'New Labour Codes – Payroll Impact',prompt:'Explain the impact of 4 new Labour Codes on payroll when implemented. Cover: Wages Code 2019 (definition of wages – 50% rule for basic, impact on PF computation), Industrial Relations Code (notice period, retrenchment compensation), Social Security Code (PF/ESI changes, gig worker inclusion), Occupational Safety Code (working hours, OT changes). Compute impact on a sample employee\'s cost-to-company and take-home under new vs. old regime.'},

// ═══ STARTUP – BATCH 2 ═══
{id:437,cat:'startup',diff:'med',tags:'Startup,IP,Trademark,Patent,Registration',title:'Startup IP Strategy & Protection',prompt:'Advise a tech startup on intellectual property strategy. Cover: trademark registration (Form TM-A on IP India portal, timeline, classes of goods/services), patent filing (provisional vs. complete specification, PCT application for international protection, S. 35 Income Tax deduction for R&D expenditure, Section 8 Company for patent holding), copyright for software, and trade secret protection (NDA for employees, non-compete). IP audit checklist for pre-funding stage.'},
