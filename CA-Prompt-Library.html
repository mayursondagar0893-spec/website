{id:135,cat:'doc',diff:'med',tags:'MRL,Management Rep,SA 580',title:'Management Representation Letter – SA 580',prompt:'Draft a Management Representation Letter for a private limited company\'s statutory audit for FY [year]. Include all SA 580 standard representations: financial statements completeness, fraud disclosure, legal compliance, post-balance sheet events, related party completeness, IND AS compliance, IT systems data integrity, and pending litigation disclosure.'},
{id:136,cat:'doc',diff:'easy',tags:'Net Worth Certificate,Bank,Visa',title:'Net Worth Certificate – Individual/Company',prompt:'Draft a Net Worth Certificate for: (1) an individual (for visa/bank loan purpose), (2) a company (for government tender). For each: basis of valuation, asset/liability summary, confirmed figures, applicable accounting standards referenced, purpose stated, and standard CA certification language with membership number placeholder.'},
{id:137,cat:'doc',diff:'med',tags:'Bank Loan,Projection,Financial Statement',title:'Bank Loan – Financial Projection Report',prompt:'Prepare a 3-year financial projection report for a company seeking a term loan ₹[amount]. Include: assumptions (detailed), projected P&L, cash flow statement, balance sheet, key ratios (DSCR, current ratio, debt-equity, interest coverage), sensitivity analysis (base vs. downside case), and a brief management discussion narrative.'},
{id:138,cat:'doc',diff:'adv',tags:'Due Diligence,Opinion,Legal Memo',title:'Tax Opinion Memorandum – Goodwill Depreciation',prompt:'Draft a tax opinion memo on: "Is goodwill acquired on amalgamation eligible for depreciation post Finance Act 2021?" Structure: Facts, Issue, Analysis (FA 2021 amendment to S. 32(1)(ii), Supreme Court ruling analysis, effect on tax computation), Conclusion, and Caveats. Suitable for use in litigation.'},
{id:139,cat:'doc',diff:'easy',tags:'Solvency Certificate,Company',title:'Solvency Certificate for Company',prompt:'Draft a Solvency Certificate for a private limited company to present to a foreign principal for securing a contract. Content: company\'s total assets, total liabilities, net worth, CA\'s confirmation of solvency based on latest audited/provisional accounts, standard certification language, and validity period note.'},
{id:140,cat:'doc',diff:'easy',tags:'Debtors Confirmation,Audit,SA 505',title:'Debtors Balance Confirmation Letter',prompt:'Draft a debtors balance confirmation letter (positive form) for statutory audit under SA 505. Letters: (1) first request with balance, (2) follow-up if no response in 14 days, (3) alternative procedures memo if confirmation not received. Include instructions for discrepancies and return address for efficiency.'},

// ═══ MIS & REPORTING ═══
{id:141,cat:'mis',diff:'med',tags:'MIS,Board Report,Monthly',title:'Monthly MIS Report Structure',prompt:'Design a Monthly MIS Report structure for the board of a mid-size manufacturing company. Include: executive summary (3 bullet points), revenue vs. budget variance, gross margin analysis by product line, key expense heads trend, cash position and forecast, debtors/creditors aging summary, KPIs dashboard, and exception highlights with owner names.'},
{id:142,cat:'mis',diff:'med',tags:'Debtors,Aging,ECL,Provision',title:'Debtors Aging Analysis Commentary',prompt:'Based on the following debtor aging data [insert data], write an MIS commentary for management. Highlight: total outstanding, amounts >90 days, top 5 overdue clients, ECL provision required, month-on-month comparison, DSO (Days Sales Outstanding), and recommended collection actions with escalation matrix.'},
{id:143,cat:'mis',diff:'med',tags:'Budget vs Actual,Variance,Commentary',title:'Budget vs Actual Variance Analysis',prompt:'Analyze Budget vs. Actual data for Q2 [year]. Identify top 5 favorable and unfavorable variances. For each variance: explain probable cause in business language (not accounting jargon), assess if structural vs. timing, and suggest corrective actions. Format as a concise executive summary for board presentation.'},
{id:144,cat:'mis',diff:'med',tags:'Cash Flow,13-Week,Liquidity',title:'13-Week Rolling Cash Flow Forecast',prompt:'Prepare a 13-week rolling cash flow forecast for a company with ₹5 crore monthly revenue. Include: opening cash, collections schedule (based on debtor days and customer concentration), salary/statutory payments (GST, TDS, PF, ESI), vendor payments, loan EMIs, and closing cash with minimum buffer alert (e.g., <₹50 lakh trigger).'},
{id:145,cat:'mis',diff:'med',tags:'Working Capital,CCC,Efficiency',title:'Working Capital Efficiency Analysis',prompt:'Analyze working capital efficiency for: [insert CCC, debtor days, creditor days, inventory days]. Compare with industry benchmark, identify improvement levers (faster collections, extended payment terms, inventory reduction), quantify cash release potential if targets met, and present as a 1-page management note with action recommendations.'},
{id:146,cat:'mis',diff:'med',tags:'Year-End Close,Checklist,Audit Ready',title:'Year-End Financial Closing Checklist',prompt:'Generate a comprehensive year-end closing checklist for FY [year]. Cover: ledger scrutiny, provision entries (depreciation, gratuity, bonus, leave encashment), prepaid/accruals, bank reconciliation, fixed asset physical verification, intercompany reconciliation, GST reconciliation, advance tax, related party disclosure, and audit readiness.'},
{id:147,cat:'mis',diff:'med',tags:'KPI,Dashboard,Retail',title:'KPI Dashboard Design – Retail Chain',prompt:'Design a KPI dashboard for a multi-outlet retail chain. Include: revenue per outlet vs. target, inventory turnover ratio, shrinkage %, gross margin by product category, same-store sales growth (SSSG), opex as % of revenue, EBITDA per outlet, working capital days, and top 5 non-performing SKUs. Format for monthly board review.'},
{id:148,cat:'mis',diff:'med',tags:'Treasury,Investments,Liquidity MIS',title:'Treasury MIS – Investment & Liquidity',prompt:'Design a Treasury MIS for a company with ₹10 crore surplus and ₹50 crore debt. Track: investment portfolio (FDs, liquid funds, bonds) with maturity schedule, average cost of funds, interest income vs. expense, net debt position, upcoming repayments (6-month horizon), and liquidity buffer (minimum cash runway in days).'},
{id:149,cat:'mis',diff:'adv',tags:'Segment Reporting,Ind AS 108,Business Unit',title:'Segment Reporting Note – Ind AS 108',prompt:'Prepare a segment reporting note under Ind AS 108 for a company with 3 operating segments (Segment A: ₹30 crore, B: ₹18 crore, C: ₹8 crore). Include: segment identification criteria (CODM approach), revenue, profit, assets, liabilities per segment, inter-segment elimination, reconciliation to financial statements, and major customer disclosure.'},

// ═══ PAYROLL & HR ═══
{id:150,cat:'payroll',diff:'easy',tags:'Salary Structure,CTC,Take-Home',title:'Salary Structure Design – CTC ₹8 Lakh',prompt:'Create a detailed salary structure for an employee with CTC ₹8 lakh per annum. Include: Basic (50%), HRA (40% of basic), Special Allowance, LTA, Medical Reimbursement, employer PF (12%), employee PF (12%), professional tax, TDS deduction formula, and net take-home computation. Show monthly figures with annual total.'},
{id:151,cat:'payroll',diff:'med',tags:'PF,ESI,Compliance,EPFO,ESIC',title:'PF & ESI Monthly Compliance Checklist',prompt:'Create a monthly PF and ESI compliance checklist for a company with 80 employees. Include: PF wage calculation (basic + DA), ECR file generation from payroll software, EPFO portal upload, due dates (15th of following month), UAN generation for new joiners, ESI contribution rates (employer 3.25%, employee 0.75%), and consequences of late deposit.'},
{id:152,cat:'payroll',diff:'med',tags:'Full and Final,Gratuity,Settlement',title:'Full & Final Settlement Computation',prompt:'Compute Full & Final Settlement for an employee resigning after 6 years 4 months of service. Include: last month salary (pro-rata for 23 days), earned leave encashment (42 days), gratuity calculation (6 years × last salary × 15/26), bonus payable, PF settlement guidance, TDS on F&F settlement, and draft the settlement letter.'},
{id:153,cat:'payroll',diff:'easy',tags:'Form 16,TDS Certificate,Employee',title:'Form 16 Explanation Email to Employees',prompt:'Draft an email explaining Form 16 for AY [year] to employees. Cover: Part A (TDS certificate from TRACES), Part B (salary breakup and deductions), how to use it for ITR filing (pre-fill option), what to do if TDS is insufficient, corrections process if errors found, and deadline to file ITR. Use simple non-technical language.'},
{id:154,cat:'payroll',diff:'med',tags:'Labour Law,Calendar,Maharashtra',title:'Labour Law Compliance Calendar – Maharashtra',prompt:'Generate an annual labour law compliance calendar for a company in Maharashtra with 100 employees. Include: PF (ECR by 15th), ESI (by 15th), professional tax (monthly/annually), gratuity coverage, bonus payment (October-November), minimum wages revision (April/October), Shops & Establishment renewal, CLRA compliance, and contract labour register maintenance.'},
{id:155,cat:'payroll',diff:'adv',tags:'Gratuity,Ind AS 19,Actuarial',title:'Gratuity Actuarial Valuation – Ind AS 19',prompt:'Explain actuarial valuation of gratuity liability under Ind AS 19. Cover: projected unit credit method, inputs needed (attrition rate, salary growth rate, discount rate from G-Sec yield), OCI approach vs. corridor approach, balance sheet recognition (net defined benefit liability), P&L charge, OCI charge, and how to review the actuary\'s report for audit purposes.'},
{id:156,cat:'payroll',diff:'med',tags:'FBP,Flexible Benefits,Tax Optimization',title:'Flexible Benefits Plan (FBP) Design',prompt:'Design a Flexible Benefits Plan for a company with 200 employees (average CTC ₹8 lakh). Core components (non-flexible) + flexible basket (internet, telephone, fuel, books, LTA, gadgets). Tax-exempt limits under Income Tax Act for each component, optimization strategy by salary slab, and HR policy note for implementation.'},
{id:157,cat:'payroll',diff:'easy',tags:'ESIC,Maternity,PF Claim',title:'ESIC & Maternity Benefit Advisory',prompt:'Advise an HR manager on: (1) ESIC maternity benefit – eligibility, amount (26 weeks full wages), medical bonus, how to claim through ESIC portal, (2) maternity benefit under Maternity Benefit Act (non-ESIC employees), (3) creche facility obligation (50+ employees), and (4) leaves payable during maternity period under various acts.'},

// ═══ STARTUP & ADVISORY ═══
{id:158,cat:'startup',diff:'adv',tags:'Financial Model,Review,Unit Economics',title:'Startup Financial Model Review',prompt:'Review startup financial projections for FY1-FY3. Identify: unrealistic revenue growth assumptions, missing cost heads, incorrect unit economics (CAC, LTV, payback period), cash burn analysis, runway calculation, cohort analysis gaps, and provide corrected commentary suitable for pre-Series A investor meeting. Data: [insert].'},
{id:159,cat:'startup',diff:'med',tags:'Entity,LLP,Private Limited,Structure',title:'Startup Entity Structure Advisory',prompt:'Advise a 2-founder tech startup planning foreign investment in 12 months. Compare: Sole Proprietorship vs LLP vs Private Limited Company. Cover: tax efficiency, FDI readiness, ESOP issuance, compliance burden, personal liability, DPIIT recognition eligibility, exit options, and definitive recommendation with implementation steps.'},
{id:160,cat:'startup',diff:'adv',tags:'ESOP,Vesting,Scheme,Tax',title:'ESOP Scheme Design & Tax Note',prompt:'Draft an advisory note on ESOP scheme design for a startup issuing ESOPs to 10 key employees. Cover: vesting schedule (4-year, 1-year cliff), exercise price determination (FMV vs. discount), tax at exercise (perquisite), tax at sale (STCG/LTCG), FEMA if non-resident employees, Companies Act compliance (Form PAS-3), and accounting under Ind AS 102.'},
{id:161,cat:'startup',diff:'med',tags:'Pitch Deck,Financial Slides,Investor',title:'Investor Pitch Deck Financial Slides',prompt:'Create content for financial slides of a SaaS startup pitch deck. Slides needed: (1) Current Financials (MRR ₹X, ARR ₹Y, burn ₹Z), (2) Use of Funds (₹5 crore raise - deployment plan), (3) 3-Year Financial Projections, (4) Key Metrics (LTV, CAC, gross margin, churn, NRR). Keep numbers-forward and investor-friendly with clear assumptions.'},
{id:162,cat:'startup',diff:'med',tags:'Government Scheme,SIDBI,CGTMSE,PLI',title:'Government Scheme Eligibility Analysis',prompt:'Analyze government schemes available for a manufacturing startup (3 years old, turnover ₹2.5 crore, MSME registered). Cover: CGTMSE (credit guarantee), SIDBI loans, PLI scheme applicability, Startup India recognition, S. 80-IAC tax exemption, DPIIT recognition benefits, and state-level schemes for [state]. Eligibility criteria for each.'},
{id:163,cat:'startup',diff:'adv',tags:'Valuation,DCF,Series A',title:'Startup Valuation Note – Fund Raise',prompt:'Summarize a startup valuation for Series A fund raise using DCF method. Assumptions: [insert]. Calculate: FCF projections, terminal value, enterprise value, equity value, value per share for ESOP and investor pricing. Also compute EV/Revenue and EV/EBITDA implied multiples and compare with listed peer multiples as sanity check.'},
{id:164,cat:'startup',diff:'adv',tags:'Term Sheet,VC,Investment Terms',title:'Term Sheet Analysis – VC Investment',prompt:'Analyze term sheet provisions for ₹5 crore seed investment at 25% equity: pre-money valuation implication, liquidation preference (1x non-participating vs. participating full-ratchet), anti-dilution clause (broad-based weighted average), pro-rata rights, drag-along, ROFR/co-sale provisions, information rights scope. Highlight founder-friendly vs investor-friendly terms and red flags.'},
{id:165,cat:'startup',diff:'med',tags:'Founders Agreement,Equity,Vesting',title:'Founders\' Agreement Key Clauses',prompt:'Draft key clauses for a Founders Agreement for a 3-founder startup before incorporation. Include: roles and responsibilities matrix, equity split (vesting for all founders – 4-year 1-year cliff), IP assignment to company, non-compete (2 years post-exit), divorce/death clause for equity, buy-back rights if founder exits, and dispute resolution (arbitration, Mumbai jurisdiction).'},

// ═══ PRACTICE MANAGEMENT ═══
{id:166,cat:'pm',diff:'easy',tags:'SOP,Client Onboarding,Process',title:'CA Firm SOP – Client Onboarding',prompt:'Design a Standard Operating Procedure for client onboarding at a CA firm. Cover: initial consultation checklist, engagement letter drafting and signing, KYC/AML due diligence (PAN, Aadhaar verification), client data entry in practice management software, client manager assignment, compliance calendar setup, and welcome communication workflow.'},
{id:167,cat:'pm',diff:'med',tags:'Performance Review,Staff,KPI',title:'Staff Performance Review Template',prompt:'Create a semi-annual performance review template for CA firm staff. Include: technical competence ratings (GST, Income Tax, Audit with sub-parameters), soft skills (client communication, teamwork, time management), targets vs. achievement, training completed, error/rework rate, client feedback score, billing recovery rate, and development goals for next 6 months.'},
{id:168,cat:'pm',diff:'med',tags:'Billing,Recovery,MIS,WIP',title:'Billing & Recovery MIS',prompt:'Design a billing and recovery MIS for a CA firm with 50 clients. Include: monthly billing target vs. actual, work-in-progress aging (0-30/31-60/61-90/90+ days), invoices outstanding by client, recovery rate %, partner-wise billing performance, and automated alerts for clients not billed in 45 days. Excel-compatible format.'},
{id:169,cat:'pm',diff:'adv',tags:'Peer Review,ICAI,Quality Control',title:'ICAI Peer Review Preparation',prompt:'Prepare a CA firm for ICAI Peer Review. Cover: quality control policies (Engagement Quality Control Review), client acceptance/continuance procedures, engagement performance documentation (working papers), professional development records, monitoring procedures, ethical requirements, and specific areas flagged in recent peer review observations.'},
{id:170,cat:'pm',diff:'med',tags:'Articleship,Training,ICAI',title:'3-Year Articleship Training Program',prompt:'Design a structured 3-year articleship training program for a CA firm with 8 articled assistants. Include: rotation schedule (audit/tax/GST/accounts by term), monthly learning targets, supervisor assignment, Excel and communication training, mock CA exam support timetable, performance assessment calendar, and ICAI training requirements compliance.'},
{id:171,cat:'pm',diff:'easy',tags:'Website,Content,Digital Marketing',title:'CA Firm Website Content Plan',prompt:'Create a content plan for a CA firm\'s professional website. Include: home page messaging (USP, tagline), service pages for each practice area, team bio format, client testimonials strategy, thought leadership blog calendar (12 topics), contact form optimization, SEO keywords for CA practice in [city], and LinkedIn integration strategy.'},
{id:172,cat:'pm',diff:'easy',tags:'WhatsApp,Broadcast,Client Management',title:'WhatsApp Communication Strategy – CA Firm',prompt:'Design a WhatsApp broadcast communication strategy for a CA firm managing 150 clients. Client segmentation (individual/corporate/HNI), message frequency (weekly max), content calendar (tax reminders, regulatory updates, due date alerts), message format guidelines, opt-out handling, and 12 ready-to-use broadcast message templates.'},
{id:173,cat:'pm',diff:'easy',tags:'Time Sheet,Billing,Utilization',title:'Time Tracking & Billing Efficiency System',prompt:'Design a time-tracking system for a CA firm. Activity categories (compliance/advisory/audit/admin/BD), client code assignment, billable vs. non-billable tracking, daily timesheet format, monthly utilization report, recovery rate formula (fees billed / hours worked × standard rate), and benchmarks for CA staff (75%+ billable hours target).'},
{id:174,cat:'pm',diff:'med',tags:'Client Termination,Exit,Professional Ethics',title:'Client Termination Letter',prompt:'Draft a professional client termination letter for: persistent fee non-payment + demands for out-of-scope work. Include: notice period per engagement letter, commitment to complete critical pending filings before exit, document handover process, professional obligation not to prejudice client during transition, and offer to assist successor CA with smooth handover.'},
{id:175,cat:'pm',diff:'med',tags:'Partnership Reconstitution,New Partner,ICAI',title:'CA Firm Partnership Reconstitution',prompt:'Guide through admitting a new partner into a CA firm. Cover: ICAI permission requirement, amendment of partnership deed, Form 18 filing with ICAI, minimum profit-sharing ratio compliance, bank account update, GST registration amendment, income tax filing change, and client communication about new partner\'s role.'},

// ═══ DUE DILIGENCE & M&A ═══
{id:176,cat:'dd',diff:'adv',tags:'FDD,Financial DD,Acquisition',title:'Financial Due Diligence Report Framework',prompt:'Prepare an FDD report framework for acquisition of a private limited company with revenue ₹35 crore in B2B services. Cover: quality of earnings (normalized EBITDA), working capital analysis (peg vs. normalized), debt and debt-like items, capex patterns, related party transactions, off-balance sheet liabilities, key contract dependencies, and red flags.'},
{id:177,cat:'dd',diff:'adv',tags:'Tax DD,Checklist,Acquisition',title:'Tax Due Diligence Checklist',prompt:'Comprehensive tax DD checklist for acquisition of a manufacturing company. Cover: Income Tax (assessment status, pending litigations, MAT credit, carried forward losses, S. 79 restriction on loss utilization), GST (ITC eligibility, pending notices), TDS defaults, TP exposure, customs/excise legacy liabilities, and potential tax synergies post-acquisition.'},
{id:178,cat:'dd',diff:'adv',tags:'Deal Structure,SPA,Slump Sale',title:'M&A Deal Structure Advisory',prompt:'Advise on optimal deal structure for acquiring 70% stake in a private limited company for ₹40 crore. Compare: Share Purchase Agreement vs. Slump Sale vs. Itemized Asset Purchase. Cover: tax efficiency for seller/buyer, stamp duty, GST treatment, CCI clearance (if applicable), warranty and indemnity provisions, and recommended structure with implementation roadmap.'},
{id:179,cat:'dd',diff:'adv',tags:'Post-Merger Integration,PMI,100 Days',title:'Post-Merger Integration Checklist',prompt:'Create a 100-day post-merger integration checklist after acquiring a smaller competitor. Cover: legal integration (amalgamation vs. subsidiary), financial systems integration, GST registration rationalization, bank account consolidation, employee harmonization (PF, ESI, gratuity), customer/vendor communication, brand strategy, and compliance calendar for merged entity.'},
{id:180,cat:'dd',diff:'adv',tags:'VDD,Vendor Due Diligence,Sale Side',title:'Vendor Due Diligence (VDD) Report',prompt:'Prepare a Vendor Due Diligence report for a promoter selling 100% stake. Proactively address: historical EBITDA normalization adjustments, working capital analysis, key contract change-of-control clauses, IP ownership confirmation, litigation disclosure matrix, employee retention risk, and present company in best possible light while maintaining disclosure integrity.'},

// ═══ EXCEL & AUTOMATION ═══
{id:181,cat:'excel',diff:'med',tags:'TDS Return,26Q,Excel Formula',title:'TDS Return Data Preparation – Excel',prompt:'Write an Excel formula process to prepare TDS return data (Form 26Q) from a raw payment register. Input columns: Date, Vendor Name, PAN, Payment Amount, Nature of Payment (section). Output: TDS deductible, TDS rate (via VLOOKUP), TDS amount, net payment. Include PAN format validation formula and error flagging for missing PANs.'},
{id:182,cat:'excel',diff:'med',tags:'GSTR-1,Tally,Data Preparation',title:'GSTR-1 Data Preparation from Tally Export',prompt:'Guide through GSTR-1 upload data preparation from Tally Prime export. Steps: export sales register, clean GSTIN data, split by invoice type (B2B/B2C large/B2C small/export), validate GSTIN using formula, compute taxable value and tax amounts per slab, validate HSN codes against master, and create upload-ready format for GST portal.'},
{id:183,cat:'excel',diff:'adv',tags:'Bank Reconciliation,Auto Match,VLOOKUP',title:'Automated Bank Reconciliation – Excel Template',prompt:'Build an automated bank reconciliation template in Excel. Features: paste bank statement in Sheet1, book entries in Sheet2, auto-match by amount + date (within ±3 days using array formula), flag unmatched items (red conditional formatting), prepare reconciliation summary, and auto-calculate outstanding cheques and uncleared deposits.'},
{id:184,cat:'excel',diff:'adv',tags:'Depreciation,WDV,SLM,Fixed Assets',title:'Depreciation Schedule – Multiple Methods',prompt:'Build a comprehensive depreciation schedule in Excel for 30 assets. Include: SLM (Companies Act rates), WDV (Income Tax), Ind AS 16 component accounting, automatic computation based on asset category lookup table, mid-year addition/disposal handling, deferred tax computation (timing difference), and printable asset-wise + class-wise summary.'},
{id:185,cat:'excel',diff:'adv',tags:'Salary Register,TDS,Form 24Q',title:'Automated Salary Register & TDS Computation',prompt:'Design an automated salary register in Excel for 50 employees for FY [year]. Include: salary components (Basic, HRA, DA, allowances, perks), Chapter VI-A deductions (investment declaration dropdown), standard deduction, new vs. old regime auto-switch, monthly TDS computation per S. 192, marginal relief for high-income employees, and Form 24Q preparation.'},
{id:186,cat:'excel',diff:'med',tags:'Compliance Tracker,Due Dates,Client',title:'Client Compliance Tracker – Master Sheet',prompt:'Design a master compliance tracker in Excel for a CA firm with 80 clients. Track: ITR, GST monthly/quarterly returns, TDS returns, ROC filings, audit completion, advance tax payments. Conditional formatting: red if overdue, yellow if due within 7 days, green if complete. Include: client-wise completion %, partner-wise workload, and filter by due date.'},
{id:187,cat:'excel',diff:'adv',tags:'Trial Balance,Audit,Working Paper',title:'Audit Working Paper – Trial Balance Analysis',prompt:'Design an Excel audit working paper for trial balance analysis. Features: import trial balance, auto-classify into P&L and BS, compute key ratios, year-on-year variance (flag >10% in yellow, >25% in red), identify negative balances in wrong sign, materiality-based risk rating, and hyperlink to supporting working paper schedules.'},
{id:188,cat:'excel',diff:'adv',tags:'Cash Flow Statement,Indirect Method,Formula',title:'Indirect Cash Flow Statement – Excel Model',prompt:'Create an Excel model for an Indirect Method Cash Flow Statement from P&L and Balance Sheet. Formula logic: start with PAT, add back depreciation/non-cash items, adjust working capital changes (delta of debtors, creditors, inventory), investing activities from FA schedule, financing from loan schedule. Auto-reconcile with opening/closing cash balance.'},
{id:189,cat:'excel',diff:'adv',tags:'Income Tax Computation,Corporate,MAT',title:'Corporate Income Tax Computation Sheet',prompt:'Build an Excel corporate income tax computation sheet. Rows: Net profit as per books, additions (disallowances S. 30-37, S. 43B), deductions (80G/80JJAA/80IAC), book profit for MAT (S. 115JB adjustments), normal tax vs. MAT comparison, surcharge tiers, cess, advance tax credit, TDS credit, and self-assessment tax payable.'},
{id:190,cat:'excel',diff:'med',tags:'AP Aging,MSME,Vendor',title:'Accounts Payable Aging with MSME Flag',prompt:'Design an AP aging model in Excel. Input: vendor ledger with invoice date and amounts. Output: aging buckets (0-30/31-60/61-90/90+ days), vendor-wise outstanding, MSME vendor flag (for interest calculation under MSMED Act at 3× bank rate), payment priority queue, and top 10 vendors by outstanding with days beyond credit period.'},
{id:191,cat:'excel',diff:'adv',tags:'GST Reconciliation,GSTR-2B,ITC',title:'GST ITC Reconciliation Template – Excel',prompt:'Build a comprehensive GST ITC reconciliation template in Excel. Tabs: (1) GSTR-2B import, (2) Purchase Register, (3) Auto-matching by invoice number + GSTIN, (4) Mismatch analysis by type (GSTIN error, date difference, amount mismatch, not in GSTR-2B), (5) Summary with ITC at risk amount, and (6) Action tracker with owner and due date.'},
{id:192,cat:'excel',diff:'med',tags:'Dashboard,Charts,KPI',title:'Financial Dashboard in Excel – CFO View',prompt:'Build a CFO-level financial dashboard in Excel using charts and conditional formatting. Include: revenue trend (12-month sparkline), gross margin %, EBITDA %, cash position gauge, debtors aging donut chart, budget vs. actual waterfall chart, and 5 KPI boxes with target vs. actual and traffic light indicators. No VBA required - formula based.'},

// ═══ SEBI & CAPITAL MARKETS ═══
{id:193,cat:'sebi',diff:'adv',tags:'LODR,Listing Obligations,Compliance',title:'SEBI LODR Compliance Checklist',prompt:'Create a quarterly compliance checklist for a BSE/NSE listed company under SEBI (LODR) Regulations 2015. Include: board meeting intimation (2 working days prior), financial results timelines (45 days for quarterly, 60 days for annual), corporate governance report, shareholding pattern (SHP), insider trading policy updates, and NEAPS/BSE Listing Centre filing deadlines.'},
{id:194,cat:'sebi',diff:'adv',tags:'Insider Trading,UPSI,PIT Regulations',title:'SEBI Insider Trading – UPSI Framework',prompt:'Design a framework for managing UPSI under SEBI PIT Regulations 2015. Cover: designated persons list (criteria and updation), trading window closure procedure, pre-clearance form and process, contra-trade prohibition (6 months), Structured Digital Database (SDD) mandatory fields, employee awareness training content, and SEBI inspection readiness.'},
{id:195,cat:'sebi',diff:'adv',tags:'IPO,Readiness,DRHP,Pre-IPO',title:'IPO Readiness Assessment',prompt:'Assess readiness of a company planning IPO in 18 months (revenue ₹150 crore). Cover: SEBI eligibility criteria, corporate governance gaps (independent directors, audit committee, NC, RC composition), related party transaction cleanup, financial statement restatement needs (3 years audited Ind AS), DRHP disclosure items, and pre-IPO action plan with timeline.'},
{id:196,cat:'sebi',diff:'adv',tags:'AIF,PMS,Registration,SEBI',title:'AIF vs PMS Regulatory Advisory',prompt:'Advise a wealth manager on choosing between Portfolio Management Service (PMS) and Alternative Investment Fund (AIF – Category II). Cover: minimum investment (PMS ₹50 lakh, AIF ₹1 crore), regulatory requirements, tax pass-through for AIF (Category I/II only), investor reporting obligations, fee structure differences, SEBI registration process, and target investor type.'},
{id:197,cat:'sebi',diff:'adv',tags:'Buyback,S.115QA,Tax,SEBI',title:'Share Buyback – Tax & SEBI Compliance',prompt:'Advise a listed company on share buyback through open market route. Cover: SEBI Buyback Regulations compliance (25% size limit of paid-up capital + free reserves), board/shareholder resolution, offer period compliance, Form SH-8/SH-9, buyback tax S. 115QA (20% on distributed income at company level), and EPS/book value impact post-buyback.'},
{id:198,cat:'sebi',diff:'med',tags:'Bonus Shares,S.63,SEBI',title:'Bonus Issue Procedure',prompt:'Draft the complete procedure for a bonus share issue by a listed company (1:1 ratio). Cover: board resolution, approval at AGM if required, SEBI announcement timeline, determination of record date, allotment process, ROC Form PAS-3, listing application to exchange, ISIN for new shares, and tax implications for shareholders (cost computation).'},

// ═══ CUSTOMS & IMPORT-EXPORT ═══
{id:199,cat:'customs',diff:'med',tags:'Customs,Import Duty,Classification,HSN',title:'Customs Duty Classification – Tariff Advisory',prompt:'Determine the correct Customs Tariff Heading (CTH) and applicable Basic Customs Duty (BCD), IGST for imported goods: [describe goods]. Cover: CTH determination (Notes to Section/Chapter, Explanatory Notes to HSN), BCD rate, social welfare surcharge (10% of BCD), IGST computation, applicable exemption notifications (if any), and effective import cost calculation.'},
{id:200,cat:'customs',diff:'adv',tags:'DGFT,SEIS,MEIS,RoDTEP,Export Incentive',title:'Export Incentive Schemes Advisory',prompt:'Advise an exporter on available export incentive schemes. Cover: RoDTEP (Remission of Duties and Taxes on Exported Products) – rates and claim process, SEIS (Service Exports from India Scheme) – eligibility and scrip use, Interest Equalization Scheme, Advance Authorization for zero-duty imports, and EPCG for capital goods import at concessional duty.'},
{id:201,cat:'customs',diff:'adv',tags:'Anti-Dumping,CVD,ADD Duty',title:'Anti-Dumping Duty Advisory',prompt:'Advise an importer on Anti-Dumping Duty (ADD) implications for importing steel products from China. Cover: ADD notification check (DGTR website), ADD rate applicable to specific product (determination by country of origin), applicability to bonded goods, impact on landed cost, whether ADD can be passed on under GST, and review petition process if ADD is excess.'},
{id:202,cat:'customs',diff:'med',tags:'SEZ,FTP,Special Economic Zone',title:'SEZ Benefits & Compliance',prompt:'Advise a company considering setting up a unit in a Special Economic Zone. Cover: approval process (Board of Approval), annual performance review (NFE condition), DTA supplies treatment, GST implications (supplies from SEZ to DTA vs. export), income tax exemption (S. 10AA), maintenance of records, and comparison with EOU/STPI schemes.'},
{id:203,cat:'customs',diff:'med',tags:'Advance Authorization,Zero Duty,SION',title:'Advance Authorization Scheme',prompt:'Guide through the Advance Authorization scheme under Foreign Trade Policy. Cover: eligibility (pre-export vs. post-export AA), Standard Input Output Norms (SION), application to DGFT, zero-duty import of inputs, export obligation period and extension, redemption process, Bank Guarantee requirement, and consequences of non-fulfillment of export obligation.'},
{id:204,cat:'customs',diff:'adv',tags:'Transfer Pricing,Customs Valuation,Rule 10B',title:'Customs Valuation – Transfer Pricing Interplay',prompt:'Analyze the interplay between Customs Valuation Rules and Transfer Pricing for imports from related party. Cover: transaction value rejection risk by Customs under Rule 3, use of other valuation methods (Rules 4-9), simultaneous audit by Customs and IT for the same transaction, Safe Harbor provisions, and documentation strategy to satisfy both authorities.'},

// ═══ INTERNATIONAL TAX / DTAA ═══
{id:205,cat:'intax',diff:'adv',tags:'DTAA,Treaty,Withholding Tax',title:'DTAA Benefit Claim – Procedure & Documentation',prompt:'Guide through claiming DTAA benefits to reduce withholding tax on dividend/royalty/fee for technical services payment to a foreign entity. Cover: Tax Residency Certificate (TRC) requirement, Form 10F submission by foreign entity, LOB clause analysis, Principal Purpose Test (PPT), requisite documentation for IT officer if TDS is challenged, and risk of treaty abuse allegation.'},
{id:206,cat:'intax',diff:'adv',tags:'PE,Permanent Establishment,Taxation',title:'Permanent Establishment – Risk Analysis',prompt:'Assess Permanent Establishment (PE) risk for a foreign company with activities in India: sales agents who habitually exercise authority to conclude contracts, a server hosted in India, and employees who work from India for 120 days/year. Apply DTAA PE article, OECD Commentary post-BEPS, threshold analysis, and advisory to mitigate PE exposure.'},
{id:207,cat:'intax',diff:'adv',tags:'BEPS,Pillar 2,Global Minimum Tax',title:'BEPS Pillar 2 – Indian Impact Assessment',prompt:'Assess the impact of BEPS Pillar 2 (Global Minimum Tax at 15%) on an Indian MNC group with operations in low-tax jurisdictions (Mauritius, Singapore, Cayman Islands). Cover: GloBE rules applicability (consolidated revenue >€750 million threshold), Income Inclusion Rule (IIR), UTPR, QDMTT implementation in India, and tax planning implications.'},
{id:208,cat:'intax',diff:'adv',tags:'CFC,Passive Income,S.9,Foreign Subsidiary',title:'Controlled Foreign Corporation – India Context',prompt:'Advise on whether income of a foreign subsidiary of an Indian company would be attributed to the Indian parent under CFC-like provisions. Cover: India\'s current position (no CFC legislation), risk under POEM rules, S. 9 attribution principles, BEPS Action 3 recommendations, comparison with the US/UK CFC regime, and structuring to minimize unintended attribution.'},
{id:209,cat:'intax',diff:'med',tags:'DTAA,India-UAE,Dividend,Capital Gains',title:'India-UAE DTAA – Key Benefits',prompt:'Summarize key benefits under the India-UAE DTAA for a UAE-based NRI. Cover: dividend withholding tax rate, capital gains exemption on sale of Indian shares, interest income treatment, pension income, tax residency certificate requirements, LOB (Limitation of Benefits) clause, applicability to recently amended Article 13, and practical structuring considerations.'},
{id:210,cat:'intax',diff:'med',tags:'Mauritius,DTAA,Grandfathering,FPI',title:'India-Mauritius DTAA – Post-2016 Position',prompt:'Explain the current position of India-Mauritius DTAA post-2016 amendment. Cover: grandfathering of investments made before April 1, 2017, new capital gains taxation from April 2019 (50% benefit lost), LOB clause conditions for treaty benefits, S. 68 implications for unexplained investments from Mauritius, and current attractiveness of Mauritius route for FPIs.'},

// ═══ SECTOR-SPECIFIC ═══
{id:211,cat:'sector',diff:'med',tags:'Healthcare,Pharmacy,GST,Tax',title:'Healthcare & Pharma Sector – Tax Advisory',prompt:'Advise a pharmaceutical company on: (1) GST on composite supply of medicines + consultation at hospital, (2) Transfer Pricing for API export to group company, (3) Income Tax deduction under S. 35 for R&D expenditure, (4) customs duty on API imports, (5) NPPA price control implications. Provide a comprehensive sector tax note.'},
{id:212,cat:'sector',diff:'med',tags:'IT Company,Software,Tax,GST',title:'IT Company – Tax & GST Comprehensive Note',prompt:'Prepare a comprehensive tax and compliance note for an IT company with domestic and export clients. Cover: GST on software development (9823 SAC), export of services (LUT), SEZ client billing, transfer pricing for onshore-offshore model, S. 80-IC/S. 10AA benefits, software license vs. service distinction, and withholding tax on software payments to foreign vendors.'},
{id:213,cat:'sector',diff:'med',tags:'Manufacturing,Industry,Tax Planning',title:'Manufacturing Company Tax Planning',prompt:'Develop a tax planning note for a manufacturing company with revenue ₹50 crore. Cover: new manufacturing company S. 115BAB concessional tax rate (15%), accelerated depreciation benefits, R&D deduction (S. 35(1)(iia) at 100%), PLI scheme interaction with tax benefits, MAT computation, deferred tax strategy, and export incentive utilization.'},
{id:214,cat:'sector',diff:'med',tags:'Real Estate Developer,Tax,GST',title:'Real Estate Developer – Complete Tax Note',prompt:'Prepare a complete tax and GST note for a real estate developer. Cover: Income Tax (project completion method vs. percentage completion, S. 80-IBA affordable housing deduction, S. 43CA on undervalued sales), GST (under-construction rates, affordable housing exemption, JDA/TDR treatment), stamp duty planning, and annual compliance calendar.'},
{id:215,cat:'sector',diff:'med',tags:'Agriculture,Farm Income,Tax',title:'Agricultural Income & Related Tax Issues',prompt:'Advise on tax treatment for a large farmer with agricultural income ₹15 lakh, non-agricultural income ₹8 lakh, and income from agri-processing unit ₹12 lakh. Cover: agricultural income partial integration method, agri-processing income classification (business vs. agricultural), tax-free dividends from agri co-operative, and land sale capital gains (agricultural land exemption conditions).'},
{id:216,cat:'sector',diff:'adv',tags:'Cooperative,Deduction,S.80P',title:'Cooperative Society – Tax Advisory',prompt:'Advise a primary agricultural credit cooperative society on: (1) S. 80P deductions available and their limits, (2) requirement to file ITR (S. 139(4C)), (3) GST registration requirement for cooperatives, (4) TDS obligations, (5) audit under Multi-State Co-operative Societies Act vs. Companies Act, and (6) treatment of bonus shares/dividends to members.'},
{id:217,cat:'sector',diff:'med',tags:'NGO,Section 8,Trust,FCRA Compliance',title:'Educational Institution – Tax & Compliance',prompt:'Advise a private educational institution (Section 10(23C) or Section 12AB registered trust running a school). Cover: exemption under S. 10(23C)(iiad) for annual receipts <₹5 crore, application of income requirement, surplus investment restrictions, fee collection accounting, GST exemption for educational services, and annual compliance calendar.'},

// ═══ TAX LITIGATION ═══
{id:218,cat:'litigation',diff:'adv',tags:'CIT(A),Appeal,Income Tax,First Appeal',title:'CIT(A) Appeal Preparation',prompt:'Prepare a comprehensive appeal to Commissioner of Income Tax (Appeals) against a scrutiny assessment order. Structure: grounds of appeal (each ground separately stated), statement of facts, legal submissions (with case laws), documentary evidence list, and prayer. Dispute: disallowance of business expenditure of ₹[X] lakh claimed under S. 37(1) as capital in nature.'},
{id:219,cat:'litigation',diff:'adv',tags:'ITAT,Income Tax Appellate Tribunal',title:'ITAT Appeal Memo – S. 68 Addition',prompt:'Draft an appeal memorandum to ITAT against CIT(A) order confirming S. 68 addition for cash credits. Include: detailed grounds of appeal, factual matrix, legal arguments (burden of proof, identity/creditworthiness/genuineness analysis), binding ITAT and HC precedents in assessee\'s favor, and distinguishing adverse judgements cited by revenue.'},
{id:220,cat:'litigation',diff:'adv',tags:'Penalty,S.271(1)(c),Concealment',title:'Reply to Penalty Notice – S. 271(1)(c)',prompt:'Draft a reply to show cause notice for penalty under S. 271(1)(c) for concealment of income / furnishing inaccurate particulars for AY [year]. Dispute: the addition was due to a genuine difference of opinion on allowability of deduction, not concealment. Include: distinction between S. 271(1)(c) limbs, mens rea requirement, leading SC/HC judgements against levy, and prayer.'},
{id:221,cat:'litigation',diff:'adv',tags:'Settlement,VSVA,Vivad se Vishwas',title:'Vivad se Vishwas Scheme Advisory',prompt:'Advise a client on opting for the Vivad se Vishwas scheme for settlement of pending income tax disputes. Cover: eligible disputes, amount payable (disputed tax / disputed interest / disputed penalty scenarios), additional amount for appeal filed before ITAT vs. HC, Form 1 filing, Form 2 from department, consequences of withdrawal of pending appeals, and comparison with continuing litigation.'},
{id:222,cat:'litigation',diff:'med',tags:'Rectification,S.154,Mistake Apparent',title:'Rectification Application – S. 154',prompt:'Draft a rectification application under S. 154 to the Assessing Officer for AY [year]. Mistake apparent from record: (1) credit for TDS deducted not given as appearing in Form 26AS, (2) double inclusion of income reflected in Form 26AS. Include: identification of specific mistake, computation of tax impact, request for fresh intimation/order, and urgency note.'},
{id:223,cat:'litigation',diff:'adv',tags:'GST Tribunal,GSTAT,Appeal',title:'GSTAT Appeal Preparation',prompt:'Prepare an appeal to the GST Appellate Tribunal (GSTAT) against AAAR order on classification of a product as goods vs. service. Include: grounds of appeal, legal position (relevant CGST Act provisions, AAR/AAAR precedents from other states, Supreme Court rulings on similar classification disputes), and specific prayer for reclassification with rate benefit.'},
{id:224,cat:'litigation',diff:'adv',tags:'Prosecution,S.276C,Willful Evasion',title:'Reply to Prosecution Notice – S. 276C',prompt:'Draft a reply to prosecution notice under S. 276C(1) for alleged willful attempt to evade tax. Include: denial of willful intent, factual explanation for alleged discrepancy (clerical error / different interpretation / reliance on professional advice), distinction between wilful evasion and bonafide mistake, SC judgements on mens rea requirement, and request for dropping prosecution.'},

// ═══ IND AS / ACCOUNTING STANDARDS ═══
{id:225,cat:'indas',diff:'adv',tags:'Ind AS 115,Revenue,5-Step Model',title:'Revenue Recognition – Ind AS 115 Analysis',prompt:'Apply Ind AS 115 five-step model to the following revenue arrangements: (1) software implementation with multiple performance obligations (license + implementation + AMC), (2) variable consideration with refund rights, (3) bill-and-hold arrangement. For each: identify distinct performance obligations, allocate transaction price, timing of revenue recognition, and disclosure note.'},
{id:226,cat:'indas',diff:'adv',tags:'Ind AS 116,Leases,ROU,Lessee',title:'Ind AS 116 Lease Accounting – Lessee',prompt:'Compute lease accounting entries for a lessee under Ind AS 116. Lease: 5-year office lease, monthly rent ₹2 lakh, incremental borrowing rate 10%. Compute: right-of-use asset, lease liability, interest expense (effective interest method for 5 years), depreciation, P&L vs. old IGAAP comparison, and balance sheet impact at inception and each year-end.'},
{id:227,cat:'indas',diff:'adv',tags:'Ind AS 109,Financial Instruments,ECL',title:'Financial Instruments – Ind AS 109 & ECL',prompt:'Explain the Expected Credit Loss (ECL) provisioning under Ind AS 109 for trade receivables. Cover: 3-stage approach (12-month ECL vs. lifetime ECL), simplified approach for trade receivables (provision matrix), probability of default estimation, loss given default, exposure at default, and practical example with receivable aging data for a manufacturing company.'},
{id:228,cat:'indas',diff:'adv',tags:'Ind AS 103,Business Combination,IFRS 3',title:'Business Combination – Ind AS 103',prompt:'Apply Ind AS 103 for accounting of a business combination. Acquiree: company acquired for ₹50 crore, fair value of identifiable net assets ₹35 crore, contingent consideration ₹5 crore. Steps: identify acquirer, determine acquisition date, measure identifiable assets/liabilities at fair value, compute goodwill, account for contingent consideration, and prepare disclosure note.'},
{id:229,cat:'indas',diff:'adv',tags:'Ind AS 21,Foreign Currency,Translation',title:'Foreign Currency – Ind AS 21',prompt:'Explain the accounting treatment under Ind AS 21 for: (1) foreign currency transaction of an Indian company (monetary vs. non-monetary items), (2) translation of financial statements of a foreign subsidiary (functional currency determination, closing rate vs. historical rate), and (3) hyperinflationary economy subsidiary. Show illustrative journal entries for each.'},
{id:230,cat:'indas',diff:'med',tags:'IGAAP to Ind AS,Conversion,Differences',title:'Key Differences – IGAAP vs Ind AS',prompt:'Prepare a comprehensive comparison of key differences between IGAAP (Indian GAAP) and Ind AS for the following areas: (1) Revenue recognition (AS 9 vs. Ind AS 115), (2) Leases (AS 19 vs. Ind AS 116), (3) Financial instruments (AS 30/31/32 vs. Ind AS 109), (4) Provisions (AS 29 vs. Ind AS 37), and (5) Business combinations. Format as a decision-making table.'},

// ═══ ESG & SUSTAINABILITY ═══
{id:231,cat:'esg',diff:'med',tags:'ESG,BRSR,Sustainability Report',title:'BRSR – Business Responsibility & Sustainability Report',prompt:'Guide a listed company through preparing BRSR (Business Responsibility and Sustainability Report) as required under SEBI LODR. Cover: BRSR structure (9 principles under National Guidelines for Responsible Business Conduct), mandatory vs. voluntary disclosures, key performance indicators (quantitative), assurance requirement for top 1000 companies, and data collection framework.'},
{id:232,cat:'esg',diff:'med',tags:'Carbon Credits,Sustainability,Tax',title:'Carbon Credits – Tax & Accounting Treatment',prompt:'Advise on the tax and accounting treatment of carbon credits (VCCUs/CERs) for an Indian company. Cover: Income Tax classification (capital receipts vs. business income), GST implications on carbon credit trading, Ind AS accounting (intangible asset vs. inventory), CBDT circular on carbon credit taxation, and impact on ESG-focused investors.'},
{id:233,cat:'esg',diff:'med',tags:'ESG Rating,Investor,Risk',title:'ESG Due Diligence for Investment Decision',prompt:'Perform ESG due diligence for an investment decision in a manufacturing company. Framework: Environmental (carbon emissions, water usage, waste management compliance), Social (employee welfare, supply chain standards, community impact), Governance (board composition, related party transactions, whistle-blower policy). Identify ESG risks and quantify potential financial impact.'},
{id:234,cat:'esg',diff:'easy',tags:'Green Finance,Sustainability,Reporting',title:'Sustainability Reporting Framework – GRI vs TCFD',prompt:'Compare GRI (Global Reporting Initiative) Standards and TCFD (Task Force on Climate-related Financial Disclosures) framework for ESG reporting. Cover: key differences in focus area, materiality assessment approach, reporting structure, Indian company applicability, alignment with BRSR, and recommend which framework to adopt for a listed manufacturing company with ESG investor interest.'},

// ═══ DIGITAL & TECH FOR CAs ═══
{id:235,cat:'digital',diff:'easy',tags:'Tally,Automation,Integration',title:'Tally Prime Integration Advisory',prompt:'Advise a CA firm on automating accounting workflows using Tally Prime. Cover: auto-import of bank statements via CSV, GSTR-1 JSON export from Tally, payroll integration, auto-bank reconciliation feature setup, data synchronization with client portals, and TDL (Tally Definition Language) customization for firm-specific reports. ROI calculation for time saved.'},
{id:236,cat:'digital',diff:'med',tags:'AI Tools,ChatGPT,CA Practice',title:'AI Tools for CA Practice – Implementation Guide',prompt:'Create an implementation guide for integrating AI tools in a CA firm\'s practice. Cover: Claude/ChatGPT for notice drafting and research, GitHub Copilot for Excel automation, Notion AI for working paper documentation, AI-powered OCR for data extraction from invoices, security and client confidentiality considerations, and staff training plan for AI adoption.'},
{id:237,cat:'digital',diff:'med',tags:'Data Analytics,Audit,ACL,IDEA',title:'Data Analytics in Audit – Procedures',prompt:'Design a data analytics-based audit approach for a retail company. Cover: use of ACL/IDEA/Power BI for journal entry testing (automated round number test, after-hours posting test), revenue analytics (Benford\'s Law test on invoice amounts), vendor master analysis (duplicate detection), and inventory analytics (slow-moving item identification). Include sampling size reduction rationale.'},
{id:238,cat:'digital',diff:'easy',tags:'Cloud Accounting,Zoho,Quickbooks',title:'Cloud Accounting Migration Advisory',prompt:'Advise a small CA practice client on migrating from Excel/manual accounting to cloud accounting (Zoho Books/QuickBooks/FreshBooks). Cover: data migration process (opening balance upload), chart of accounts setup, GST compliance automation, invoice and payment workflow, bank feed integration, accountant access setup, and training timeline. Compare 3 cloud platforms on cost and features.'},
{id:239,cat:'digital',diff:'adv',tags:'RPA,Automation,BOT,Tax Filing',title:'RPA Implementation for Tax Compliance',prompt:'Design a Robotic Process Automation (RPA) workflow for automating monthly GST return filing using UiPath/Power Automate. Cover: data extraction from accounting software, reconciliation of GSTR-2B vs. purchase register, auto-population of GSTR-3B, payment computation, portal login, filing, and error alert mechanism. Include cost-benefit analysis for a firm with 50 GST clients.'},
{id:240,cat:'digital',diff:'med',tags:'Blockchain,Audit,Technology',title:'Blockchain in Audit & Accounting',prompt:'Explain practical applications of blockchain technology for audit and accounting. Cover: smart contracts for automated revenue recognition, immutable audit trail for journal entries, real-time financial reporting possibilities, current limitations (data accuracy off-chain), ICAI guidance on blockchain-based records, and 3 practical use cases for Indian CA firms in the next 2 years.'},

// ═══ GST – BATCH 3 ═══
{id:241,cat:'gst',diff:'med',tags:'E-Way Bill,Compliance,Penalty',title:'E-Way Bill Compliance & Penalty Provisions',prompt:'Explain E-Way Bill compliance requirements under GST. Cover: threshold limits (₹50,000 for inter-state), validity period based on distance, Part A vs Part B responsibilities, extension procedure, exempted goods and routes, detention and seizure provisions under S.129, penalty for non-generation, and common errors leading to notices. Provide a compliance checklist for a transporter.'},
{id:242,cat:'gst',diff:'med',tags:'GST Audit,S.65,Departmental Audit',title:'Departmental GST Audit – S.65 Preparation',prompt:'Prepare a client for a departmental GST audit under S.65. Cover: notice receipt protocol, documents to be kept ready (GSTR-1/3B/9, books of accounts, ITC register, e-way bills, bank statements), common areas of scrutiny (ITC mismatch, RCM, HSN summary), how to handle audit officer queries, and draft response format for audit objections raised.'},
{id:243,cat:'gst',diff:'adv',tags:'Cross Charge,HO,Branch',title:'Cross Charge Between HO and Branch – GST',prompt:'Advise on GST cross charge between Head Office and Branch of the same legal entity having separate GSTINs. Cover: mandatory cross charge of common services (HR, IT, admin), method of valuation (open market or cost plus mark-up), ISD vs. cross charge comparison, input tax credit availability at recipient branch, and practical challenges in cross-charge implementation.'},
{id:244,cat:'gst',diff:'med',tags:'GST on Goods Transport,GTA',title:'GST on Goods Transport Agency (GTA)',prompt:'Explain GST treatment for Goods Transport Agency services. Cover: RCM applicability (who pays tax – consignor/consignee/recipient), GTA option to pay tax under forward charge (12% with ITC or 5% without ITC), recent amendment allowing GTA to pay GST on forward charge without filing declaration, consignment note requirement, and ITC eligibility on transport services.'},
{id:245,cat:'gst',diff:'med',tags:'Composition Scheme,Small Taxpayer,QRMP',title:'Composition Scheme vs QRMP – Decision Matrix',prompt:'Compare Composition Scheme (S.10) vs QRMP (Quarterly Return Monthly Payment) for a small taxpayer with turnover ₹80 lakh. Cover: eligibility, tax rates (1%/2%/6% for composition), ITC restriction under composition, quarterly vs. monthly filing obligations, interstate supply restriction for composition, and a decision matrix recommending the better option for different business types.'},
{id:246,cat:'gst',diff:'adv',tags:'GST Refund,Export,IGST Paid',title:'GST Refund – Export with IGST Paid',prompt:'Guide an exporter through claiming refund of IGST paid on export of goods under Rule 96. Cover: automatic refund from ICEGATE system, reasons for refund getting stuck (GSTR-1 vs. shipping bill mismatch, Cess details, scroll generation), manual refund application (Form RFD-01), documents required, and PFMS validation issues causing delays.'},
{id:247,cat:'gst',diff:'med',tags:'GST,Credit Note,Debit Note,Adjustment',title:'Credit Note & Debit Note – GST Treatment',prompt:'Explain the GST treatment of credit notes and debit notes. Cover: when to issue credit note (rate difference, quality defect, return of goods), time limit for issuance (earlier of September 30 of next FY or annual return filing), reflection in GSTR-1 (Table 9B), recipient\'s ITC reversal obligation, and debit note treatment when additional charges are raised.'},
{id:248,cat:'gst',diff:'adv',tags:'GST,Advance Ruling,AAR,AAAR',title:'Advance Ruling Application – AAR Strategy',prompt:'Guide a company through seeking an Advance Ruling from the GST Authority for Advance Ruling (AAR). Cover: issues suitable for AAR (classification, taxability, valuation, ITC eligibility), Form ARA-01 filing process, fees, hearing procedure, binding nature (only on applicant), appeal to AAAR within 30 days, and situations where AAR may not be advisable (conflicting state rulings).'},
{id:249,cat:'gst',diff:'med',tags:'GST,Works Contract,Construction',title:'Works Contract GST – Comprehensive Note',prompt:'Explain GST on works contract services comprehensively. Cover: definition of works contract under S.2(119), GST rates (12% for residential/commercial under construction, 18% for other works contracts), ITC restriction on works contract used for immovable property, sub-contractor treatment, labour contractor vs. works contractor distinction, and tax invoice requirements.'},
{id:250,cat:'gst',diff:'med',tags:'GST,Health,Insurance,Exemption',title:'GST on Financial & Insurance Services',prompt:'Analyze GST treatment for: (1) life insurance premium (term vs. ULIP vs. endowment), (2) health insurance premium, (3) interest on loans, (4) processing fees charged by banks, (5) mutual fund distributor commissions, and (6) stock broker brokerage. For each: applicable rate, exemption if any, ITC eligibility for the service provider, and reporting in GST returns.'},
{id:251,cat:'gst',diff:'easy',tags:'GST,Return,Filing Checklist,Monthly',title:'Monthly GST Compliance Checklist',prompt:'Create a monthly GST compliance checklist for a mid-size company. Cover: GSTR-1 (11th or 13th), GSTR-3B (20th), GSTR-2B reconciliation with purchase register, RCM liability identification, e-way bill audit for the month, ISD distribution (if applicable), HSN summary accuracy, and advance tax GST (for large taxpayers). Include a responsibility matrix.'},
{id:252,cat:'gst',diff:'adv',tags:'GST,Deemed Export,Supply,Merchant Export',title:'Deemed Exports & Merchant Export GST',prompt:'Explain the concept of deemed exports under GST. Cover: categories of deemed exports (supply to EOU, advance authorization holder, EPCG license holder, SEZ developer), zero-rated supply vs. deemed export distinction, refund options for deemed exports (supplier vs. recipient), merchant export concessional rate (0.1% GST), and compliance requirements for supplier and recipient.'},

// ═══ INCOME TAX – BATCH 3 ═══
{id:253,cat:'it',diff:'med',tags:'ITR,NRI,Non-Resident,S.5',title:'NRI Income Tax Filing – Complete Guide',prompt:'Prepare a complete income tax filing guide for a Non-Resident Indian for AY [year]. Cover: residential status determination (S.6 – 182 days / RNOR conditions), scope of income taxable in India (S.5), sources of India income (rental, interest, capital gains on Indian assets), TDS by payer obligations, Form 26AS reconciliation, ITR-2 filing, and DTAA benefit claim.'},
{id:254,cat:'it',diff:'adv',tags:'GAAR,General Anti-Avoidance,S.96',title:'GAAR – General Anti-Avoidance Rules',prompt:'Explain the General Anti-Avoidance Rules (GAAR) under Chapter X-A of the Income Tax Act. Cover: impermissible avoidance arrangement definition, four tests for IA (lack of commercial substance, abuse of provisions, lack of bona fide purpose, non-arm\'s length terms), threshold (tax benefit >₹3 crore), PCIT approval process, consequence of invoking GAAR, and situations where GAAR applies vs. specific anti-avoidance provisions.'},
{id:255,cat:'it',diff:'med',tags:'Depreciation,S.32,Block of Assets',title:'Depreciation – S.32 Comprehensive Analysis',prompt:'Analyze depreciation provisions under S.32. Cover: WDV method for Income Tax (rates for different asset classes), additional depreciation (20% for manufacturing, 35% for power sector), S.32AC investment allowance for plant and machinery, treatment of addition/disposal during the year, depreciation on leased assets, goodwill post-FA 2021, and deferred tax impact.'},
{id:256,cat:'it',diff:'med',tags:'Business Expenditure,S.37,Disallowance',title:'Business Expenditure – S.37 & Common Disallowances',prompt:'Analyze allowability of business expenditure under S.37(1) for: (1) legal fees for personal litigation of director, (2) penalties paid to government, (3) CSR expenditure, (4) advertisement in political publication, (5) liquidated damages paid to customer, (6) donation to non-80G-approved trust. For each: tax treatment and key supporting case laws.'},
{id:257,cat:'it',diff:'med',tags:'S.43B,MSME Payment,GST Payment',title:'Section 43B – Deemed Allowance Provisions',prompt:'Explain S.43B deductions allowed only on actual payment basis. Cover: taxes/duties/cess (including GST), employer contribution to PF/ESI (if paid before return filing date), bonus/commission, interest on loans from scheduled banks, leave encashment, and MSME vendor payment (S.43B(h) amendment – allowed only if paid within 45 days). Practical implications and year-end planning checklist.'},
{id:258,cat:'it',diff:'adv',tags:'S.68,Unexplained Credit,Cash',title:'Section 68 – Unexplained Cash Credits',prompt:'Advise on handling S.68 (unexplained cash credit) additions for unsecured loans from individuals. Cover: three-prong test (identity, creditworthiness, genuineness), documents needed to prove each prong, dealing with retracted lender statements, S.68 vs. S.69A distinction, burden of proof analysis, and key SC/HC/ITAT judgements in taxpayer\'s favor vs. against.'},
{id:259,cat:'it',diff:'med',tags:'S.80JJAA,Employment,Deduction',title:'Section 80JJAA – New Employment Deduction',prompt:'Explain the S.80JJAA deduction for businesses hiring new employees. Cover: eligibility conditions (emoluments <₹25,000/month, at least 240 days employed, not casual/contract labor), deduction quantum (30% of additional employee cost for 3 years), Form 10DA requirement, what counts as "new employee," carry-forward if deduction exceeds income, and interaction with MAT computation.'},
{id:260,cat:'it',diff:'adv',tags:'Deemed Dividend,S.2(22)(e),Closely Held',title:'Deemed Dividend – S.2(22)(e) Analysis',prompt:'Analyze S.2(22)(e) deemed dividend for a closely held company. Scenario: company gives loan ₹50 lakh to a 20% shareholder. Cover: conditions for deemed dividend (substantial interest, accumulated profits threshold), TDS obligation under S.194, recipient\'s tax treatment, exceptions (loans in ordinary course of business for money lending company), and recent SC ruling on S.2(22)(e).'},
{id:261,cat:'it',diff:'med',tags:'Capital Gains,Bonds,54EC,NHAI',title:'Capital Gains Exemption – S.54EC Bonds',prompt:'Advise on capital gains exemption by investing in 54EC bonds. Cover: eligible assets (LTCG from land/building), investment limit (₹50 lakh per FY), lock-in period (5 years), eligible bonds (NHAI/REC/PFC/IRFC), time limit for investment (6 months from transfer date), what happens if bonds are transferred before lock-in, and interaction with S.54/54F exemptions.'},
{id:262,cat:'it',diff:'med',tags:'Agricultural Land,Exemption,S.10(37)',title:'Agricultural Land Sale – Tax Treatment',prompt:'Advise on income tax treatment of sale of agricultural land. Cover: rural agricultural land (not a capital asset, fully exempt), urban agricultural land (capital asset, LTCG/STCG taxable), S.10(37) exemption for compulsory acquisition by government, indexation benefit for inherited agricultural land, S.54B exemption (purchase of agricultural land within 2 years), and reporting in ITR.'},
{id:263,cat:'it',diff:'adv',tags:'Succession,Inheritance,Estate Planning',title:'Succession Planning – Tax Implications',prompt:'Advise an HNI client on tax-efficient succession planning. Cover: gift vs. inheritance (gift tax under S.56(2)(x) – relatives exempt), Will vs. family settlement, HUF partition tax treatment, tax on inherited assets (cost = cost to original holder for indexation), nominee vs. legal heir distinction, trust structure for estate planning, and insurance policy proceeds (S.10(10D) exemption).'},
{id:264,cat:'it',diff:'med',tags:'TDS,S.194N,Cash Withdrawal',title:'TDS on Cash Withdrawals – S.194N',prompt:'Explain TDS under S.194N on cash withdrawals from bank accounts. Cover: threshold (₹1 crore for normal taxpayers, ₹20 lakh for non-filers of ITR for 3 years), TDS rate (2% for non-filer threshold, 2% above ₹1 crore), how to check non-filer status, credit in ITR, business impact, and advisory for clients making large cash withdrawals.'},
{id:265,cat:'it',diff:'easy',tags:'ITR,Due Date,Penalty,Belated',title:'ITR Filing Dates – Penalties & Consequences',prompt:'Summarize all ITR filing due dates for AY [year] for different taxpayer categories (individual, company, audit cases, partner of firm). Cover: original return, belated return (December 31), revised return (December 31), consequences of late filing (S.234F – ₹5,000 fee, reduced to ₹1,000 for income <₹5 lakh), and loss carry-forward restriction for late filers.'},
{id:266,cat:'it',diff:'med',tags:'Perquisites,S.17,Valuation,Employee',title:'Perquisites – Valuation & Tax Treatment',prompt:'Explain valuation and tax treatment of perquisites under S.17(2) for: (1) rent-free accommodation, (2) company car for personal use, (3) interest-free/concessional loan, (4) free meal vouchers, (5) gift of laptop/mobile for personal use, (6) ESOP perquisite. For each: valuation method, TDS obligation on employer, and employee reporting in ITR.'},
{id:267,cat:'it',diff:'easy',tags:'Income Tax Portal,Refund,Grievance',title:'Income Tax Portal – Common Issues & Resolutions',prompt:'Create a troubleshooting guide for common Income Tax portal issues: (1) refund not received despite processing, (2) demand notice for already paid taxes (Form 26AS mismatch), (3) password reset for company PAN, (4) grievance filing for non-credit of TDS, (5) e-verification failure, (6) change of address/contact details, and escalation to ITBA system for stuck cases.'},
{id:268,cat:'it',diff:'adv',tags:'Anonymous Donation,Trust,S.115BBC',title:'Anonymous Donations – Trust Taxation S.115BBC',prompt:'Explain tax treatment of anonymous donations received by a charitable trust. Cover: S.115BBC taxing anonymous donations at 30% flat rate, what qualifies as "anonymous" (no identity of donor), exception for wholly religious trusts, treatment in Form 10B, interaction with S.11/12 application of income, and the ₹1 lakh or 5% of total donations (whichever higher) exemption threshold.'},

// ═══ AUDIT – BATCH 3 ═══
{id:269,cat:'audit',diff:'adv',tags:'SA 701,Key Audit Matter,KAM,Listed',title:'Key Audit Matters – SA 701 Drafting',prompt:'Draft Key Audit Matters (KAM) paragraphs for a listed company audit report under SA 701. KAMs to include: (1) recoverability of trade receivables (provisioning judgment), (2) revenue recognition for long-term contracts (POC method), (3) goodwill impairment assessment (DCF assumptions). For each KAM: why it was a KAM, how it was addressed in audit, and key findings.'},
{id:270,cat:'audit',diff:'med',tags:'Audit Sampling,MUS,Statistical',title:'Audit Sampling – Methodology & Documentation',prompt:'Design an audit sampling plan for testing accounts payable completeness for a company with 2,000 vendor invoices totaling ₹15 crore. Cover: risk assessment (inherent and control risk), choice between statistical (MUS) and non-statistical sampling, sample size determination, selection method (systematic/random), evaluation of sample results, and extrapolation to population for misstatement estimation.'},
{id:271,cat:'audit',diff:'med',tags:'Confirmation,SA 505,External',title:'External Confirmations – SA 505 Procedures',prompt:'Design an external confirmation procedure for accounts receivable audit of a trading company with ₹8 crore debtors. Cover: positive vs. negative confirmation choice, sample selection, maintaining control over dispatch and receipt, follow-up for non-responses, alternative procedures when confirmation not received, handling exceptions (disputed amounts), and documentation of the confirmation exercise.'},
{id:272,cat:'audit',diff:'adv',tags:'Group Audit,SA 600,Component Auditor',title:'Group Audit Coordination – SA 600',prompt:'Design a group audit coordination plan where the group auditor (parent company ₹500 crore revenue) relies on component auditors for 5 subsidiaries. Cover: SA 600 requirements, communication with component auditors (instructions, scope), materiality for components, work to be performed by component auditors, review of component auditor work, and group audit opinion implications.'},
{id:273,cat:'audit',diff:'med',tags:'Internal Audit,Charter,Scope',title:'Internal Audit Charter Drafting',prompt:'Draft an Internal Audit Charter for a manufacturing company. Include: purpose and authority of internal audit function, scope (financial, operational, compliance, IT audit), independence and objectivity requirements, reporting structure (direct to Audit Committee), access rights, responsibilities of management vs. internal audit, and annual audit plan approval process.'},
{id:274,cat:'audit',diff:'med',tags:'IT Audit,Controls,ITGC,Application Controls',title:'IT Audit – General and Application Controls',prompt:'Design an IT audit program for a company using ERP (SAP/Oracle). Cover: IT General Controls (access management, change management, backup and recovery, data center physical security), Application Controls (input validation, processing controls, output controls, completeness checks), audit trail review, privileged user access testing, and segregation of duties matrix.'},
{id:275,cat:'audit',diff:'adv',tags:'Forensic,Beneish,M-Score,Fraud Detection',title:'Beneish M-Score – Earnings Manipulation Detection',prompt:'Apply the Beneish M-Score model to detect earnings manipulation for a listed company. Calculate all 8 indices: DSRI, GMI, AQI, SGI, DEPI, SGAI, LVGI, TATA. Interpret the composite score (> -1.78 = manipulator). Identify which specific ratios are in the danger zone and what audit procedures should be performed to investigate each anomaly.'},
{id:276,cat:'audit',diff:'med',tags:'Audit Report,Format,Companies Act',title:'Audit Report Drafting – Complete Format',prompt:'Draft a complete Independent Auditor\'s Report for a private limited company under Companies Act 2013 and Standards on Auditing. Include all required sections: Report on Audit of Financial Statements (basis, key audit matters for unlisted companies if applicable, responsibilities), Report on Other Legal and Regulatory Requirements (CARO 2020, S.143(3) reporting), and ensure correct format per ICAI guidance.'},
{id:277,cat:'audit',diff:'adv',tags:'Audit Quality,SQC 1,Quality Control',title:'Audit Quality Control – SQC 1 Framework',prompt:'Implement an audit quality control system per SQC 1 for a mid-size CA firm. Cover: leadership responsibilities, ethical requirements (independence monitoring), client acceptance and continuance procedures, engagement performance (supervision and review), monitoring (internal inspection program), and documentation (engagement quality control reviewer). Design templates for each quality control element.'},
{id:278,cat:'audit',diff:'adv',tags:'Fraud,S.143(12),Reporting,NFRA',title:'Fraud Reporting – S.143(12) & NFRA',prompt:'Guide an auditor through fraud reporting obligations under S.143(12) of Companies Act. Cover: what constitutes "fraud" for reporting purposes, distinction between fraud by officers vs. employees, materiality threshold (₹1 crore for immediate SFIO/CG report vs. below threshold for Audit Committee), Form ADT-4 filing, timeline (30 days), and liability of auditor for non-reporting under S.147.'},

// ═══ COMPANY LAW – BATCH 3 ═══
{id:279,cat:'corp',diff:'med',tags:'OPC,One Person Company,Formation',title:'One Person Company (OPC) – Formation & Conversion',prompt:'Guide through formation of a One Person Company (OPC). Cover: eligibility (single natural person, Indian citizen resident), MOA/AOA for OPC, mandatory nominee appointment (Form INC-3), restrictions (not eligible for NBFC, section 8 company), mandatory conversion when turnover exceeds ₹2 crore or paid-up capital exceeds ₹50 lakh, and tax implications (OPC taxed as company).'},
{id:280,cat:'corp',diff:'med',tags:'Buy Back,S.68,Companies Act',title:'Buyback of Shares – Companies Act Process',prompt:'Draft the complete buyback procedure under S.68-70 of Companies Act 2013. Cover: maximum size (25% of paid-up capital + free reserves), modes (tender offer vs. open market), board vs. shareholder resolution requirement, Form SH-8 (notice), Form SH-9 (declaration of solvency), Form SH-11 (return of buyback), post-buyback cooling-off period (1 year for fresh issue), and S.115QA tax treatment.'},
{id:281,cat:'corp',diff:'adv',tags:'Scheme of Arrangement,NCLT,Demerger',title:'Demerger – Scheme of Arrangement via NCLT',prompt:'Guide through a demerger of a division via Scheme of Arrangement under S.230-232 of Companies Act. Cover: scheme preparation, NCLT application (Form RSC-1), creditor/shareholder approval meetings, NCLT order (Form RSC-6), stamp duty on demerger, income tax treatment (S.2(19AA) – tax-neutral demerger conditions), and post-demerger compliance for resulting company.'},
{id:282,cat:'corp',diff:'med',tags:'Producer Company,Farmer,Agriculture',title:'Producer Company – Formation & Benefits',prompt:'Advise on formation of a Producer Company for a farmers\' collective. Cover: eligibility (10 producers minimum), share capital structure, limited return on share capital, advantages over cooperative society, permitted activities (processing, marketing, procurement), income tax exemption under S.80P, MCA compliance, and NABARD/RBI funding options available specifically for producer companies.'},
{id:283,cat:'corp',diff:'med',tags:'ROC,MCA Filing,Due Dates,Late Fee',title:'ROC Filing – Due Dates & Late Fees Chart',prompt:'Create a comprehensive chart of all major ROC filings for a private limited company. For each form: Form number, purpose, due date, fees for authorized capital range, late filing fee structure (₹100/day), maximum late fee, and whether condonation of delay is possible. Cover: AOC-4, MGT-7A, ADT-1, DIR-3 KYC, PAS-3, SH-7, MGT-14, CHG-1, BEN-2, INC-22A.'},

// ═══ PAYROLL – BATCH 2 ═══
{id:284,cat:'payroll',diff:'med',tags:'NPS,National Pension System,S.80CCD',title:'NPS – Employee & Employer Contribution Analysis',prompt:'Explain the tax treatment of NPS contributions. Cover: employee contribution – deduction under S.80CCD(1) within S.80C limit + additional ₹50,000 under S.80CCD(1B), employer contribution – S.80CCD(2) deduction up to 10% of basic+DA (not part of ₹1.5 lakh limit), taxation at maturity (60% exempt, 40% annuity), and comparison with EPF for retirement planning.'},
{id:285,cat:'payroll',diff:'easy',tags:'Bonus,Payment of Bonus Act,Calculation',title:'Statutory Bonus – Calculation & Compliance',prompt:'Calculate statutory bonus under the Payment of Bonus Act 1965 for a company with 120 employees. Cover: eligibility (salary ≤₹21,000/month, minimum 30 days worked), minimum bonus (8.33% of salary/₹7,000 whichever higher), maximum bonus (20%), allocable surplus computation, set-on/set-off concept across years, and bonus payable by November 30 (or within 8 months of year end).'},
{id:286,cat:'payroll',diff:'med',tags:'Gratuity,Payment of Gratuity Act,Calculation',title:'Gratuity – Computation & Tax Exemption',prompt:'Compute gratuity for an employee with 12 years 7 months service, last drawn basic salary ₹45,000. Apply the Payment of Gratuity Act formula (15/26 × last salary × years of service). Cover: what counts as "wages," rounding of service period, government vs. non-government employee tax exemption limits (up to ₹20 lakh), and treatment of gratuity received in excess of ₹20 lakh.'},
{id:287,cat:'payroll',diff:'med',tags:'Contract Labour,CLRA,Principal Employer',title:'Contract Labour Compliance – CLRA Act',prompt:'Guide a principal employer on compliance under Contract Labour (Regulation & Abolition) Act. Cover: registration (Form I, threshold 20 contract workers), contractor license requirement (Form IV), welfare facilities mandated for contractor workers (canteen, restroom, first aid), wage responsibility (principal employer backstop), and prohibition notification impact if work is perennial in nature.'},
{id:288,cat:'payroll',diff:'adv',tags:'ESOP,RSU,SAR,Vesting,Tax',title:'Stock Options vs RSU vs SAR – Tax Comparison',prompt:'Compare tax treatment of ESOP, RSU (Restricted Stock Units), and SAR (Stock Appreciation Rights) for employees and employer. For each: perquisite taxation at exercise/vesting date, fair market value determination (listed vs. unlisted company), TDS obligations of employer (Form 12BA, Form 24Q), capital gains on subsequent sale, and treatment for NRI employees under DTAA.'},
{id:289,cat:'payroll',diff:'med',tags:'Expatriate,International Assignment,Tax Equalization',title:'Expatriate Tax Planning',prompt:'Advise on tax planning for an expatriate employee on international assignment to India. Cover: residential status determination, tax equalization policy, hypothetical tax computation, compensation package structuring (COLA, housing, schooling allowances), DTAA benefits, shadow payroll concept, social security agreement with home country, and TDS obligations of Indian entity vs. foreign entity.'},

// ═══ CLIENT COMMUNICATION – BATCH 3 ═══
{id:290,cat:'client',diff:'easy',tags:'Budget,Finance Bill,Client Update',title:'Union Budget Impact Note for Clients',prompt:'Draft a Union Budget FY [year] impact note for clients covering: key income tax changes (slab changes, TDS rate changes, new deductions), GST amendments (rate changes, compliance simplifications), corporate tax changes, capital gains tax amendments, and 3 immediate actions clients should take. Format: 2-page executive summary suitable for WhatsApp and email. Plain language, avoid jargon.'},
{id:291,cat:'client',diff:'easy',tags:'GST Registration,New Business,Advisory',title:'New Business – GST Registration Advisory',prompt:'Draft an advisory note for a client starting a new business on GST registration requirements. Cover: threshold limits (₹40 lakh for goods, ₹20 lakh for services), mandatory registration irrespective of turnover (e-commerce, interstate supply, import of services), voluntary registration benefits, documents required, composition scheme option, and first 90 days compliance calendar.'},
{id:292,cat:'client',diff:'easy',tags:'Social Media,LinkedIn,Instagram,Content',title:'CA Social Media Content Calendar',prompt:'Create a 30-day social media content calendar for a CA\'s Instagram/LinkedIn page. Mix of post types: educational (income tax tips, GST updates), trust-building (behind the scenes, client wins), interactive (poll: old vs new regime, quiz: GST rate for your product), and promotional (service highlights). For each day: post type, topic, caption hook, hashtags, and call-to-action.'},
{id:293,cat:'client',diff:'easy',tags:'Festival,Greeting,WhatsApp,Tax Tip',title:'Festival Greeting with Tax Tip – WhatsApp',prompt:'Draft professional festival greeting messages for a CA firm for: (1) Diwali (with year-end tax planning tip), (2) New Year January (advance tax due date reminder), (3) Holi March (ITR due date approaching reminder), (4) Ganesh Chaturthi (new business registrations tip), (5) Republic Day (budget session advisory). Each: 60-80 words, warm tone, subtle CTA.'},
{id:294,cat:'client',diff:'med',tags:'Testimonial,Review,Google,Referral',title:'Client Testimonial & Referral Request Templates',prompt:'Draft 5 different versions of a testimonial request message for a CA firm to send to satisfied clients. Cover: (1) Google Business review request, (2) LinkedIn recommendation request, (3) written testimonial for website, (4) video testimonial request, (5) reference call consent request. Each: specific, non-pushy, 50-70 words, includes direct link/instruction for ease of response.'},

// ═══ DOCUMENT DRAFTING – BATCH 3 ═══
{id:295,cat:'doc',diff:'med',tags:'Employment Agreement,HR,Contract',title:'Employment Agreement Drafting',prompt:'Draft a comprehensive employment agreement for a senior manager at a private company. Include: designation, CTC structure, confidentiality clause, intellectual property assignment, non-solicitation (1 year after exit), non-compete (1 year, 50 km radius), notice period (90 days), termination for cause vs. without cause, grievance procedure, governing law, and dispute resolution (arbitration).'},
{id:296,cat:'doc',diff:'med',tags:'Vendor Agreement,Purchase,Contract,MSME',title:'Vendor Supply Agreement Template',prompt:'Draft a vendor supply agreement for procurement of raw materials. Include: delivery terms (Incoterms), payment terms (MSME 45-day rule compliance), quality specifications and rejection procedure, force majeure clause, price variation mechanism, IP ownership of customized materials, indemnification clause, GSTIN compliance representation, and termination provisions.'},
