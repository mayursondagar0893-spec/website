{id:438,cat:'startup',diff:'adv',tags:'Startup,Reverse Flipping,India,Return',title:'Startup Reverse Flipping – Tax Advisory',prompt:'Advise a startup that \'flipped\' to Delaware (USA) and now wants to return to India structure (reverse flip). Cover: Income Tax implications (deemed dividend on liquidation of foreign holding company, capital gains on exchange of shares), FEMA implications (FDI from promoters returning, valuation requirements), stamp duty on transfer of IP and assets to Indian entity, tax treaty benefits, RBI approval requirements, and recommended sequencing of steps.'},
{id:439,cat:'startup',diff:'med',tags:'Startup,DPIIT,Recognition,Tax Benefit,Application',title:'DPIIT Startup Recognition – Application Guide',prompt:'Guide a startup through DPIIT recognition process. Cover: eligibility (incorporated < 10 years, turnover < ₹100 crore, innovative/scalable/high employment potential), application on Startup India portal (documents required, business summary), benefits after recognition (S. 80-IAC tax holiday, DPIIT certificate, government scheme eligibility, self-certification for 9 labour and environment laws, public procurement preference), and renewal requirements.'},
{id:440,cat:'startup',diff:'adv',tags:'Startup,Down Round,Anti Dilution,VC,Investor',title:'Down Round Financing – Tax & Legal Issues',prompt:'Advise a startup facing a down round (new investors at lower valuation than previous round). Cover: anti-dilution mechanism triggered for existing investors (broad-based weighted average vs. full ratchet – impact on founder dilution), Income Tax S. 56(2)(viib) applicability on fresh shares issued at below previous round FMV, angel tax risk assessment, FEMA valuation certificate requirement (DCF method), and negotiation strategy with existing investors on anti-dilution clause waiver.'},

// ═══ PRACTICE MANAGEMENT – BATCH 2 ═══
{id:441,cat:'pm',diff:'easy',tags:'Practice,UDIN,ICAI,Certificate,Compliance',title:'UDIN Compliance Guide for CA Firm',prompt:'Create a comprehensive UDIN (Unique Document Identification Number) compliance guide for a CA firm. Cover: when UDIN is mandatory (audit reports, certificates, GST audits, financial statements, tax audit reports), generation process on ICAI UDIN portal, format of UDIN, revocation procedure, consequences of not generating UDIN (disciplinary action, invalid certificate), bulk UDIN for repeated forms, and firm-level tracking system for all UDINs generated.'},
{id:442,cat:'pm',diff:'med',tags:'Practice,ERP,Tally,Software,Migration',title:'Practice Management Software Selection',prompt:'Create a selection framework for practice management software for a CA firm with 3 partners and 15 staff. Cover: must-have features (client management, compliance tracker, time billing, document management, workflow automation), shortlisted software options (Taxmann VG, BUSY, Tally, EZee, MyOffice, etc.), evaluation criteria (ease of use, integration with GST portal/Tally, mobile access, price), demo checklist, and migration plan from current system.'},
{id:443,cat:'pm',diff:'med',tags:'Practice,Niche,Specialization,Business Development,CA Firm',title:'CA Firm Niche Strategy Development',prompt:'Help develop a niche specialization strategy for a CA firm currently doing general practice. Potential niches: (1) Transfer Pricing for MNCs, (2) GST litigation for manufacturers, (3) Startup advisory and CFO services, (4) NRI tax and FEMA services, (5) Real estate transactions. For each niche: market size, competition intensity, required expertise investment, pricing power, client acquisition strategy, and LinkedIn thought leadership content plan.'},
{id:444,cat:'pm',diff:'easy',tags:'Practice,Networking,ICAI,CPE,Seminar',title:'Professional Development Plan for CA',prompt:'Create an annual professional development plan for a CA with 5 years of experience looking to grow into advisory practice. Include: ICAI CPE requirements (minimum hours by category), recommended certifications (DISA, Forensic Accounting, Valuation, Transfer Pricing Diploma), networking strategy (ICAI committee participation, LinkedIn content calendar), technical reading list (12 books/publications), and skill gaps to address for moving from compliance to advisory work.'},
{id:445,cat:'pm',diff:'med',tags:'Practice,Ethics,ICAI,Code,Independence',title:'CA Ethics – Common Compliance Issues',prompt:'Explain the top 10 common ethics and professional conduct issues CAs face under ICAI Code of Ethics 2020. Cover: independence (actual vs. perceived), confidentiality of client information, conflict of interest, advertising restrictions, contingent fees prohibition, rotation of audit partners (for listed companies), accepting audit where predecessor was removed, solicitation restrictions, reporting of fraud under Companies Act, and withdrawal from engagement when client integrity is in question.'},

// ═══ DUE DILIGENCE – BATCH 2 ═══
{id:446,cat:'dd',diff:'adv',tags:'Due Diligence,IP,Technology,Valuation',title:'IP Due Diligence – Technology Acquisition',prompt:'Perform IP due diligence for acquisition of a technology company. Cover: patent portfolio analysis (filed, granted, pending, jurisdictions), trademark registrations, copyright status of software code (ownership – company vs. contractors), open source software usage (GPL license risk – copyleft), NDA coverage for trade secrets, IP assignment from founders/employees to company, litigation history (infringement claims), and IP valuation for PPA purposes.'},
{id:447,cat:'dd',diff:'adv',tags:'Due Diligence,Environmental,ESG,Compliance',title:'Environmental & Regulatory Due Diligence',prompt:'Perform environmental and regulatory due diligence for acquisition of a manufacturing company. Cover: environmental compliance (effluent treatment plant, consent to operate, pollution control board NOC), labor law compliance audit (PF/ESI/gratuity claims, pending labor court cases), product liability exposure, FSSAI compliance (for food company), drug license (for pharma), factory license, fire NOC, and quantification of potential regulatory liabilities for deal price adjustment.'},
{id:448,cat:'dd',diff:'med',tags:'Due Diligence,HR,Employee,Talent,Retention',title:'HR Due Diligence – People Risk Assessment',prompt:'Perform HR due diligence for an acquisition. Cover: key person dependency (who are the 5 people without whom business stops), attrition rate and trend, compensation benchmarking (are key people underpaid?), ESOP plan review (unvested options – golden handcuff or retention risk?), pending employment disputes, PF/ESI compliance history, union and labor agreements, non-compete and non-solicit clauses with key employees, and 100-day retention plan.'},

// ═══ EXCEL AUTOMATION – BATCH 2 ═══
{id:449,cat:'excel',diff:'adv',tags:'Excel,Power Query,ETL,Data Transformation',title:'Power Query – Accounting Data Transformation',prompt:'Design a Power Query workflow in Excel for automating monthly accounting data transformation. Use case: bank statement in PDF format (via OCR to CSV) → Power Query transformation → auto-categorize transactions (using keyword-based categorization table) → output: trial balance feed. Steps: import CSV, remove header/footer rows, split amount column (debit/credit), add category column (using merge with lookup table), and output to Excel table with auto-refresh.'},
{id:450,cat:'excel',diff:'adv',tags:'Excel,VBA,Macro,Automation,Report Generation',title:'VBA Macro – Automated Report Generation',prompt:'Write a VBA macro to automate monthly financial report generation for a CA firm. Function: (1) open source data file (trial balance), (2) auto-format into P&L and Balance Sheet template, (3) apply conditional formatting (red for negative net worth, yellow for negative gross margin), (4) insert current month name in header, (5) auto-save as PDF in a client folder with date-stamped filename, and (6) send email notification. Provide step-by-step code with comments.'},
{id:451,cat:'excel',diff:'med',tags:'Excel,Formula,IF,VLOOKUP,INDEX,Advanced',title:'Advanced Excel Formulas – CA Practice Use Cases',prompt:'Create a reference guide of 20 advanced Excel formulas useful for CA practice. Include: VLOOKUP vs. XLOOKUP (with example), SUMPRODUCT for multi-condition sum (GST reconciliation), IFERROR for clean output, TEXT function for date formatting, SUMIFS for aging buckets, PivotTable-linked GETPIVOTDATA, dynamic arrays (FILTER, UNIQUE, SORT – for Excel 365), conditional formatting formulas for compliance trackers, and INDIRECT for dynamic range references.'},
{id:452,cat:'excel',diff:'med',tags:'Excel,GST,Reconciliation,ITC,Automation',title:'GST ITC Auto-Reconciliation in Excel',prompt:'Build a step-by-step Excel reconciliation process for matching GSTR-2B data (downloaded as JSON, converted to Excel) with purchase register. Steps: (1) standardize GSTIN format in both files (TRIM, UPPER), (2) standardize invoice number format (remove special characters), (3) use XLOOKUP to match on GSTIN+InvoiceNo+Amount, (4) flag unmatched in red using conditional formatting, (5) create pivot summary (matched ₹X lakh, unmatched by reason). Provide exact formula strings.'},

// ═══ SEBI – BATCH 2 ═══
{id:453,cat:'sebi',diff:'adv',tags:'SEBI,Delisting,Reverse Book Building,Price',title:'Delisting of Shares – SEBI Regulations',prompt:'Guide through the delisting process for a listed company under SEBI (Delisting of Equity Shares) Regulations 2021. Cover: voluntary vs. compulsory delisting, floor price computation, reverse book building process (discovered price must be 90% acceptance), promoter obligation if 25% public shareholders tender, delisting by acquisition under open offer route, tax implications for shareholders (capital gains on tendering shares), and exit to remaining shareholders after delisting.'},
{id:454,cat:'sebi',diff:'adv',tags:'SEBI,Open Offer,Takeover Code,Trigger',title:'Open Offer – SEBI Takeover Code Trigger',prompt:'Analyze SEBI Takeover Code 2011 open offer obligations. Trigger events: (1) acquisition of 25% or more voting rights, (2) creeping acquisition limit (5% per year for 25-75% shareholders), (3) change in control. Cover: offer size (26% of total share capital), open offer price (highest of 6 parameters), public announcement (PA) timeline, escrow account, SEBI filing, and strategies to acquire a company while avoiding or managing open offer obligations.'},
{id:455,cat:'sebi',diff:'med',tags:'SEBI,ESOP,Listed Company,Regulations',title:'ESOP for Listed Companies – SEBI Guidelines',prompt:'Explain SEBI SBEB (Share Based Employee Benefits) Regulations 2021 for ESOPs of listed companies. Cover: compensation committee approval, grant price (not less than face value), vesting period (minimum 1 year from grant date), exercise period, lock-in after exercise (no mandatory lock-in post 2021 amendment), dilution limit (5% per year, 10% without shareholders\' approval), disclosure requirements (annual report and quarterly to exchanges), and tax treatment at exercise.'},

// ═══ CUSTOMS – BATCH 2 ═══
{id:456,cat:'customs',diff:'med',tags:'Customs,Import,Valuation,Related Party,Rule 3',title:'Customs Valuation – Transaction Value Method',prompt:'Explain Customs Valuation (Determination of Value of Imported Goods) Rules 2007 for computing assessable value. Cover: transaction value method (Rule 3 – primary method), adjustments to transaction value (additions: assists, royalties, tooling, design costs; deductions: discounts, post-importation services), conditions for rejection of transaction value (related party imports), and alternative methods (comparative, deductive, computed, residual) when transaction value is not accepted.'},
{id:457,cat:'customs',diff:'adv',tags:'Customs,Duty Drawback,Export,S.74,S.75',title:'Duty Drawback – Export Incentive',prompt:'Explain the Duty Drawback scheme for exporters. Cover: All Industry Rate (AIR) drawback (Schedule under Customs & Central Excise Duties Drawback Rules), Brand Rate drawback (when AIR is insufficient, specific rate on actual duty paid), S. 74 drawback (re-export of imported goods within 2 years), S. 75 drawback on manufactured goods, claiming process (shipping bill declaration, bank account details with customs), drawback versus RoDTEP (what to choose and why).'},
{id:458,cat:'customs',diff:'med',tags:'Customs,MOOWR,Manufacturing,Warehouse',title:'MOOWR Scheme – Manufacturing in Bond',prompt:'Explain the Manufacturing and Other Operations in Warehouse Regulations (MOOWR) for a company planning to import capital goods and raw materials for manufacturing exports. Cover: duty deferral vs. exemption (duty deferred until domestic clearance), eligible activities (all manufacturing including electronics/pharma), unit approval process (Commissioner of Customs), bond and bank guarantee requirement, export obligation (no specific % required unlike EOU), and comparison with EOU/SEZ schemes.'},

// ═══ INTERNATIONAL TAX – BATCH 2 ═══
{id:459,cat:'intax',diff:'adv',tags:'International Tax,GAAR,General Anti Avoidance Rule,S.96',title:'GAAR – General Anti Avoidance Rule',prompt:'Advise on the applicability of GAAR (S. 95-102, Income Tax Act) to a tax planning arrangement. Arrangement: Indian company routes profits through a Mauritius subsidiary (LBT treaty benefit). Apply: impermissible avoidance arrangement tests (main purpose is tax benefit, lacks commercial substance, misuse of treaty), grandfathering for pre-April 2017 investments, GAAR vs. SAAR (Specific Anti-Avoidance Rules like S. 9), consequences (recharacterization, denial of treaty benefit), and Pillar 2 interaction.'},
{id:460,cat:'intax',diff:'med',tags:'International Tax,Expatriate,Shadow Payroll,Assignment',title:'Expatriate Taxation – India Assignment',prompt:'Advise on income tax compliance for an expatriate assigned to India for 3 years. Cover: residential status determination (days in India test), taxability of salary (Indian salary + foreign components), hypothetical tax arrangement (tax equalization by employer), perquisite valuation for expat (housing, car, school fees for children), social security agreement (totalization agreement – India with Japan, South Korea, Germany), shadow payroll, Form 16 requirements, and compliance calendar for expatriate.'},
{id:461,cat:'intax',diff:'adv',tags:'International Tax,Pillar 1,Market Jurisdiction,Amount A',title:'BEPS Pillar 1 – Amount A for Multinationals',prompt:'Explain BEPS Pillar 1 (Amount A) for an Indian context. Cover: applicability threshold (MNEs with global turnover >€20 billion and profitability >10%), reallocation of taxing rights to market jurisdictions (India as a market jurisdiction), estimated reallocation to India, conflict with Indian equalization levy (6% and 2%), elimination of equalization levy post-Pillar 1 implementation, and implementation timeline and India\'s negotiating position.'},

// ═══ SECTOR SPECIFIC – BATCH 2 ═══
{id:462,cat:'sector',diff:'med',tags:'Sector,Media,OTT,Entertainment,Tax,GST',title:'Media & Entertainment Sector – Tax Advisory',prompt:'Advise a media and entertainment company (OTT platform) on tax and GST compliance. Cover: GST on OTT subscriptions (18%), broadcasting services (18%), advertising revenue (18%), TDS on payments to content creators (S. 194C for production houses, S. 194J for artists), royalty payments to music label (S. 194J), place of supply for online content to foreign subscribers, and income tax planning for content amortization (multi-year content cost spread over content life).'},
{id:463,cat:'sector',diff:'med',tags:'Sector,Textile,MSME,GST,Rates',title:'Textile Sector – GST & Tax Advisory',prompt:'Advise a textile manufacturer on GST compliance. Cover: GST rate structure (5% on fabric, 12% on made-ups >1000 GSM, 5%/12% on garments by value), ITC restriction under 17(5), job work provisions for textile (dyeing, printing, embroidery), inverted duty structure refund eligibility, TUF (Technology Upgrade Fund) scheme interaction with GST, HSN code classification (Chapters 50-63), and income tax deduction under S. 10(20A)/S. 80JJA.'},
{id:464,cat:'sector',diff:'adv',tags:'Sector,EV,Electric Vehicle,Subsidy,FAME,Tax',title:'Electric Vehicle Sector – Tax & Incentive Advisory',prompt:'Advise an electric vehicle manufacturer on available tax incentives and compliance. Cover: FAME II subsidy scheme eligibility (minimum local value addition, demand incentive per vehicle), GST on EVs (5% vs. ICE vehicles at 28%+cess), ITC on charging infrastructure, income tax deduction for EV investment (S. 32AD accelerated depreciation for EV plants), buyer\'s S. 80EEB deduction for EV loan interest (₹1.5 lakh for individuals), and PLI scheme for Advanced Chemistry Cell batteries.'},
{id:465,cat:'sector',diff:'med',tags:'Sector,SaaS,Software,Subscription,IT,Compliance',title:'SaaS Product Company – Complete Tax & Compliance',prompt:'Create a comprehensive tax and compliance guide for an Indian SaaS product company with 80% export revenue. Cover: Income Tax (S. 10AA SEZ exemption or S. 80-IBA EOU benefits, presumptive deduction for foreign currency earnings), GST (export of services – LUT, zero-rated, IGST refund), Transfer Pricing (benchmarking for intra-group software license), FEMA (FLA return, ECB if foreign debt, FPI investment compliance), and annual compliance calendar with all due dates.'},

// ═══ TAX LITIGATION – BATCH 2 ═══
{id:466,cat:'litigation',diff:'adv',tags:'Litigation,DRP,Dispute Resolution Panel,S.144C',title:'Dispute Resolution Panel (DRP) Advisory',prompt:'Advise a multinational company that has received a draft assessment order under S. 144C. Cover: DRP jurisdiction (only for eligible assessee – non-residents and those with TP adjustments), DRP objection filing (Form 35A within 30 days of draft order), DRP direction timeline (9 months), nature of DRP order (binding on AO), assessee\'s options after DRP direction (appeal to ITAT within 45 days), and strategy: DRP vs. CIT(A) route for transfer pricing disputes.'},
{id:467,cat:'litigation',diff:'adv',tags:'Litigation,GST Audit,Inspection,S.67,S.65',title:'GST Departmental Audit Response Strategy',prompt:'Prepare a response strategy for a GST departmental audit under S. 65. Cover: notice requirements, audit period, preparation of documents before audit (ITC registers, GST returns, reconciliations), how to handle auditor queries professionally, common findings (ITC excess claimed, non-compliance of e-way bill, HSN discrepancy, turnover underreported), voluntary payment of admitted liability to minimize penalty, audit report response within 60 days, and appeal options if demand is raised.'},
{id:468,cat:'litigation',diff:'med',tags:'Litigation,Interest,S.234A,S.234B,Waiver',title:'Interest Under S. 234A, 234B, 234C – Analysis',prompt:'Compute and advise on interest liability under S. 234A, 234B, and 234C for a company for AY [year]. Facts: due date of filing ITR is October 31, return filed on December 15; assessed income is ₹80 lakh vs. returned income of ₹60 lakh; advance tax paid ₹12 lakh. Compute: S. 234A (delay in filing), S. 234B (advance tax default), S. 234C (deferment per installment). Also cover waiver conditions under S. 220(2A) and whether interest on interest is chargeable.'},
{id:469,cat:'litigation',diff:'adv',tags:'Litigation,AO,Information,Search,S.133(6)',title:'Reply to S. 133(6) Notice for Information',prompt:'Draft a reply to a notice under S. 133(6) requiring information about transactions with a third party (bank deposit). Cover: nature of notice (information requirement, not assessment), assessee\'s obligation to provide information vs. right to object on relevance grounds, time extension request if records are extensive, format of response, privilege and confidentiality of attorney-client communications, and consequences of non-compliance (penalty under S. 272A).'},
{id:470,cat:'litigation',diff:'adv',tags:'Litigation,Stay,S.220,Recovery,Tax Demand',title:'Stay of Tax Demand – S. 220(6) Application',prompt:'Draft an application for stay of tax demand under S. 220(6) to the Assessing Officer pending appeal before CIT(A). Demand: ₹1.5 crore. Cover: legal grounds for stay (strong prima facie case, irreparable hardship, balance of convenience), CBDT instruction F.No. 404/72/93-ITCC on stay guidelines (20% deposit for first appeal, balance stayed), financial hardship argument, offer to pay 20% immediately, and request for status quo on assets during appeal period.'},

// ═══ IND AS – BATCH 2 ═══
{id:471,cat:'indas',diff:'adv',tags:'Ind AS,Deferred Tax,Ind AS 12,DTA,DTL',title:'Deferred Tax – Ind AS 12 Computation',prompt:'Compute deferred tax assets and liabilities under Ind AS 12 for a manufacturing company. Items: (1) depreciation timing difference (book WDV ₹50 crore, tax WDV ₹35 crore), (2) provision for doubtful debts ₹5 crore (disallowed for tax, allowed when written off), (3) unabsorbed depreciation ₹8 crore (DTA recognition criteria), (4) revenue recognized upfront in books but spread over 3 years for tax. Show: opening DTL/DTA, current year movement, balance sheet, and P&L charge.'},
{id:472,cat:'indas',diff:'adv',tags:'Ind AS,Share Based Payment,ESOP,Vesting,Journal',title:'Share-Based Payment – Ind AS 102 Accounting',prompt:'Account for an ESOP scheme under Ind AS 102 for a company granting 10,000 options (exercise price ₹100, FMV on grant date ₹200, vesting period 4 years). Compute: Black-Scholes option fair value (given inputs), total ESOP expense over vesting period, graded vesting vs. straight-line expensing, journal entries at each year-end, treatment of forfeitures (actual vs. estimated), and disclosures required in financial statements.'},
{id:473,cat:'indas',diff:'adv',tags:'Ind AS,Property Plant Equipment,Component,Revaluation',title:'Fixed Assets – Ind AS 16 Key Issues',prompt:'Explain key accounting issues under Ind AS 16 for a manufacturing company. Cover: component accounting (a plant with major components having different useful lives – engine, body, control system), revaluation model (revaluation surplus in OCI, impairment, derecognition of revalued asset), major inspection costs (capitalization vs. expense), spare parts accounting (strategic spares as PPE, regular spares as inventory), decommissioning provision (unwinding of discount), and change in useful life estimate (prospective change).'},
{id:474,cat:'indas',diff:'med',tags:'Ind AS,Segment,CODM,Aggregation,Ind AS 108',title:'Segment Reporting Practical Issues – Ind AS 108',prompt:'Address practical issues in segment reporting under Ind AS 108 for a diversified company. Cover: identification of CODM (Chief Operating Decision Maker) and internal reporting reviewed, aggregation of operating segments (similar economic characteristics), reconciliation of segment revenue/profit to financial statements, measurement of segment assets (which items to include), inter-segment pricing policy, entity-wide disclosures (products/services, geography, major customers), and comparison with AS 17.'},
{id:475,cat:'indas',diff:'adv',tags:'Ind AS,Cash Flow,IAS 7,Indirect Method,Direct Method',title:'Cash Flow Statement – Ind AS 7 Issues',prompt:'Prepare a cash flow statement under Ind AS 7 and address common issues. Cover: classification of interest paid (financing or operating – Ind AS permits both, must be consistent), dividend received (operating or investing), foreign currency cash flows (translation of foreign subsidiary cash flows), cash and cash equivalents definition (treasury instruments with <3 months maturity qualify), bank overdraft treatment, and non-cash transactions that must be disclosed separately (e.g., finance lease inception, asset exchange).'},

// ═══ ESG – BATCH 2 ═══
{id:476,cat:'esg',diff:'med',tags:'ESG,TCFD,Climate Risk,Physical Risk,Transition Risk',title:'TCFD Climate Risk Disclosure for Companies',prompt:'Prepare a TCFD (Task Force on Climate-related Financial Disclosures) report framework for a manufacturing company. Cover four TCFD pillars: Governance (board oversight of climate risk), Strategy (physical risks – flooding/extreme heat, transition risks – carbon pricing, green policy), Risk Management (climate risk identification, assessment, integration into ERM), and Metrics & Targets (Scope 1, 2, 3 emissions, energy intensity, net-zero target). Provide illustrative disclosures for each pillar.'},
{id:477,cat:'esg',diff:'med',tags:'ESG,Scope 1,Scope 2,Scope 3,Carbon Footprint',title:'Carbon Footprint Calculation – Corporate',prompt:'Guide a manufacturing company through calculating its carbon footprint (Greenhouse Gas Inventory). Cover: Scope 1 emissions (direct – owned vehicles, factory fuel combustion), Scope 2 emissions (indirect – purchased electricity, use emission factors from CEA), Scope 3 emissions (value chain – supplier materials, employee commute, product use, end-of-life), GHG Protocol methodology, data collection framework, emission factor sources (IPCC, CEA, GHG Protocol database), and assurance requirement for BRSR disclosures.'},
{id:478,cat:'esg',diff:'adv',tags:'ESG,Green Bond,Sustainability Linked Loan,SEBI',title:'Green Finance Instruments – Advisory',prompt:'Advise a company on raising green finance. Options: (1) Green Bond (SEBI framework – use of proceeds for green projects, pre and post issuance disclosure, second-party opinion), (2) Sustainability-Linked Loan (KPI-linked pricing, performance targets – GHG reduction, renewable energy %, LEED certification), (3) RBI\'s Green Deposit scheme. For each: eligibility, documentation, cost of capital vs. conventional financing, reputational benefits, and reporting obligations.'},

// ═══ DIGITAL & TECH – BATCH 2 ═══
{id:479,cat:'digital',diff:'med',tags:'Digital,Cybersecurity,Data Protection,DPDP,IT Act',title:'DPDP Act – Compliance for CA Firms',prompt:'Advise a CA firm on compliance with the Digital Personal Data Protection Act 2023 (DPDP Act). Cover: what constitutes personal data in a CA firm (client PAN, Aadhaar, financial data), consent framework (explicit consent requirement before processing), fiduciary obligations (CA firm as data fiduciary), data localization requirements, rights of data principals (clients), breach notification obligation (to Data Protection Board within 72 hours), and penalties for non-compliance (up to ₹250 crore).'},
{id:480,cat:'digital',diff:'med',tags:'Digital,Faceless,IT Portal,Form,Filing,Glitches',title:'Income Tax Portal – Common Issues & Solutions',prompt:'Create a troubleshooting guide for common issues on the Income Tax e-filing portal. Cover: DSC registration and renewal, OTP-based verification for returns, Form 26AS vs. AIS discrepancy resolution, pre-filled data correction, how to respond to faceless assessment notices online, downloading intimation under S. 143(1), Form 10F submission for non-residents, Form 15CA/15CB XML upload issues, and escalation process to IT helpdesk or AO if portal issues affect filing deadlines.'},
{id:481,cat:'digital',diff:'adv',tags:'Digital,AI,Machine Learning,Audit,Automation',title:'AI-Powered Audit Procedures – Implementation',prompt:'Design an implementation plan for AI-powered audit procedures in a CA firm. Cover: journal entry anomaly detection using ML (training on historical data to flag unusual entries), OCR-based invoice data extraction for three-way matching, predictive analytics for NPA identification in bank audits, AI chatbot for client queries, vendor duplicate detection using fuzzy matching algorithms, and risk assessment using Benford\'s Law analysis. Include data security and auditor\'s responsibility in AI-assisted audits.'},
{id:482,cat:'digital',diff:'med',tags:'Digital,GST Portal,API,E-Invoicing,Integration',title:'GST API Integration for Business Automation',prompt:'Guide a mid-size company on integrating with GST API for automation. Cover: GSTN sandbox vs. production API access, e-invoicing API integration (auto-generation of IRN from ERP/Tally), GSTR-1 auto-filing via API, e-way bill API for auto-generation during dispatch, error handling for API failures, GSTIN verification API for vendor onboarding, and cost-benefit analysis of API integration vs. manual filing for a company with 2,000 invoices/month.'},
{id:483,cat:'digital',diff:'easy',tags:'Digital,LinkedIn,Social Media,CA,Brand Building',title:'LinkedIn Personal Branding for CAs',prompt:'Create a LinkedIn personal branding strategy for a CA specializing in GST and startup advisory. Cover: profile optimization (headline formula, about section with keywords, featured posts), content strategy (3 posts per week: 1 educational, 1 case study, 1 opinion on regulatory change), engagement tactics (comment on Ministry of Finance posts, ICAI announcements), lead generation (connect with CFOs, founders in target sector), newsletter launch, and measurement (profile views, leads generated per month).'},
{id:484,cat:'digital',diff:'med',tags:'Digital,Workflow,Automation,Zapier,Make,CA Practice',title:'Workflow Automation – CA Firm Processes',prompt:'Design a workflow automation system for a CA firm using no-code tools (Zapier/Make.com). Automated workflows: (1) Client document received via email → auto-save to Google Drive → WhatsApp notification to staff, (2) Due date approaching → auto-WhatsApp/email reminder to client, (3) Invoice approved → auto-send to client + update billing tracker, (4) New client signed up → auto-create compliance calendar in Google Sheets. Provide step-by-step Zapier workflow configuration for each.'},
{id:485,cat:'digital',diff:'adv',tags:'Digital,Cloud,AWS,Azure,Data Security,CA',title:'Cloud Data Security for CA Firms – Best Practices',prompt:'Design a cloud data security framework for a CA firm that stores client data on cloud (Google Drive/AWS S3). Cover: data classification (confidential vs. restricted vs. public), encryption at rest and in transit, access control (role-based access, MFA mandatory for all staff), data loss prevention (DLP) policies, backup frequency and recovery testing, vendor due diligence for cloud providers, ICAI guidelines on digital working papers, client consent for cloud storage, and incident response plan.'},

// ═══ ADDITIONAL CROSS-CATEGORY PROMPTS ═══
{id:486,cat:'gst',diff:'adv',tags:'GST,AAR,Advance Ruling,Strategy,Binding',title:'GST AAR Strategy – When to Apply and When Not',prompt:'Advise on the strategic use of GST Advance Rulings. Cover: situations where AAR is beneficial (new business activity with unclear GST treatment, classification dispute, high-value transactions), situations where AAR is risky (AAR is binding only on applicant but adverse ruling can invite departmental action on similar transactions), process timeline (usually 90 days), appeal to AAAR (if AAR is adverse), and how to use AAR vs. seeking a private legal opinion.'},
{id:487,cat:'it',diff:'adv',tags:'Income Tax,Penny Stocks,LTCG,S.10(38),Bogus LTCG',title:'Bogus LTCG from Penny Stocks – Advisory',prompt:'Advise a client who received an income tax notice adding alleged bogus Long-Term Capital Gains from penny stocks. Cover: how AO establishes the bogus LTCG allegation (STF data, suspicious price jump, penny stock databases), legal arguments available to assessee (valid STT-paid transactions, SEBI-regulated exchange transactions, S. 10(38) exemption claimed legitimately), burden of proof (who has to prove – AO or assessee), leading HC judgements on penny stock LTCG additions, and litigation strategy.'},
{id:488,cat:'audit',diff:'adv',tags:'Audit,Intangibles,Software,R&D,Capitalization',title:'Intangible Assets – Audit Procedures',prompt:'Design audit procedures for intangible assets (software development costs, customer lists, brand) for an IT company. Cover: capitalisation criteria (IAS 38/Ind AS 38 – feasibility, intention to complete, technical ability, sufficient resources), stage-wise accounting (research phase expense, development phase capitalise if criteria met), impairment indicators for software (technology obsolescence), useful life determination (definite vs. indefinite), and amortization adequacy testing.'},
{id:489,cat:'client',diff:'easy',tags:'Client,Services,Premium,Bundling,Pricing',title:'CA Firm Service Packaging & Pricing',prompt:'Design 3-tier service packages for a CA firm: Starter (₹25,000/year – basic ITR + GST compliance), Professional (₹75,000/year – ITR + GST + TDS + ROC + quarterly review call), and Advisory Plus (₹2,00,000/year – all compliance + monthly CFO call + tax planning + startup advisory). For each tier: services included, client profile it targets, value proposition, what\'s excluded, and the upsell triggers to move client from one tier to the next.'},
{id:490,cat:'mis',diff:'med',tags:'MIS,Financial Analysis,Ratio,Health Check',title:'Financial Health Check – Ratio Analysis',prompt:'Perform a comprehensive financial ratio analysis for a company using the following data: [insert key financials]. Compute and interpret: Liquidity Ratios (current, quick, cash), Profitability Ratios (GPM, NPM, ROCE, ROE), Efficiency Ratios (asset turnover, inventory turnover, debtor days, creditor days), Leverage Ratios (debt-equity, interest coverage, DSCR), and Market Ratios (P/E, EV/EBITDA if listed). Provide a Red/Amber/Green health dashboard with commentary.'},
{id:491,cat:'startup',diff:'med',tags:'Startup,Revenue,Model,Monetization,SaaS,B2B',title:'Revenue Model Design for SaaS Startup',prompt:'Design a comprehensive revenue model for a B2B SaaS startup targeting mid-size CA firms with a practice management software. Cover: pricing strategy (per-user SaaS vs. flat monthly subscription vs. usage-based), freemium tier to drive adoption, annual contract vs. monthly pricing (annual prepaid with 2-month discount), upsell features (AI-powered features at premium tier), pricing for different firm sizes (1-5 staff, 6-20 staff, 20+ staff), and commission model for CA franchise referrals.'},
{id:492,cat:'tp',diff:'adv',tags:'Transfer Pricing,DEMPE,Intangibles,Royalty,Principal',title:'DEMPE Analysis for Intangibles – TP',prompt:'Perform DEMPE (Development, Enhancement, Maintenance, Protection, Exploitation) analysis for an Indian subsidiary that develops software for its US parent. Determine: who performs DEMPE functions, who bears DEMPE risks, who funds DEMPE activities, OECD 2017 guidelines on intangible ownership (legal ownership vs. economic ownership), appropriate remuneration for Indian entity (cost plus vs. profit split), and risk of BEPS-driven tax authority challenge on IP ownership.'},

const VER = 'v5';
let prompts, bookmarks, nextId;

function initData() {
  // Always preserve bookmarks
  bookmarks = JSON.parse(localStorage.getItem('cpl_bm') || '[]');

  const savedRaw = localStorage.getItem('cpl_data');
  if (savedRaw) {
    try {
      const saved = JSON.parse(savedRaw);
      // Rescue any custom prompts the user created
      const customPrompts = saved.filter(p => p._custom);
      // Always use latest default prompts as base
      const base = JSON.parse(JSON.stringify(PROMPTS_DEFAULT));
      const defaultIds = new Set(base.map(p => p.id));
      // Append custom prompts that aren't already in defaults
      customPrompts.forEach(cp => { if (!defaultIds.has(cp.id)) base.push(cp); });
      prompts = base;
    } catch(e) {
      prompts = JSON.parse(JSON.stringify(PROMPTS_DEFAULT));
    }
  } else {
    prompts = JSON.parse(JSON.stringify(PROMPTS_DEFAULT));
  }

  localStorage.setItem('cpl_ver', VER);
  localStorage.setItem('cpl_data', JSON.stringify(prompts));
  nextId = Math.max(...prompts.map(p => p.id), 0) + 1;
}

function saveData() {
  localStorage.setItem('cpl_data', JSON.stringify(prompts));
  localStorage.setItem('cpl_bm', JSON.stringify(bookmarks));
}

// ══ HELPERS ══
function getCat(id) { return CATS.find(c => c.id === id) || { icon: '📌', label: id }; }
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hlText(text, q) {
  if (!q) return escHtml(text);
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp('(' + safe + ')', 'gi'), '<span class="hl">$1</span>');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('on');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('on'), 2800);
}
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copied!')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-999px;left:-999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); showToast('📋 Copied!'); } catch(e) { showToast('⚠️ Copy failed'); }
  document.body.removeChild(ta);
}
function openLink(url) {
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ══ FILTER & SORT ══
function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortSel').value;
  let list = [...prompts];
  if (activeFilter === 'bm') list = list.filter(p => bookmarks.includes(p.id));
  else if (activeFilter === 'mine') list = list.filter(p => p._custom);
  if (activeCat !== 'all') list = list.filter(p => p.cat === activeCat);
  if (q) list = list.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.prompt.toLowerCase().includes(q) ||
    (p.tags || '').toLowerCase().includes(q) ||
    getCat(p.cat).label.toLowerCase().includes(q)
  );
  if (sort === 'az') list.sort((a,b) => a.title.localeCompare(b.title));
  else if (sort === 'za') list.sort((a,b) => b.title.localeCompare(a.title));
  else if (sort === 'cat') list.sort((a,b) => a.cat.localeCompare(b.cat));
  return list;
}

function doRender() {
  renderSidebar();
  renderStats();
  renderCards();
}

function renderSidebar() {
  const el = document.getElementById('sbCats');
  el.innerHTML = CATS.map(cat => {
    const cnt = cat.id === 'all' ? prompts.length : prompts.filter(p => p.cat === cat.id).length;
    return `<div class="catbtn${activeCat === cat.id ? ' on' : ''}" onclick="setCat('${cat.id}')">
      <span class="ci">${cat.icon}</span>
      <span class="cl">${cat.label}</span>
      <span class="cc">${cnt}</span>
    </div>`;
  }).join('');
  document.getElementById('sbStats').innerHTML =
    `<strong>${prompts.length}</strong> prompts · <strong>${CATS.length - 1}</strong> categories · <strong>${bookmarks.length}</strong> saved`;
}

function renderStats() {
  const custom = prompts.filter(p => p._custom).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><span>📚</span><div><strong>${prompts.length}</strong>&nbsp;Total</div></div>
    <div class="stat"><span>⭐</span><div><strong>${bookmarks.length}</strong>&nbsp;Bookmarked</div></div>
    <div class="stat"><span>✏️</span><div><strong>${custom}</strong>&nbsp;My Prompts</div></div>
    <div class="stat"><span>📂</span><div><strong>${CATS.length - 1}</strong>&nbsp;Categories</div></div>
  `;
  document.getElementById('bmCount').textContent = bookmarks.length;
}

function renderCards() {
  const filtered = getFiltered();
  const grid = document.getElementById('cardsGrid');
  const empty = document.getElementById('emptyState');
  const q = document.getElementById('searchInput').value.trim();
  document.getElementById('searchClear').style.display = q ? 'block' : 'none';
  // section title
  const cat = getCat(activeCat);
  document.getElementById('secTitle').innerHTML =
    `${cat.icon} ${cat.label} <span class="sec-badge">${filtered.length}</span>`;
  if (!filtered.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(p => buildCard(p, q)).join('');
}

function buildCard(p, q) {
  const isBm = bookmarks.includes(p.id);
  const cat = getCat(p.cat);
  const diffHtml = p.diff
    ? `<span class="diff-${p.diff}">${{easy:'Beginner',med:'Intermediate',adv:'Advanced'}[p.diff]||''}</span>`
    : '';
  const tagsHtml = p.tags
    ? `<div class="tag-row">${p.tags.split(',').map(t => `<span class="tpill">${escHtml(t.trim())}</span>`).join('')}</div>`
    : '';
  return `<div class="card${isBm?' bm':''}" id="card${p.id}">
    <div class="card-top">
      <div class="card-meta">
        <span class="ctag">${cat.icon} ${cat.label}</span>${diffHtml}
      </div>
      <div class="card-acts">
        <button class="cact${isBm?' bmon':''}" title="${isBm?'Remove bookmark':'Bookmark'}" onclick="toggleBM(${p.id})">${isBm?'⭐':'☆'}</button>
        <button class="cact" title="Full view" onclick="openView(${p.id})">🔲</button>
        <button class="cact" title="Edit" onclick="showEdit(${p.id})">✏️</button>
        <button class="cact" title="Duplicate" onclick="dupePrompt(${p.id})">⧉</button>
        <button class="cact" title="Delete" onclick="deletePrompt(${p.id})">🗑️</button>
      </div>
    </div>
    ${tagsHtml}
    <div class="card-title">${hlText(p.title, q)}</div>
    <div class="card-body" id="cb${p.id}">${hlText(p.prompt, q)}</div>
    <div class="card-foot">
      <button class="exp-btn" onclick="toggleExp(${p.id})">▾ Expand</button>
      <div class="abtn-row">
        <button class="abtn cp" onclick="copyPrompt(${p.id})">📋 Copy</button>
        <button class="abtn wa" onclick="sendWA(${p.id})">💬 WA</button>
        <button class="abtn sh" onclick="sharePrompt(${p.id})">🔗 Share</button>
      </div>
    </div>
  </div>`;
}

function setCat(id) { activeCat = id; doRender(); }
function clearSearch() { document.getElementById('searchInput').value = ''; doRender(); }
function setFilter(f, el) {
  activeFilter = f;

  doRender();
}
function showBM() { setFilter('bm', document.getElementById('fc-bm')); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hide'); }

function toggleBM(id) {
  if (bookmarks.includes(id)) {
    bookmarks = bookmarks.filter(x => x !== id);
    showToast('Removed from bookmarks');
  } else {
    bookmarks.push(id);
    showToast('⭐ Bookmarked!');
  }
  saveData();
  doRender();
}

function toggleExp(id) {
  const body = document.getElementById('cb' + id);
  const btn = body.closest('.card').querySelector('.exp-btn');
  body.classList.toggle('exp');
  btn.textContent = body.classList.contains('exp') ? '▴ Collapse' : '▾ Expand';
}

function copyPrompt(id) {
  const p = prompts.find(x => x.id === id);
  if (p) copyText(p.prompt);
}

function sendWA(id) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  const url = 'https://api.whatsapp.com/send?text=' + encodeURIComponent('*' + p.title + '*\n\n' + p.prompt);
  openLink(url);
}

function sharePrompt(id) {
  shareTargetId = id;
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  // wire share buttons
  document.getElementById('shareWABtn').onclick = () => {
    openLink('https://api.whatsapp.com/send?text=' + encodeURIComponent('*' + p.title + '*\n\n' + p.prompt));
  };
  document.getElementById('shareEmailBtn').onclick = () => {
    openLink('mailto:?subject=' + encodeURIComponent(p.title) + '&body=' + encodeURIComponent(p.prompt));
  };
  document.getElementById('shareTWBtn').onclick = () => {
    openLink('https://twitter.com/intent/tweet?text=' + encodeURIComponent(p.title + '\n\n' + p.prompt.slice(0, 240) + '…'));
  };
  document.getElementById('shareLIBtn').onclick = () => {
    openLink('https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent('https://taxationupdates.com') + '&title=' + encodeURIComponent(p.title) + '&summary=' + encodeURIComponent(p.prompt.slice(0, 400)));
  };
  document.getElementById('shareCopyBtn').onclick = () => {
    copyText('*' + p.title + '*\n\n' + p.prompt);
    closeModal('modalShare');
  };
  document.getElementById('sharePrintBtn').onclick = () => { printPrompt(p); };
  showModal('modalShare');
}

function printPrompt(p) {
  const win = window.open('', '_blank', 'width=800,height=600');
  if (!win) { showToast('⚠️ Allow popups to print'); return; }
  win.document.write(`<!DOCTYPE html><html><head><title>${escHtml(p.title)}</title>
  <style>body{font-family:Arial,sans-serif;max-width:800px;margin:40px auto;padding:20px;color:#333}
  h1{font-size:18px;color:#8B6914;border-bottom:2px solid #8B6914;padding-bottom:8px;margin-bottom:16px}
  pre{white-space:pre-wrap;font-size:12px;line-height:1.7;border:1px solid #ddd;padding:14px;border-radius:8px;background:#f9f9f9;border-left:3px solid #8B6914}
  .ft{font-size:10px;color:#999;margin-top:16px;text-align:center}
  @media print{body{margin:10px}}</style></head><body>
  <h1>${escHtml(p.title)}</h1>
  <pre>${escHtml(p.prompt)}</pre>
  <div class="ft">CA Prompt Library Pro · Taxation Updates · taxationupdates.com</div>
  <script>window.onload=function(){window.print()}<\/script>
  </body></html>`);
  win.document.close();
}

function dupePrompt(id) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  prompts.push({ ...p, id: nextId++, title: p.title + ' (Copy)', _custom: true });
  saveData();
  doRender();
  showToast('⧉ Duplicated!');
}

function deletePrompt(id) {
  if (!confirm('Delete this prompt?')) return;
  prompts = prompts.filter(p => p.id !== id);
  bookmarks = bookmarks.filter(b => b !== id);
  saveData();
  doRender();
  showToast('🗑️ Deleted');
}

function populateCatSel() {
  const s = document.getElementById('fCat');
  s.innerHTML = '<option value="">-- Select Category --</option>' +
    CATS.filter(c => c.id !== 'all').map(c =>
      `<option value="${c.id}">${c.icon} ${c.label}</option>`
    ).join('');
}

function showAdd() {
  editingId = null;
  document.getElementById('addTitle').textContent = '✦ Add New Prompt';
  populateCatSel();
  document.getElementById('fTitle').value = '';
  document.getElementById('fCat').value = '';
  document.getElementById('fPrompt').value = '';
  document.getElementById('fDiff').value = '';
  document.getElementById('fTags').value = '';
  showModal('modalAdd');
}

function showEdit(id) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('addTitle').textContent = '✎ Edit Prompt';
  populateCatSel();
  document.getElementById('fTitle').value = p.title;
  document.getElementById('fCat').value = p.cat;
  document.getElementById('fPrompt').value = p.prompt;
  document.getElementById('fDiff').value = p.diff || '';
  document.getElementById('fTags').value = p.tags || '';
  showModal('modalAdd');
}

function savePrompt() {
  const title = document.getElementById('fTitle').value.trim();
  const cat = document.getElementById('fCat').value;
  const prompt = document.getElementById('fPrompt').value.trim();
  if (!title || !cat || !prompt) { showToast('⚠️ Please fill Title, Category and Prompt'); return; }
  const diff = document.getElementById('fDiff').value;
  const tags = document.getElementById('fTags').value.trim();
  if (editingId) {
    const p = prompts.find(x => x.id === editingId);
    if (p) { p.title = title; p.cat = cat; p.prompt = prompt; p.diff = diff; p.tags = tags; }
    showToast('✅ Updated!');
  } else {
    prompts.push({ id: nextId++, cat, title, prompt, diff, tags, _custom: true });
    showToast('✅ Added!');
  }
  saveData();
  closeModal('modalAdd');
  doRender();
}

// ══ EXPORT ══
function showExport() {
  exportCatSel = new Set(CATS.filter(c => c.id !== 'all').map(c => c.id));
  const el = document.getElementById('exportCats');
  el.innerHTML = CATS.filter(c => c.id !== 'all').map(c =>
    `<div class="ecat on" id="ec_${c.id}" onclick="toggleECat('${c.id}',this)">${c.icon} ${c.label}</div>`
  ).join('');
  showModal('modalExport');
}

function toggleECat(id, el) {
  if (exportCatSel.has(id)) { exportCatSel.delete(id); el.classList.remove('on'); }
  else { exportCatSel.add(id); el.classList.add('on'); }
}
function ecatToggleAll() {
  const all = CATS.filter(c => c.id !== 'all').map(c => c.id);
  const btn = document.getElementById('ecatAll');
  if (exportCatSel.size === all.length) {
    exportCatSel.clear();
    btn.classList.remove('on');
    document.querySelectorAll('.ecats .ecat').forEach(e => e.classList.remove('on'));
  } else {
    all.forEach(id => exportCatSel.add(id));
    btn.classList.add('on');
    document.querySelectorAll('.ecats .ecat').forEach(e => e.classList.add('on'));
  }
}

function doExport() {
  const fmt = document.querySelector('input[name="efmt"]:checked').value;
  const data = prompts.filter(p => exportCatSel.has(p.cat));
  if (!data.length) { showToast('⚠️ No prompts in selected categories'); return; }
  const opts = {
    title: document.getElementById('ecTitle').checked,
    cat: document.getElementById('ecCat').checked,
    prompt: document.getElementById('ecPrompt').checked,
    diff: document.getElementById('ecDiff').checked,
    tags: document.getElementById('ecTags').checked,
    bm: document.getElementById('ecBm').checked,
  };
  closeModal('modalExport');
  if (fmt === 'csv') doExportCSV(data, opts);
  else if (fmt === 'word') doExportWord(data, opts);
  else if (fmt === 'json') doExportJSON(data);
  else if (fmt === 'txt') doExportTXT(data);
}

function dlBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function doExportCSV(data, opts) {
  const headers = [];
  if (opts.title) headers.push('Title');
  if (opts.cat) headers.push('Category');
  if (opts.diff) headers.push('Difficulty');
  if (opts.tags) headers.push('Tags');
  if (opts.prompt) headers.push('Prompt Text');
  if (opts.bm) headers.push('Bookmarked');
  const rows = [headers, ...data.map(p => {
    const r = [];
    if (opts.title) r.push(p.title);
    if (opts.cat) r.push(getCat(p.cat).label);
    if (opts.diff) r.push({ easy: 'Beginner', med: 'Intermediate', adv: 'Advanced' }[p.diff] || '');
    if (opts.tags) r.push(p.tags || '');
    if (opts.prompt) r.push(p.prompt);
    if (opts.bm) r.push(bookmarks.includes(p.id) ? 'Yes' : 'No');
    return r;
  })];
  const csv = '\uFEFF' + rows.map(r => r.map(c => '"' + String(c||'').replace(/"/g, '""') + '"').join(',')).join('\r\n');
  dlBlob(new Blob([csv], { type: 'text/csv;charset=utf-8;' }), 'CA_Prompt_Library.csv');
  showToast('📊 Excel/CSV downloaded!');
}

function doExportWord(data, opts) {
  const groups = {};
  data.forEach(p => { if (!groups[p.cat]) groups[p.cat] = []; groups[p.cat].push(p); });
  let body = '<h1 style="color:#8B6914;font-family:Georgia,serif">⚖️ CA Prompt Library Pro</h1>';
  body += '<p style="color:#888;font-size:11pt">AI Automation Toolkit · Taxation Updates · taxationupdates.com</p><hr>';
  Object.keys(groups).forEach(catId => {
    const cat = getCat(catId);
    body += `<h2 style="color:#8B6914;border-bottom:2px solid #c9a84c;padding-bottom:4pt">${cat.icon} ${cat.label}</h2>`;
    groups[catId].forEach((p, i) => {
      body += `<div style="margin-bottom:16pt;padding:10pt;border:1pt solid #ddd;border-radius:4pt;page-break-inside:avoid">`;
      if (opts.title) body += `<h3 style="margin:0 0 6pt;color:#1a1d2e;font-size:12pt">${i+1}. ${escHtml(p.title)}</h3>`;
      if (opts.diff && p.diff) body += `<p style="margin:0 0 4pt;font-size:9pt;color:#888">Difficulty: ${{easy:'Beginner',med:'Intermediate',adv:'Advanced'}[p.diff]}</p>`;
      if (opts.tags && p.tags) body += `<p style="margin:0 0 4pt;font-size:9pt;color:#888">Tags: ${escHtml(p.tags)}</p>`;
      if (opts.prompt) body += `<p style="background:#f9f9f9;padding:10pt;border-left:3pt solid #c9a84c;font-size:10pt;line-height:1.6;white-space:pre-wrap;font-family:Courier New,monospace">${escHtml(p.prompt)}</p>`;
      body += '</div>';
    });
  });
  body += `<hr><p style="font-size:9pt;color:#999;text-align:center">Generated by CA Prompt Library Pro · Total: ${data.length} prompts · © Taxation Updates</p>`;
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="utf-8"><title>CA Prompt Library</title>
    <style>body{font-family:Calibri,Arial,sans-serif;margin:2cm}</style></head>
    <body>${body}</body></html>`;
  dlBlob(new Blob([html], { type: 'application/msword' }), 'CA_Prompt_Library.doc');
  showToast('📝 Word document downloaded!');
}

function doExportJSON(data) {
  dlBlob(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }), 'CA_Prompt_Library.json');
  showToast('📦 JSON downloaded!');
}

function doExportTXT(data) {
  let out = 'CA PROMPT LIBRARY PRO\nAI Automation Toolkit for Chartered Accountants\n' + '='.repeat(60) + '\n\n';
  data.forEach((p, i) => {
    out += `${i+1}. ${p.title}\n`;
    out += `   Category : ${getCat(p.cat).label}\n`;
    if (p.diff) out += `   Difficulty: ${{easy:'Beginner',med:'Intermediate',adv:'Advanced'}[p.diff]}\n`;
    if (p.tags) out += `   Tags      : ${p.tags}\n`;
    out += '\nPROMPT:\n' + p.prompt + '\n\n' + '-'.repeat(60) + '\n\n';
  });
  dlBlob(new Blob([out], { type: 'text/plain;charset=utf-8' }), 'CA_Prompt_Library.txt');
  showToast('📄 Text file downloaded!');
}

// ══ PRINT ══
function doPrint() {
  const filtered = getFiltered();
  const win = window.open('', '_blank', 'width=900,height=700');
  if (!win) { showToast('⚠️ Allow popups to print'); return; }
  let html = `<!DOCTYPE html><html><head><title>CA Prompt Library</title>
  <style>body{font-family:Arial,sans-serif;font-size:11px;color:#333;max-width:900px;margin:0 auto;padding:24px}
  h1{font-size:20px;color:#8B6914;border-bottom:2px solid #8B6914;padding-bottom:6px;margin-bottom:4px}
  h2{font-size:13px;color:#8B6914;margin-top:20px;border-bottom:1px solid #ddd;padding-bottom:3px}
  .it{margin-bottom:14px;padding:10px;border:1px solid #ddd;border-radius:5px;break-inside:avoid}
  .it-t{font-weight:bold;font-size:12px;margin-bottom:5px}
  .it-p{font-size:10px;line-height:1.6;color:#444;background:#f9f9f9;padding:9px;border-left:3px solid #c9a84c;white-space:pre-wrap}
  .ft{margin-top:20px;font-size:9px;color:#999;text-align:center}
  @media print{body{margin:0}}</style></head><body>
  <h1>⚖️ CA Prompt Library Pro</h1>
  <p style="color:#888;font-size:10px;margin-bottom:16px">AI Toolkit · ${filtered.length} prompts · Taxation Updates</p>`;
  let curCat = '';
  filtered.forEach(p => {
    if (p.cat !== curCat) {
      const c = getCat(p.cat);
      html += `<h2>${c.icon} ${c.label}</h2>`;
      curCat = p.cat;
    }
    html += `<div class="it"><div class="it-t">${escHtml(p.title)}</div><div class="it-p">${escHtml(p.prompt)}</div></div>`;
  });
  html += `<div class="ft">CA Prompt Library Pro · taxationupdates.com · Total: ${filtered.length}</div>
  <script>window.onload=function(){window.print()}<\/script></body></html>`;
  win.document.write(html);
  win.document.close();
}

// ══ THEME ══
function toggleDarkMode() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('cpl_theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('cpl_theme', 'dark');
  }
}
function loadTheme() {
  const saved = localStorage.getItem('cpl_theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
}
document.getElementById('darkToggle').addEventListener('click', toggleDarkMode);

// ══ MODAL HELPERS ══
function showModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('on');
}
function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('on');
}
// Close modal when clicking backdrop
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('overlay')) {
    e.target.classList.remove('on');
  }
});
// Escape key closes all modals
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.overlay.on').forEach(m => m.classList.remove('on'));
  }
});
// Sidebar toggle
document.getElementById('sideToggle').addEventListener('click', toggleSidebar);

// ══ INIT ══
loadTheme();
initData();
doRender();
</script>
