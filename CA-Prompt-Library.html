<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Prompt Library Pro — 500+ AI Prompts for CAs</title>
<meta name="description" content="500+ curated AI prompts for Chartered Accountants covering GST, Income Tax, audit, compliance, client communication, and more. Free searchable library by CA Mayur Sondagar."/>
<link rel="canonical" href="https://taxationupdates.com/CA-Prompt-Library.html"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png"/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YC101DVMH7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-YC101DVMH7');
</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── THEMES ── */
:root{--bg:#fafbf0;--sur:#ffffff;--sur2:#f0f3d8;--sur3:#e8edbb;--bdr:rgba(140,154,26,0.22);--acc:#8c9a1a;--acc2:#b5c422;--accbg:rgba(140,154,26,0.07);--txt:#252a08;--txt2:#4e570f;--txt3:#7a8520;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--teal:#2dd4bf;--radius:12px;--shadow:0 8px 32px rgba(140,154,26,0.18);--sideW:255px}
[data-theme="dark"]{--bg:#1a1d0a;--sur:#242810;--sur2:#1f2209;--sur3:#2e3410;--bdr:rgba(140,154,26,0.3);--acc:#8c9a1a;--acc2:#b5c422;--accbg:rgba(140,154,26,0.12);--txt:#e8edbb;--txt2:#c5ce6e;--txt3:#9aaa2e;--shadow:0 8px 32px rgba(0,0,0,.5)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:99px}::-webkit-scrollbar-thumb:hover{background:var(--txt3)}

/* ── HEADER ── */
.hdr{background:var(--bg);border-bottom:1px solid var(--bdr);padding:0 16px;position:sticky;top:0;z-index:300;display:flex;align-items:center;gap:10px;height:58px;box-shadow:0 2px 16px rgba(140,154,26,0.1);backdrop-filter:blur(12px)}
.hdr-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr-logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--txt);white-space:nowrap}
.hdr-logo-sub{font-size:9px;color:var(--txt3);display:block;margin-top:-2px}
.hdr-search{flex:1;max-width:440px;display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:9px;padding:0 11px;transition:border-color .2s}
.hdr-search:focus-within{border-color:var(--acc)}
.hdr-search input{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 0}
.hdr-search input::placeholder{color:var(--txt3)}
.hdr-clear{color:var(--txt3);cursor:pointer;font-size:12px;display:none;padding:2px 4px}
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
/* dark mode toggle */
.dark-toggle{width:42px;height:24px;border-radius:50px;background:var(--sur3);border:1.5px solid var(--bdr);cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
.dark-toggle::after{content:'☀️';position:absolute;left:2px;top:50%;transform:translateY(-50%);font-size:.7rem;width:18px;height:18px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;transition:left .3s,background .3s}
[data-theme="dark"] .dark-toggle{background:var(--sur3)}
[data-theme="dark"] .dark-toggle::after{content:'🌙';left:18px;background:var(--acc2)}
/* header buttons */
.hbtn{background:var(--sur2);border:1px solid var(--bdr);color:var(--txt2);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.hbtn:hover{background:var(--bdr);color:var(--txt)}
.hbtn.pri{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:600}
.hbtn.pri:hover{opacity:.9}
.hbtn .lbl{display:inline}
.sbtn{background:var(--sur2);border:1px solid var(--bdr);color:var(--txt2);width:30px;height:30px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;flex-shrink:0}
.sbtn:hover{background:var(--bdr);color:var(--txt)}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 58px);overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sideW);min-width:var(--sideW);background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;transition:width .3s,min-width .3s}
.sidebar.hide{width:0;min-width:0;border:none}
.sb-title{font-size:9.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);padding:14px 14px 6px}
.sb-scroll{overflow-y:auto;flex:1;padding-bottom:8px}
.catbtn{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;color:var(--txt2);font-size:12.5px;border-left:3px solid transparent;transition:all .15s;white-space:nowrap}
.catbtn:hover{background:var(--sur2);color:var(--txt)}
.catbtn.on{background:var(--accbg);color:var(--acc);border-left-color:var(--acc);font-weight:500}
.catbtn .ci{font-size:14px;min-width:17px}
.catbtn .cl{flex:1;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.catbtn .cc{background:var(--sur3);color:var(--txt3);font-size:9.5px;padding:1px 5px;border-radius:8px;flex-shrink:0}
.catbtn.on .cc{background:var(--acc);color:#fff}
.sb-stats{padding:10px 14px;border-top:1px solid var(--bdr);font-size:11px;color:var(--txt3);flex-shrink:0;line-height:1.6}
.sb-stats strong{color:var(--acc)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.main-top{padding:14px 18px 0;flex-shrink:0}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fchip{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--sur2);color:var(--txt2);font-size:12px;cursor:pointer;transition:all .15s}
.fchip:hover{border-color:var(--acc);color:var(--txt)}
.fchip.on{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:600}
.sort-sel{background:var(--sur2);border:1px solid var(--bdr);color:var(--txt2);padding:5px 10px;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;margin-left:auto}
.sort-sel option{background:var(--sur)}
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:9px 13px;display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--txt2)}
.stat strong{color:var(--acc);font-size:15px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 18px}
.sec-title{font-family:'Playfair Display',serif;font-size:19px;display:flex;align-items:center;gap:8px}
.sec-badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:'DM Sans',sans-serif}

/* ── CARDS ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:13px;padding:0 18px 24px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--radius);padding:15px;transition:all .2s;animation:fadeUp .22s ease both;position:relative;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--acc);box-shadow:0 4px 20px rgba(0,0,0,.25);transform:translateY(-1px)}
.card.bm{border-color:var(--acc)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ctag{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:var(--accbg);color:var(--acc);white-space:nowrap}
.diff-e{background:#14532d;color:#4ade80;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600}
.diff-m{background:#7c2d12;color:#fb923c;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600}
.diff-a{background:#1e1b4b;color:#a78bfa;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600}
.card-acts{display:flex;gap:3px;flex-shrink:0}
.cact{background:var(--sur2);border:1px solid var(--bdr);color:var(--txt3);width:25px;height:25px;border-radius:6px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cact:hover{background:var(--bdr);color:var(--txt)}
.cact.bmon{color:var(--acc)}
.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.tpill{font-size:9px;padding:1px 7px;border-radius:8px;background:var(--sur3);color:var(--txt3)}
.card-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:7px;line-height:1.4}
.card-body{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--txt2);background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:9px;line-height:1.6;max-height:68px;overflow:hidden;position:relative;transition:max-height .35s ease}
.card-body.exp{max-height:600px}
.card-body:not(.exp)::after{content:'';position:absolute;bottom:0;left:0;right:0;height:26px;background:linear-gradient(transparent,var(--sur2));pointer-events:none}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:6px;flex-wrap:wrap}
.exp-btn{font-size:11px;color:var(--acc);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:3px;padding:0;flex-shrink:0}
.abtn-row{display:flex;gap:4px;flex-wrap:wrap}
.abtn{font-size:11px;padding:4px 9px;border-radius:6px;cursor:pointer;border:1px solid var(--bdr);background:var(--sur2);color:var(--txt2);font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:3px;transition:all .15s;white-space:nowrap}
.abtn:hover{background:var(--bdr);color:var(--txt)}
.abtn.cp:hover{border-color:var(--teal);color:var(--teal)}
.abtn.wa:hover{border-color:var(--green);color:var(--green)}
.abtn.sh:hover{border-color:var(--blue);color:var(--blue)}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-ic{font-size:44px;margin-bottom:10px}

/* ── HIGHLIGHT ── */
.hl{background:var(--accbg);color:var(--acc2);border-radius:3px;padding:0 2px}

/* ── MODAL / OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;padding:16px}
.overlay.on{opacity:1;pointer-events:all}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:24px;width:560px;max-width:100%;box-shadow:var(--shadow);transform:scale(.96);transition:transform .22s;max-height:90vh;overflow-y:auto}
.overlay.on .modal{transform:scale(1)}
.modal-lg{width:680px}
.modal-xl{width:780px}
.mt{font-family:'Playfair Display',serif;font-size:18px;color:var(--acc);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.fg{margin-bottom:13px}
.fl{font-size:11px;color:var(--txt3);margin-bottom:4px;display:block;letter-spacing:.4px;text-transform:uppercase}
.fi,.fs,.fta{width:100%;background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);font-family:'DM Sans',sans-serif;border-radius:8px;padding:8px 11px;font-size:13px;outline:none;transition:border-color .2s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--acc)}
.fta{resize:vertical;min-height:108px;font-family:'JetBrains Mono',monospace;font-size:11px}
.fs option{background:var(--sur)}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
/* share grid */
.share-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
.sopt{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;cursor:pointer;transition:all .15s;font-size:12px;color:var(--txt2);text-align:center}
.sopt:hover{border-color:var(--acc);color:var(--txt);background:var(--accbg)}
.sopt-ic{font-size:22px}
/* export */
.ecats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.ecat{padding:4px 11px;border-radius:20px;border:1px solid var(--bdr);background:var(--sur2);color:var(--txt2);font-size:11.5px;cursor:pointer;transition:all .15s}
.ecat.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.colcks{display:flex;gap:14px;flex-wrap:wrap}
.colcks label{font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--txt2)}
.fmts{display:flex;gap:12px;flex-wrap:wrap}
.fmts label{font-size:12.5px;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--txt2)}
/* full view */
.fsprompt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--txt);background:var(--sur2);border:1px solid var(--bdr);border-radius:9px;padding:16px;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:52vh;overflow-y:auto}
/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--sur);border:1px solid var(--acc);color:var(--txt);padding:9px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;pointer-events:none;transition:all .28s;box-shadow:var(--shadow);white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* responsive */
@media(max-width:760px){.sidebar{display:none}.grid{grid-template-columns:1fr}.hdr-logo-text{font-size:14px}.hbtn .lbl{display:none}.share-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.dark-toggle{display:none}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <button class="sbtn" id="sideToggle" title="Toggle Sidebar">☰</button>
  <div class="hdr-logo">
    <div class="hdr-logo-icon" style="background:var(--acc);border-radius:8px;font-size:14px">Tx<sup style="font-size:8px">®</sup></div>
    <div><div class="hdr-logo-text">CA Prompt Library</div><span class="hdr-logo-sub">500+ AI Prompts · Taxation Updates</span></div>
  </div>
  <div class="hdr-search">
    <span style="color:var(--txt3);font-size:14px">🔍</span>
    <input type="text" id="searchInput" placeholder="Search 500+ prompts…" oninput="doRender()">
    <span class="hdr-clear" id="searchClear" onclick="clearSearch()">✕</span>
  </div>
  <div class="hdr-right">
    <button class="dark-toggle" id="darkToggle" title="Toggle dark mode" aria-label="Toggle dark mode"></button>
    <button class="hbtn" onclick="showBM()">🔖 <span class="lbl">Saved (<span id="bmCount">0</span>)</span></button>
    <button class="hbtn" onclick="showExport()">📤 <span class="lbl">Export</span></button>
    <button class="hbtn pri" onclick="showAdd()">＋ <span class="lbl">Add Prompt</span></button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-title">Browse Categories</div>
    <div class="sb-scroll" id="sbCats"></div>
    <div class="sb-stats" id="sbStats"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainArea">
    <div class="main-top">
      <div class="toolbar">
        <button class="fchip on" id="fc-all" onclick="setFilter('all',this)">All</button>
        <button class="fchip" id="fc-bm" onclick="setFilter('bm',this)">⭐ Bookmarked</button>
        <button class="fchip" id="fc-mine" onclick="setFilter('mine',this)">✏️ My Prompts</button>
        <select class="sort-sel" id="sortSel" onchange="doRender()">
          <option value="def">Default Order</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="cat">By Category</option>
        </select>
      </div>
      <div class="stats-row" id="statsRow"></div>
    </div>
    <div class="sec-hdr">
      <div class="sec-title" id="secTitle">All Prompts <span class="sec-badge" id="secBadge">0</span></div>
      <button class="hbtn" onclick="doPrint()">🖨️ Print View</button>
    </div>
    <div class="grid" id="cardsGrid"></div>
    <div id="emptyState" class="empty" style="display:none">
      <div class="empty-ic">🔎</div>
      <div style="font-size:14px;margin-bottom:6px">No prompts found</div>
      <div style="font-size:12px;color:var(--txt3)">Try a different keyword or <span style="color:var(--acc);cursor:pointer" onclick="showAdd()">add a new prompt</span></div>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="modalAdd">
  <div class="modal">
    <div class="mt" id="addTitle">✦ Add New Prompt</div>
    <div class="fg"><label class="fl">Title *</label><input class="fi" id="fTitle" placeholder="e.g. GST ITC Reversal Notice Reply"></div>
    <div class="fg"><label class="fl">Category *</label><select class="fs" id="fCat"><option value="">-- Select --</option></select></div>
    <div class="fg"><label class="fl">Prompt Text *</label><textarea class="fta" id="fPrompt" placeholder="Write your full prompt here…" style="min-height:130px"></textarea></div>
    <div style="display:flex;gap:12px">
      <div class="fg" style="flex:1"><label class="fl">Difficulty</label><select class="fs" id="fDiff"><option value="">Not set</option><option value="easy">Beginner</option><option value="med">Intermediate</option><option value="adv">Advanced</option></select></div>
      <div class="fg" style="flex:1"><label class="fl">Tags (comma-separated)</label><input class="fi" id="fTags" placeholder="GST, Notice, ITC"></div>
    </div>
    <div class="mfoot">
      <button class="hbtn" onclick="closeModal('modalAdd')">Cancel</button>
      <button class="hbtn pri" onclick="savePrompt()">💾 Save Prompt</button>
    </div>
  </div>
</div>

<!-- FULL VIEW MODAL -->
<div class="overlay" id="modalView">
  <div class="modal modal-xl">
    <div class="mt" id="viewTitle">Prompt</div>
    <div class="fsprompt" id="viewBody"></div>
    <div class="mfoot" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <button class="hbtn" id="viewCopyBtn">📋 Copy</button>
        <button class="hbtn" id="viewWABtn">💬 WhatsApp</button>
        <button class="hbtn" id="viewEmailBtn">📧 Email</button>
        <button class="hbtn" id="viewShareBtn">🔗 Share</button>
      </div>
      <button class="hbtn" onclick="closeModal('modalView')">✕ Close</button>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="overlay" id="modalShare">
  <div class="modal">
    <div class="mt">🔗 Share Prompt</div>
    <div class="share-grid">
      <div class="sopt" id="shareWABtn"><span class="sopt-ic">💬</span>WhatsApp</div>
      <div class="sopt" id="shareEmailBtn"><span class="sopt-ic">📧</span>Email</div>
      <div class="sopt" id="shareTWBtn"><span class="sopt-ic">🐦</span>Twitter / X</div>
      <div class="sopt" id="shareLIBtn"><span class="sopt-ic">💼</span>LinkedIn</div>
      <div class="sopt" id="shareCopyBtn"><span class="sopt-ic">📋</span>Copy Text</div>
      <div class="sopt" id="sharePrintBtn"><span class="sopt-ic">🖨️</span>Print</div>
    </div>
    <div class="mfoot"><button class="hbtn" onclick="closeModal('modalShare')">✕ Close</button></div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="overlay" id="modalExport">
  <div class="modal modal-lg">
    <div class="mt">📤 Export Prompt Library</div>
    <div class="fg">
      <label class="fl">Select Categories</label>
      <div style="margin-bottom:8px"><button class="ecat on" id="ecatAll" onclick="ecatToggleAll()">✓ All Categories</button></div>
      <div class="ecats" id="exportCats"></div>
    </div>
    <div class="fg"><label class="fl">Columns to Include</label>
      <div class="colcks">
        <label><input type="checkbox" id="ecTitle" checked> Title</label>
        <label><input type="checkbox" id="ecCat" checked> Category</label>
        <label><input type="checkbox" id="ecPrompt" checked> Prompt Text</label>
        <label><input type="checkbox" id="ecDiff"> Difficulty</label>
        <label><input type="checkbox" id="ecTags"> Tags</label>
        <label><input type="checkbox" id="ecBm"> Bookmarked</label>
      </div>
    </div>
    <div class="fg"><label class="fl">Format</label>
      <div class="fmts">
        <label><input type="radio" name="efmt" value="csv" checked> CSV / Excel</label>
        <label><input type="radio" name="efmt" value="word"> Word (.doc)</label>

<script>
const PROMPTS_DEFAULT=[
// ═══ GST ═══
{id:1,cat:'gst',diff:'easy',tags:'ITC,Notice,Rule 42',title:'GST ITC Reversal Notice Reply',prompt:'Act as a GST litigation expert. My client received a notice demanding reversal of Input Tax Credit under Rule 42 for proportionate use. Client turnover: 80% taxable, 20% exempt. Draft a formal reply with legal provisions, relevant CBIC circulars, and arguments to contest the demand.'},
{id:2,cat:'gst',diff:'easy',tags:'Reconciliation,GSTR-2B',title:'GSTR-2A vs 2B Mismatch Analysis',prompt:'Act as a GST compliance specialist. Analyze GSTR-2B vs purchase register data. Identify mismatched invoices, calculate ITC at risk, categorize discrepancies (vendor not filed, timing difference, invoice mismatch), and suggest corrective action for each category with a reconciliation format.'},
{id:3,cat:'gst',diff:'med',tags:'Annual Return,GSTR-9',title:'GSTR-9 Annual Return Reconciliation',prompt:'Help prepare a reconciliation statement for GSTR-9 filing. Compare turnover in GSTR-1 vs Books vs GSTR-3B. Highlight differences, suggest adjustments, flag any liability needing discharge before filing, and draft the narrative for Part V disclosures. Applicable FY: [insert year].'},
{id:4,cat:'gst',diff:'easy',tags:'Registration,SCN',title:'GST Registration Cancellation SCN Reply',prompt:'Draft a formal reply to an SCN for cancellation of GST registration. Business has been inactive due to [reason]. Include prayer for restoration, provisions under CGST Act S. 29 and S. 30, and offer to file pending returns within 30 days with undertaking letter.'},
{id:5,cat:'gst',diff:'easy',tags:'E-Invoice,Exemption',title:'E-Invoice Exemption Representation',prompt:'Draft a letter to the GST officer explaining why our client is exempt from the e-invoicing mandate. Client is a [describe business type]. Cite relevant CBIC notifications, applicable thresholds, and request formal confirmation in writing.'},
{id:6,cat:'gst',diff:'med',tags:'Audit,Checklist',title:'GST Audit Checklist – Manufacturing',prompt:'Generate a comprehensive GST audit checklist for a manufacturing company with turnover ₹15 crore. Cover: ITC reconciliation, RCM liability, e-way bill compliance, HSN summary accuracy, annual return reconciliation, and job work transactions. Format as checklist with Yes/No/NA columns.'},
{id:7,cat:'gst',diff:'med',tags:'Export,LUT,Zero-rated',title:'GST on Export of IT Services',prompt:'Advise on GST treatment for export of IT services to a US client. Cover: zero-rated supply rules, LUT filing process, IGST refund vs LUT route, FIRC requirement, conditions under S. 16 of IGST Act, and OIDAR implications. Provide a brief note for client communication.'},
{id:8,cat:'gst',diff:'easy',tags:'RCM,Ready Reference',title:'Reverse Charge Mechanism Summary',prompt:'Create a categorized summary of all goods and services currently under Reverse Charge Mechanism (RCM) as per GST law updated to [current year]. Include: supplier category, recipient, rate, ITC availability, and key conditions. Format as a ready reference table.'},
{id:9,cat:'gst',diff:'adv',tags:'Refund,Inverted Duty,RFD-01',title:'GST Refund – Inverted Duty Structure',prompt:'Draft application for GST refund on inverted duty structure for a textile manufacturer. Output rate 5%, input rate 12%. Compute eligible refund under Rule 89(5), prepare RFD-01 data structure, identify documents to attach, and draft the covering letter to jurisdictional officer.'},
{id:10,cat:'gst',diff:'adv',tags:'Place of Supply,IGST',title:'Place of Supply – Complex Transactions',prompt:'Determine the correct place of supply for: (1) IT services by Bangalore company to Mumbai company for use at Dubai office, (2) Repair of machinery at client premises in another state, (3) Online course sold to an individual. Apply IGST Act provisions and state tax treatment for each.'},
{id:11,cat:'gst',diff:'adv',tags:'Real Estate,Builder,Works Contract',title:'GST on Real Estate – Builder Advisory',prompt:'Advise a real estate developer on GST implications for: under-construction flats (affordable vs. non-affordable), commercial spaces, common area maintenance charges, JDA/TDR transactions, and FSI charges. Cover applicable rates, ITC restrictions, time of supply, and compliance requirements.'},
{id:12,cat:'gst',diff:'adv',tags:'S.74,SCN,Fraud,Demand',title:'GST Demand S.74 Reply – Suppression',prompt:'Draft a detailed reply to a GST demand under S. 74 CGST Act (fraud/suppression allegation) for alleged suppression of turnover ₹[X] lakh for FY [year]. Include: denial of fraud, turnover reconciliation explanation, legal arguments under S. 74(1) provisos, and request to drop proceedings.'},
{id:13,cat:'gst',diff:'easy',tags:'LUT,Export',title:'LUT Filing – Process & Advisory',prompt:'Explain the complete process for filing Letter of Undertaking (LUT) for export without payment of IGST. Cover: who can file, eligibility conditions, online process on GST portal, LUT format, validity period, renewal process, consequences of violation, and penalty provisions.'},
{id:14,cat:'gst',diff:'med',tags:'HSN,Classification',title:'HSN Code Determination – Product Classification',prompt:'Determine the correct 8-digit HSN code and applicable GST rate for the following products: [list products]. For each: explain reasoning, relevant rate schedule entry, applicable CBIC clarifications, dispute risk, and whether any advance ruling has been issued on similar goods.'},
{id:15,cat:'gst',diff:'med',tags:'Composite Supply,Mixed Supply',title:'Composite vs Mixed Supply Analysis',prompt:'Analyze whether the following supply is a composite supply or mixed supply under GST: [describe supply — e.g., hotel providing room + breakfast + spa]. Identify principal supply, applicable rate, tax treatment, and cite relevant AAR/AAAR rulings on similar matters.'},
{id:16,cat:'gst',diff:'adv',tags:'Appeal,Appellate,ITC Denial',title:'GST Appeal – Appellate Authority',prompt:'Draft an appeal memorandum before GST Appellate Authority against an order disallowing ITC of ₹[X] lakh on alleged non-genuine invoices. Include: grounds of appeal, factual background, legal arguments (S. 16 conditions satisfied), supporting case laws (jurisdictional HC), and specific prayer for relief.'},
{id:17,cat:'gst',diff:'adv',tags:'GSTR-9C,Reconciliation,Certification',title:'GSTR-9C Self-Certified Reconciliation',prompt:'Prepare a GSTR-9C self-certified reconciliation statement for FY [year] for a company with turnover ₹10 crore. Reconcile audited turnover with GSTR-1 and GSTR-9. Identify differences due to credit notes, advances, debit notes, unbilled revenue, and draft the CA certification note.'},
{id:18,cat:'gst',diff:'med',tags:'Job Work,Rule 45,Challan',title:'Job Work Compliance Advisory',prompt:'Advise a principal manufacturer sending goods for job work on GST compliance. Cover: challan requirements under Rule 45, time limits (1 year goods / 3 years capital goods), treatment of waste/scrap at job worker premises, ITC eligibility, actions if goods not returned in time, and GST on job work charges.'},
{id:19,cat:'gst',diff:'adv',tags:'Anti-Profiteering,NAA',title:'Anti-Profiteering Notice Response',prompt:'Draft a response to a National Anti-Profiteering Authority notice alleging failure to pass on GST rate reduction benefit. Include: computation rebuttal, price data analysis, market conditions justification, cost escalation evidence, and legal grounds for dropping proceedings.'},
{id:20,cat:'gst',diff:'med',tags:'SaaS,Subscription,OIDAR',title:'GST on SaaS/Subscription Services',prompt:'Determine GST treatment for a SaaS company providing software subscription to clients across India and abroad. Cover: nature of supply classification, B2B vs B2C invoicing differences, OIDAR rules for overseas individual customers, zero-rating for exports, and ITC eligibility for the company.'},
{id:21,cat:'gst',diff:'med',tags:'Mergers,Slump Sale,ITC Transfer',title:'GST on Business Transfer – Slump Sale',prompt:'Analyze GST implications of business transfer through slump sale. Cover: whether slump sale is a supply under GST (Schedule II para 4 vs para 7), S. 18(3) ITC reversal/transfer, going concern exemption, state-wise registration transfer, and practical steps for GST transition in business acquisition.'},
{id:22,cat:'gst',diff:'easy',tags:'Notice,SOP,Management',title:'GST Notices Management SOP',prompt:'Design a Standard Operating Procedure for handling GST notices in a CA firm. Types: SCN S.73/74, S.61 intimation, S.50 interest, GSTR filing default, departmental audit S.65. For each: prescribed reply timeline, escalation process, documentation checklist, and delegation matrix. Include notice tracker template.'},
{id:23,cat:'gst',diff:'med',tags:'Interest,Late Fee,S.50',title:'GST Interest & Late Fee Computation',prompt:'Compute GST interest under S. 50 and late fee under S. 47 for a company that filed GSTR-3B for [month] on [late date] with net tax liability of ₹[X] and wrongly availed ITC of ₹[Y]. Provide: interest calculation (simple vs. compound debate post CBIC circular), late fee waiver notifications applicable, and net amount payable.'},
{id:24,cat:'gst',diff:'adv',tags:'Input Service Distributor,ISD',title:'Input Service Distributor – ISD vs Cross Charge',prompt:'Compare ISD (Input Service Distributor) mechanism vs. cross-charge for distribution of common input services across multiple GST registrations of the same entity. Cover: eligibility, mandatory vs. optional, method of distribution (turnover ratio), invoice format, credit availability at recipient, and recommendation with practical considerations.'},
{id:25,cat:'gst',diff:'med',tags:'Annual Return,Form,GSTR-9',title:'GST Annual Return Filing Strategy',prompt:'Develop a comprehensive strategy for GSTR-9 and GSTR-9C filing for a company with complex transactions: multiple GSTINs, import of services (RCM), exports, job work, and credit notes spanning two financial years. Create a step-by-step filing plan with responsibility matrix and internal deadline schedule.'},

// ═══ INCOME TAX ═══
{id:26,cat:'it',diff:'easy',tags:'S.143(1),Intimation,Reply',title:'S. 143(1) Intimation Reply',prompt:'Draft a formal reply to Income Tax intimation under S. 143(1) for disallowance of S. 80C deduction. Assessee is salaried, deduction is valid with LIC premium receipt and ELSS statement available. Request rectification under S. 154 with specific grounds and documentation list.'},
{id:27,cat:'it',diff:'med',tags:'ITR-3,Checklist,F&O',title:'ITR Filing Checklist – Business + F&O Income',prompt:'Generate a detailed checklist for filing ITR-3 for an individual with professional income, F&O trading loss, rental income, and foreign bank account. Include: documents required, disclosures needed (Schedule FA, AL), common mistakes to avoid, new regime vs. old regime analysis, and due dates.'},
{id:28,cat:'it',diff:'med',tags:'Capital Gains,LTCG,STCG',title:'Capital Gains Tax Computation',prompt:'Calculate capital gains tax for the following transactions: [list shares/property with purchase date, cost, sale date, price]. Classify as STCG or LTCG, apply indexation where relevant, compute tax liability, suggest tax-saving options under S. 54, 54EC, 54F, and prepare a summary worksheet.'},
{id:29,cat:'it',diff:'adv',tags:'HNI,Tax Planning,Chapter VI-A',title:'Comprehensive Tax Planning – HNI Client',prompt:'Prepare a tax planning note for an HNI with salary ₹85 lakh, business income ₹40 lakh, and capital gains ₹12 lakh. Cover: all Chapter VI-A deductions, investment suggestions, tax deferral strategies, new vs. old regime comparison, advance tax schedule, and a one-page summary suitable for client presentation.'},
{id:30,cat:'it',diff:'med',tags:'TDS,Compliance,Section 194',title:'TDS Compliance Master Guide',prompt:'Create a monthly TDS compliance checklist for a company with 50 employees and 100+ vendor payments. Cover sections 192, 194C, 194J, 194I, 194Q. For each: threshold limit, applicable rate, due date for deposit, quarterly return due date (Form 26Q/27Q), TDS certificate due dates, and consequences of default including interest and penalty.'},
{id:31,cat:'it',diff:'adv',tags:'S.148,Reassessment,Reopening',title:'Reply to S. 148 Reassessment Notice',prompt:'Draft a reply to an Income Tax notice under S. 148 (reopening of assessment) for AY [year]. Original assessment was correctly made with no escaped income. Include: legal arguments against reopening, limitation period challenge, HC/SC judgements on change of opinion vs. tangible material, and request to drop proceedings.'},
{id:32,cat:'it',diff:'med',tags:'15CA,15CB,DTAA,Remittance',title:'Form 15CA/15CB Advisory',prompt:'Advise a client on Form 15CA and 15CB requirements for remittance of ₹20 lakh to a software vendor in the USA. Determine: TDS applicability, DTAA benefit under India-US treaty (Article 12 royalties vs. business income), documents needed (TRC, Form 10F), process for submission on IT portal, and penalty for non-filing.'},
{id:33,cat:'it',diff:'med',tags:'Presumptive,44AD,44ADA',title:'Presumptive Taxation Eligibility Analysis',prompt:'Analyze eligibility for presumptive taxation under S. 44AD/44ADA/44AE for FY [year]. Client details: [describe]. If eligible: compute deemed profit, compare with actual profit, recommend scheme, highlight opting-out consequences (normal assessment for 5 years), and prepare a comparison note.'},
{id:34,cat:'it',diff:'easy',tags:'Old Regime,New Regime,Slab',title:'New vs Old Tax Regime Comparison',prompt:'Compare old vs new tax regime for a salaried employee with CTC ₹18 lakh. Include all deductions (standard, HRA, LTA, 80C, 80D, 80CCD), show tax liability under both regimes, breakeven point analysis, regime change procedure, and recommendation with specific reasoning suitable for employee communication.'},
{id:35,cat:'it',diff:'med',tags:'Advance Tax,234B,234C',title:'Advance Tax Computation & Interest',prompt:'Compute advance tax installments for AY [year] for a professional with estimated income ₹35 lakh. Show: installment-wise computation (15%, 45%, 75%, 100% by June/Sept/Dec/March), TDS credit adjustment, interest under S. 234B & 234C if installments are missed, and payment challan details with bank authorization codes.'},
{id:36,cat:'it',diff:'adv',tags:'S.263,PCIT,Revision',title:'Reply to S. 263 Revision by PCIT',prompt:'Draft a reply to a show cause notice under S. 263 proposing revision of assessment as erroneous and prejudicial to revenue. Dispute: depreciation claim on goodwill. Include: legal position post Finance Act 2021 amendments, analysis of S. 32(1)(ii) deletion, SC judgements, and arguments against revision jurisdiction.'},
{id:37,cat:'it',diff:'adv',tags:'Search,Seizure,S.132,S.153A',title:'Search & Seizure Advisory – S. 132',prompt:'Advise a client whose premises have been searched under S. 132. Cover: rights of assessee during search, documents that can be seized, statement under S. 132(4) and retraction process, response to subsequent S. 153A notice, assessment strategy, and what disclosures to make voluntarily vs. resist.'},
{id:38,cat:'it',diff:'med',tags:'Charitable Trust,12A,80G',title:'Charitable Trust Registration – 12A & 80G',prompt:'Guide a newly registered charitable trust through registration under S. 12A and approval under S. 80G. Include: Form 10A online application, documents required, objects clause drafting, AO scrutiny process, conditions for maintaining registration, annual compliance (Form 10B/10BB), corpus donation rules, and S. 12AB renewal.'},
{id:39,cat:'it',diff:'med',tags:'VDA,Crypto,S.115BBH',title:'Virtual Digital Assets (Crypto) Tax',prompt:'Explain tax treatment of Virtual Digital Assets for FY [year]. Cover: 30% flat tax under S. 115BBH, TDS under S. 194S (1%), no set-off of VDA losses against other income, gift of VDA (S. 56(2)(x)), mining income treatment, NFT taxation, reporting in ITR (Schedule VDA), and advisory for a crypto investor client.'},
{id:40,cat:'it',diff:'adv',tags:'POEM,Foreign Company,Resident',title:'POEM – Place of Effective Management',prompt:'Advise a foreign company on POEM rules for India tax residency. Key facts: board meets in India 3 times/year, CFO and CEO are India-based, strategic decisions made in India. Apply CBDT POEM guidelines (Circular 6/2017), assess residential status risk, compute Indian tax exposure, and suggest restructuring to mitigate POEM.'},
{id:41,cat:'it',diff:'med',tags:'S.56(2)(x),Gift Tax,Fair Market Value',title:'Gift Tax – S. 56(2)(x) Analysis',prompt:'Analyze S. 56(2)(x) for: (1) gift of shares worth ₹8 lakh from a non-relative, (2) property purchased below stamp value by ₹3 lakh from builder, (3) money received on marriage occasion. Determine taxability, exempt amounts, thresholds, and reporting requirements in ITR for each transaction.'},
{id:42,cat:'it',diff:'med',tags:'Faceless Assessment,S.144B',title:'Faceless Assessment – Response Strategy',prompt:'Guide through faceless assessment under S. 144B for AY [year]. Dispute: large cash deposits during demonetization. Cover: response timeline, documents to upload, request for personal hearing (conditions), draft response to AI-generated questionnaire, objection to draft assessment order, and appeal strategy if unfavorable.'},
{id:43,cat:'it',diff:'adv',tags:'Black Money,Foreign Assets,BMA',title:'Black Money Act Compliance',prompt:'Advise a client with undisclosed foreign income/assets on compliance under the Black Money Act 2015. Cover: disclosure requirements, 30% tax + 90% penalty, compounding application, prosecution risk, PMLA interplay, bank account disclosure in ITR (Schedule FA), and voluntary compliance vs. risk of detection strategy.'},
{id:44,cat:'it',diff:'med',tags:'TCS,S.206C,Remittance',title:'TCS Compliance Guide – S. 206C',prompt:'Create a TCS compliance guide for dealer selling motor vehicles, scrap, and overseas remittances. Cover: applicable transactions and rates under S. 206C, LRS remittance TCS under S. 206C(1G) (20% for non-business), threshold limits, Form 27EQ filing, TCS certificate (Form 27D), and reconciliation with income tax returns.'},
{id:45,cat:'it',diff:'med',tags:'House Property,HRA,Self-Occupied',title:'House Property Income Computation',prompt:'Compute income from house property for FY [year]: (1) self-occupied with home loan interest ₹2.8 lakh, (2) let-out property (rent ₹18,000/month, municipal tax ₹12,000, loan interest ₹1.5 lakh), (3) deemed let-out second home. Show: NAV computation, 30% standard deduction, net income, and set-off rules.'},
{id:46,cat:'it',diff:'adv',tags:'MAT,S.115JB,Book Profit',title:'MAT Computation – S. 115JB',prompt:'Compute Minimum Alternate Tax (MAT) under S. 115JB for a company with net profit ₹10 crore (after various deductions). Steps: compute book profit (adjustments as per S. 115JB Explanation), apply MAT rate (15% + surcharge + cess), compare with normal tax, compute MAT credit carried forward, and deferred tax impact.'},
{id:47,cat:'it',diff:'easy',tags:'ITR,Defective,S.139(9)',title:'Defective Return Notice – S. 139(9) Reply',prompt:'Draft a reply to defective return notice under S. 139(9) for: (1) tax audit report not filed, (2) balance sheet not attached, (3) turnover mismatch with Form 26AS. Provide correction steps, revised return filing guidance, written response format, and deadline extension request if correction cannot be made in 15 days.'},
{id:48,cat:'it',diff:'med',tags:'Angel Tax,S.56(2)(viib),Startup',title:'Angel Tax – S. 56(2)(viib) Advisory',prompt:'Advise a startup receiving angel investment ₹2 crore (valuation ₹8 crore) where FMV by DCF is ₹6 crore. Analyze: S. 56(2)(viib) applicability, premium taxable, DPIIT exemption conditions (Form 2), eligible categories of investors, strategies to mitigate angel tax, and recent CBDT notifications on startup exemptions.'},
{id:49,cat:'it',diff:'med',tags:'Foreign Tax Credit,Form 67,NRI',title:'Foreign Tax Credit – Form 67 Filing',prompt:'Guide an NRI returning to India on claiming foreign tax credit for taxes paid in the USA on US-source income. Cover: Form 67 filing (before ITR due date), documents required (tax payment proof, US return copy), doubly taxed income definition, credit computation, and when credit can be denied under DTAA.'},
{id:50,cat:'it',diff:'med',tags:'80-IAC,Startup,Tax Holiday',title:'Section 80-IAC Tax Holiday for Startups',prompt:'Prepare an application note for a startup seeking 80-IAC deduction (100% profit deduction for 3/10 years). Cover: DPIIT recognition prerequisite, eligible business conditions, turnover limit (₹100 crore), applicable AYs, Form 10CCB requirement, conditions to maintain eligibility, and impact of restructuring on the exemption.'},

// ═══ AUDIT ═══
{id:51,cat:'audit',diff:'med',tags:'Opening,Checklist,SA 300',title:'Statutory Audit Opening Checklist',prompt:'Generate a comprehensive statutory audit opening checklist for a private limited manufacturing company with turnover ₹25 crore. Include: engagement letter, prior year file review, understanding of business (ICS), key risk identification, materiality determination, audit program per SA 300, and team assignment matrix.'},
{id:52,cat:'audit',diff:'med',tags:'Bank Reconciliation,Red Flags,Fraud',title:'Bank Reconciliation Anomaly Detector',prompt:'Review a bank reconciliation statement. Identify: entries outstanding >90 days, unusual reconciling items, round figure entries, reversed entries, entries on weekends/holidays, and potential fraud indicators. Provide a risk-ranked list of findings with recommended follow-up audit procedures for each.'},
{id:53,cat:'audit',diff:'med',tags:'Related Party,AS 18,Ind AS 24,Disclosure',title:'Related Party Transaction Review',prompt:'Analyze related party transactions for compliance with AS 18/Ind AS 24. Identify: transactions requiring disclosure, arm\'s length pricing issues, transactions needing board/shareholder approval under Companies Act, RPT committee approval requirements (listed companies), and draft the full disclosure note for financial statements.'},
{id:54,cat:'audit',diff:'adv',tags:'Qualification,SA 705,Opinion',title:'Qualified Audit Opinion Drafting',prompt:'Draft a qualified audit opinion where inventory valuation is not per AS 2 (FIFO used instead of weighted average), impact estimated ₹[X] lakh. Follow SA 705 format: basis for qualification paragraph, qualified opinion paragraph, and if applicable, key audit matter disclosure for listed companies.'},
{id:55,cat:'audit',diff:'med',tags:'Internal Control,Deficiency,SA 265',title:'Internal Control Deficiency Report',prompt:'Based on internal audit findings, draft an Internal Control Deficiency Report per SA 265. Classify each finding as: Material Weakness, Significant Deficiency, or Control Deficiency. For each: describe deficiency, potential impact, root cause analysis, and recommendation. Format for board/audit committee presentation.'},
{id:56,cat:'audit',diff:'med',tags:'Stock Audit,Inventory,Physical Verification',title:'Stock Audit Observation Report',prompt:'Draft a formal Stock Audit Report for a trading company. Cover: methodology, scope, physical count findings vs. book stock, value of discrepancies, slow-moving/dead stock identification, storage condition observations, and recommendations to strengthen inventory management and internal controls.'},
{id:57,cat:'audit',diff:'adv',tags:'Forensic,Fraud,Red Flags',title:'Forensic Audit Red Flag Checklist',prompt:'Generate a forensic audit red flag checklist for detecting financial fraud. Cover: revenue manipulation (round-tripping, bill-and-hold), expense padding (personal expenses, fictitious vendors), payroll fraud, cash pilferage, related party misuse, and asset misappropriation. For each type: 5 red flags, Beneish M-Score indicators, and audit procedures.'},
{id:58,cat:'audit',diff:'adv',tags:'CARO 2020,Reporting',title:'CARO 2020 – Clause-wise Reporting',prompt:'Prepare a CARO 2020 report for a private limited company (not exempt) for FY [year]. Draft all applicable clause reportings: fixed assets, inventory, loans granted, deposits, statutory dues, audit trail in software, fraud reporting, undisclosed income, and ratios. Use precise CARO 2020 statutory language throughout.'},
{id:59,cat:'audit',diff:'med',tags:'Concurrent Audit,Bank',title:'Concurrent Audit Program – Bank Branch',prompt:'Design a concurrent audit program for a bank branch with loan portfolio ₹200 crore. Include: daily cash verification, KYC compliance testing, loan disbursement verification, NPA identification, interest application checking, forex transaction review, and format for monthly concurrent audit report with findings matrix.'},
{id:60,cat:'audit',diff:'adv',tags:'Ind AS,First-time Adoption,Transition',title:'Ind AS First-Time Adoption Checklist',prompt:'Create a first-time Ind AS adoption checklist for transition from IGAAP. Cover: opening balance sheet adjustments, key differences (Ind AS 116 leases, Ind AS 109 financial instruments, Ind AS 115 revenue), impact on deferred tax, mandatory exceptions, optional exemptions, and disclosures required in the first Ind AS financial statements.'},
{id:61,cat:'audit',diff:'adv',tags:'Going Concern,SA 570',title:'Going Concern Assessment – SA 570',prompt:'Draft a going concern assessment note for a company with 3 consecutive years of net losses and working capital deficit. Apply SA 570 framework: identify events/conditions raising doubt, evaluate management plans (cost-cutting, refinancing, asset sale), conclude on going concern, and draft appropriate disclosure/modification to audit report.'},
{id:62,cat:'audit',diff:'adv',tags:'Revenue,Ind AS 115,Audit Procedures',title:'Revenue Recognition Audit Procedures – Ind AS 115',prompt:'Design specific audit procedures to test revenue recognition under Ind AS 115 for a software company with SaaS subscriptions, implementation projects (POC), and annual maintenance contracts. Cover: 5-step model testing, risk of cut-off manipulation, sample size, documentation, and management override risk.'},
{id:63,cat:'audit',diff:'adv',tags:'Impairment,Ind AS 36,DCF',title:'Asset Impairment Testing – Ind AS 36',prompt:'Guide through impairment testing of a manufacturing plant under Ind AS 36. Plant cost ₹15 crore, WDV ₹9 crore, impairment indicators present. Compute: value in use (DCF approach), fair value less cost to sell, recoverable amount, impairment loss, reversal conditions, and prepare disclosure note for financial statements.'},
{id:64,cat:'audit',diff:'easy',tags:'Emphasis of Matter,SA 706',title:'Emphasis of Matter Paragraph – SA 706',prompt:'Draft an Emphasis of Matter paragraph for an audit report where: (1) significant uncertainty from major litigation (₹5 crore claim), and (2) company has restated prior year financial statements. Follow SA 706 format ensuring it does not modify the audit opinion and appears after the opinion paragraph.'},
{id:65,cat:'audit',diff:'adv',tags:'NPA,Bank Audit,Provisioning,LFAR',title:'NPA Audit Procedures – Banking',prompt:'Design audit procedures for verification of NPAs in a cooperative bank. Cover: asset classification (Standard/Sub-standard/Doubtful/Loss per RBI norms), income recognition, provisioning adequacy, recovery prospect assessment, documentation review, restructuring eligibility, and reporting in LFAR with illustrative observations.'},
{id:66,cat:'audit',diff:'med',tags:'Limited Review,SA 2410,Listed',title:'Limited Review Report – Listed Company Q Results',prompt:'Draft a Limited Review Report for a listed company\'s quarterly financial results under SEBI LODR. Follow SA 2410 standards. Cover: scope, procedures performed (analytical review, management inquiry), basis of review, conclusion paragraph (negative assurance), and additional SEBI-specific reporting requirements.'},

// ═══ COMPANY LAW ═══
{id:67,cat:'corp',diff:'easy',tags:'Board Resolution,Minutes',title:'Board Resolution – Multiple Items',prompt:'Draft Board Resolutions for a private limited company for: (1) appointment of new director, (2) authorization to open bank account, (3) approval of annual financial statements, (4) authorization for ITR filing, (5) GST LUT filing. Include proper recitals, resolved clauses, and signing requirements per Companies Act 2013.'},
{id:68,cat:'corp',diff:'med',tags:'Compliance Calendar,Annual,ROC',title:'Annual Compliance Calendar – Pvt Ltd',prompt:'Create a month-wise annual compliance calendar for a private limited company (non-MSME, non-listed) for FY [year]. Include: all ROC filings (ADT-1, MGT-7A, AOC-4, DIR-3 KYC, BEN-2), board meeting requirements, AGM date, statutory audit deadline, income tax due dates, and MCA late fees structure.'},
{id:69,cat:'corp',diff:'med',tags:'MOA,AOA,Amendment,S.61',title:'MOA/AOA Amendment Procedure',prompt:'Advise on process for amending MOA to add new business activity (e-commerce/fintech). Cover: special resolution requirement under S. 13, Form MGT-14 filing, Form INC-27, RoC approval timeline, fees, any government approvals needed, and draft the resolution language with new objects clause.'},
{id:70,cat:'corp',diff:'med',tags:'Director,DIN,Disqualification,S.164',title:'Director Disqualification – S. 164 Analysis',prompt:'Explain provisions for director disqualification under S. 164 Companies Act 2013. List all triggering events, DIN status check process on MCA portal, remedy under S. 164(2) (filing overdue returns within 3 months), NCLT appeal options, and how to handle a client whose director appears on disqualified list with practical steps.'},
{id:71,cat:'corp',diff:'med',tags:'Strike Off,STK-2,Winding Up',title:'Strike Off vs Winding Up Advisory',prompt:'Compare voluntary strike off (Form STK-2) vs. winding up under Companies Act 2013. Cover: eligibility conditions for each, documents required, timeline, cost, creditor treatment, pending litigation impact, tax clearance requirements, and recommendation for: (1) a dormant company, (2) a company with minor liabilities.'},
{id:72,cat:'corp',diff:'easy',tags:'MSME,Udyam,Benefits',title:'MSME Registration & Benefits',prompt:'Summarize Udyam MSME registration process, current classification criteria (investment + turnover), benefits available (45-day payment rule under MSMED Act, priority sector lending, CGTMSE, government tender preferences, credit guarantee), and advise on managing classification when turnover approaches upgrade threshold.'},
{id:73,cat:'corp',diff:'med',tags:'LLP,Formation,Agreement',title:'LLP Formation & Compliance Guide',prompt:'Guide through LLP formation for 3 professionals. Cover: name availability (RUN-LLP), Form FiLLiP, LLP Agreement drafting (capital, profit sharing, management rights, admission/retirement), post-incorporation (Form 3, Form 4), annual filings (Form 8 by Oct 30, Form 11 by May 30), audit applicability, and conversion options.'},
{id:74,cat:'corp',diff:'med',tags:'CSR,Schedule VII,Companies Act',title:'CSR Policy & Annual Compliance',prompt:'Draft a CSR Policy for a company with net profit ₹12 crore (CSR obligation ₹24 lakh). Include: CSR committee composition, eligible activities (Schedule VII), implementing modes, board approval process, monitoring framework, annual CSR report format for Board Report, MCA-21 filing, and treatment of unspent amount (S.135(6) account).'},
{id:75,cat:'corp',diff:'med',tags:'Share Transfer,SH-4,Register',title:'Share Transfer – Complete Procedure',prompt:'Explain the complete share transfer process in a private limited company: articles pre-emption rights, board approval requirement, Form SH-4 execution, stamp duty (0.25% of consideration), updating share register, issuing new share certificate, filing Form MGT-6 if applicable, and timeline of the entire process.'},
{id:76,cat:'corp',diff:'med',tags:'Rights Issue,S.62,Allotment',title:'Rights Issue Procedure – Private Company',prompt:'Draft the complete procedure for a rights issue under S. 62 of Companies Act. Include: board resolution, offer letter format, 15-day acceptance window, renunciation rights, allotment board resolution, Form PAS-3 filing within 30 days, updating share capital, stamp duty, and share certificate issuance.'},
{id:77,cat:'corp',diff:'adv',tags:'S.185,S.186,Loans,Investments',title:'Section 185/186 – Loan & Investment Analysis',prompt:'Analyze S. 185 (loans to directors) and S. 186 (company loans/investments) for inter-company loan to subsidiary. Cover: S. 185 exemptions (wholly-owned subsidiary), S. 186 limits (60% of paid-up + free reserves or 100% of free reserves), board/shareholder approval requirements, interest rate (bank rate + 2%), and ROC filing.'},
{id:78,cat:'corp',diff:'adv',tags:'Amalgamation,Merger,NCLT,S.230',title:'Amalgamation Process – NCLT Route',prompt:'Guide through amalgamation of two private companies under S. 230-232 of Companies Act. Cover: scheme preparation, board approval, application to NCLT, creditor/shareholder meeting, NCLT order, ROC intimation, stamp duty, tax implications (S. 72A carry-forward of loss), effective date, and post-merger integration compliance.'},

// ═══ FEMA & RBI ═══
{id:79,cat:'fema',diff:'med',tags:'FDI,FC-GPR,FIRMS',title:'FDI Compliance Checklist',prompt:'Generate an FDI compliance checklist for a startup receiving USD 2 million investment under automatic route (IT sector). Cover: FC-GPR filing timeline (30 days from allotment), KYC documents, valuation certificate requirement (DCF method), FIRC, shareholder agreement review, RBI FIRMS portal reporting, and prohibited activities.'},
{id:80,cat:'fema',diff:'adv',tags:'Contravention,Compounding,RBI',title:'FEMA Contravention Compounding',prompt:'Draft a compounding application for FEMA contravention before RBI. Contravention: delay in FC-GPR filing by [X months]. Include: description of contravention, reason for delay, amount involved, calculation of late submission fee, undertaking for future compliance, and supporting documents required by RBI for compounding.'},
{id:81,cat:'fema',diff:'adv',tags:'ECB,External Commercial Borrowing',title:'ECB Compliance Advisory',prompt:'Advise on ECB compliance for a manufacturing company borrowing USD 5 million from foreign parent. Cover: eligible borrower/lender, minimum average maturity period, all-in-cost ceiling (SOFR + spread), end-use restrictions (not for real estate/capital market), LRN number, Form ECB filing, and hedging requirements.'},
{id:82,cat:'fema',diff:'adv',tags:'ODI,Overseas Investment,APR',title:'Overseas Direct Investment (ODI) Note',prompt:'Compliance note for ODI by Indian company setting up WOS in Singapore. Cover: automatic route conditions, Form ODI filing (FIRMS portal), annual performance report (APR by Dec 31), financial commitment limits (400% of net worth), prohibited activities in ODI, guarantee reporting, and disinvestment compliance.'},
{id:83,cat:'fema',diff:'med',tags:'NRI,RNOR,NRE,NRO',title:'NRI Tax & FEMA Status – Return to India',prompt:'Advise an NRI returning to India on interplay between Income Tax residency (RNOR status for 3 years) and FEMA residential status. Cover: when NRI status changes under FEMA, NRE/NRO/FCNR account handling, permissible transactions, $1 million/year repatriation from NRO, investment restrictions, and checklist for year of return.'},
{id:84,cat:'fema',diff:'adv',tags:'Gift,Inheritance,Cross-Border',title:'Cross-Border Gift & Inheritance – FEMA',prompt:'Analyze FEMA implications for: (1) Indian resident gifting foreign shares to son in USA, (2) NRI inheriting India immovable property from Indian resident parent, (3) Indian resident receiving foreign currency gift from NRI relative. For each: permissibility, RBI approvals needed, tax treatment, and repatriation options.'},

// ═══ TRANSFER PRICING ═══
{id:85,cat:'tp',diff:'adv',tags:'Documentation,Master File,Local File,3CEB',title:'TP Documentation – Master & Local File',prompt:'Guide preparation of Transfer Pricing documentation (Master File and Local File) for an Indian subsidiary of a US MNC with international transactions ₹50 crore. Cover: Form 3CEB requirements, documentation threshold, content of master file (global value chain, CbCR summary), local file (benchmarking), and filing due dates.'},
{id:86,cat:'tp',diff:'adv',tags:'TNMM,Benchmarking,Comparable',title:'Benchmarking Analysis – TNMM Method',prompt:'Perform benchmarking analysis using TNMM for an IT services company providing software development services to its parent. Identify comparable companies (ORBIS/Capitaline database search criteria), PLI selection (OP/Revenue), interquartile range computation, adjustment for working capital differences, and conclusion on arm\'s length range.'},
{id:87,cat:'tp',diff:'adv',tags:'TPO,S.92CA,Addition,Dispute',title:'Transfer Pricing Audit Notice Reply',prompt:'Draft a response to Transfer Pricing Officer notice proposing addition of ₹[X] crore for AY [year] on undercharging for management services received from foreign parent. Include: justification for management fee charged, benefit test analysis, cost pool breakdown, OECD guidelines on intra-group services, and request for comparability adjustments.'},
{id:88,cat:'tp',diff:'adv',tags:'APA,Advance Pricing Agreement',title:'Advance Pricing Agreement Process',prompt:'Explain the Unilateral APA process in India. Cover: pre-filing consultation, Form 3CED preparation, information to be submitted (functional analysis, benchmarking), CBDT negotiation timeline, agreement validity (5 years), rollback provisions (4 years), APA MAP comparison, and cost-benefit analysis for your client.'},
{id:89,cat:'tp',diff:'adv',tags:'CbCR,Country-by-Country,Form 3CEAD',title:'Country-by-Country Reporting (CbCR)',prompt:'Guide an MNC group (consolidated revenue >₹5,500 crore) on CbCR obligations. Cover: Form 3CEAD content requirements (revenue, profit, tax paid, employees per jurisdiction), Form 3CEAC notification, constituent vs. reporting entity, filing deadline (12 months after year-end), and penalty for non-compliance under S. 271GB.'},
{id:90,cat:'tp',diff:'adv',tags:'Intra-group Loan,CUP,Interest Rate',title:'Related Party Loan – Arm\'s Length Rate',prompt:'Analyze arm\'s length rate for a loan by Indian company to overseas subsidiary. Loan: USD 5 million for 3 years. Apply: CUP method (comparable uncontrolled price using bank lending rates), credit rating analysis of borrower, guarantee fee if parent guarantees, and document the arm\'s length interest rate with TP supporting.'},

// ═══ VALUATION ═══
{id:91,cat:'val',diff:'adv',tags:'DCF,Enterprise Value,WACC',title:'DCF Valuation – Manufacturing Company',prompt:'Perform a DCF valuation. Revenue ₹20 crore (growing 12% p.a.), EBITDA margin 18%, capex ₹1 crore/year, working capital 20% of revenue, WACC 14%, terminal growth 4%. Compute: FCF for 5 years, terminal value (Gordon Growth Model), enterprise value, net debt adjustment, equity value, and value per share (500 shares outstanding).'},
{id:92,cat:'val',diff:'adv',tags:'Comparable Companies,EV/EBITDA,Multiples',title:'Comparable Companies Analysis – SaaS',prompt:'Perform comparable companies analysis for a B2B SaaS company at Series B. Find 5 listed comparable companies (NSE/BSE or global), compute their EV/Revenue and EV/EBITDA multiples, apply private company discount (20-30%), arrive at a valuation range, and prepare a one-page valuation summary with methodology disclosure.'},
{id:93,cat:'val',diff:'med',tags:'Rule 11UA,Unquoted Shares,NAV',title:'Fair Value of Unquoted Shares – Rule 11UA',prompt:'Compute fair value of unquoted equity shares per Rule 11UA for gift tax / S. 56(2)(x) purposes. Balance sheet data: [insert]. Apply Book Value Method (Rule 11UA(1)(c)(b)), steps to compute adjusted NAV per share, treatment of preference shares, debentures, and contingent liabilities, and certification language for CA certificate.'},
{id:94,cat:'val',diff:'adv',tags:'PPA,Purchase Price Allocation,Goodwill',title:'Purchase Price Allocation (PPA)',prompt:'Guide through PPA for acquisition of a software company for ₹50 crore (book value ₹12 crore). Identify intangible assets (customer relationships, technology IP, brand, non-competes), valuation method for each (relief from royalty, MPEEM), estimated useful life, deferred tax impact on fair values, and residual goodwill computation.'},
{id:95,cat:'val',diff:'adv',tags:'ESOP,Black-Scholes,Ind AS 102',title:'ESOP Fair Value – Black-Scholes Model',prompt:'Compute ESOP fair value for grant price determination using Black-Scholes model for a private company. Inputs: share price (DCF/book value), exercise price, option term (4 years), risk-free rate (G-Sec yield), expected volatility (use comparable listed company proxy). Compute: option fair value, total ESOP expense, and Ind AS 102 accounting journal entries.'},
{id:96,cat:'val',diff:'adv',tags:'Brand Valuation,Relief from Royalty',title:'Brand Valuation – Relief from Royalty Method',prompt:'Perform brand valuation using Relief from Royalty Method for an FMCG brand. Revenue attributable to brand: ₹30 crore. Royalty rate benchmarking: 3-5% based on industry comparables. Apply: royalty rate selection, pre-tax royalty, tax shield, present value of royalty savings, terminal value, and prepare a 2-page brand valuation note.'},
{id:97,cat:'val',diff:'med',tags:'Real Estate,Registered Valuer,Income Approach',title:'Real Estate Valuation Report',prompt:'Prepare a structured valuation report for a commercial property (8,000 sq ft). Use: Income Capitalization Approach (rent ₹80/sq ft/month, cap rate 8%), Comparable Sales Approach (recent transactions), and Cost Approach (replacement cost less depreciation). Reconcile values, state final certified value, and include limiting conditions.'},

// ═══ IBC ═══
{id:98,cat:'ibc',diff:'adv',tags:'CIRP,S.7,Financial Creditor,Petition',title:'Corporate Insolvency Petition – S. 7',prompt:'Advise a financial creditor (bank with ₹15 crore NPA) on filing a corporate insolvency petition under S. 7 IBC 2016. Cover: minimum threshold (₹1 crore), Form 1 preparation, evidence of default, NCLT jurisdiction, CIRP timeline (180+90 days), moratorium effect under S. 14, IRP appointment, and rights during CIRP.'},
{id:99,cat:'ibc',diff:'adv',tags:'Resolution Professional,RP,Duties,IBBI',title:'Resolution Professional – Duties Checklist',prompt:'Generate a comprehensive duties checklist for an Insolvency Professional acting as RP under IBC. Cover: public announcement (Form A), claims collection and verification, management takeover, information memorandum preparation, CoC meeting conduct (quorum, voting thresholds), interim finance, and resolution plan evaluation criteria per S. 30.'},
{id:100,cat:'ibc',diff:'med',tags:'Proof of Claim,Form C,Financial Creditor',title:'Proof of Claim – Financial Creditor',prompt:'Draft a Proof of Claim (Form C) for a bank with outstanding ₹8 crore (principal ₹6 crore + interest ₹2 crore) in a CIRP proceeding. Include: certificate of indebtedness, loan account statement extract, security details, classification as financial debt under S. 5(8), and complete document submission checklist.'},
{id:101,cat:'ibc',diff:'adv',tags:'Liquidation,S.53,Waterfall,Distribution',title:'Liquidation Waterfall – S. 53 Analysis',prompt:'Explain the liquidation process under IBC once CIRP fails. Cover: liquidator appointment, asset realization, distribution waterfall under S. 53 (IBBI regulations), workmen dues priority, secured creditor options (relinquish security vs. realize and share excess), unsecured creditor position, unclaimed dividends, and dissolution process.'},
{id:102,cat:'ibc',diff:'adv',tags:'PPIRP,Pre-Pack,MSME',title:'Pre-Packaged Insolvency (PPIRP) for MSME',prompt:'Advise an MSME company (turnover ₹280 crore) on PPIRP under IBC. Cover: current eligibility (MSMEs only), special majority approval requirement (66% financial creditors), base resolution plan, Swiss challenge mechanism, timeline advantages over CIRP (120 vs 270 days), costs, and situations where PPIRP is preferred.'},

// ═══ BANKING & FINANCE ═══
{id:103,cat:'bank',diff:'adv',tags:'Project Appraisal,Term Loan,DSCR',title:'Project Appraisal Report – Term Loan',prompt:'Prepare a project appraisal report for a green-field manufacturing unit seeking term loan ₹25 crore. Include: promoter background, industry analysis, project cost and means of finance, 7-year financial projections (P&L, cash flow, BS), DSCR calculation, sensitivity analysis, breakeven point, security offered, and risk assessment matrix.'},
{id:104,cat:'bank',diff:'easy',tags:'CIBIL,Credit Score,Analysis',title:'Credit Information Report (CIBIL) Analysis',prompt:'Analyze a CIBIL credit report for a borrower seeking ₹50 lakh home loan. Identify: score interpretation (scale 300-900), DPD history significance, credit utilization ratio, red flags (settlements, write-offs, multiple recent inquiries), and prepare a credit note summarizing suitability for loan sanction with conditions if any.'},
{id:105,cat:'bank',diff:'adv',tags:'SARFAESI,NPA,Recovery,S.13',title:'SARFAESI Action Advisory',prompt:'Advise a bank on SARFAESI Act 2002 action for recovering ₹3 crore NPA (secured loan). Cover: conditions (NPA classification, notice under S. 13(2)), 60-day demand notice content, possession of secured asset (S. 13(4)), auction process (public/private), objection handling under S. 13(3A), DRT proceedings when SARFAESI is challenged.'},
{id:106,cat:'bank',diff:'med',tags:'Working Capital,MPBF,Nayak Committee',title:'Working Capital Assessment – MPBF Method',prompt:'Assess working capital requirement for a trading company with annual turnover ₹18 crore. Compute: operating cycle (debtor + inventory - creditor days), working capital gap, bank finance eligible under Nayak Committee method (75% of current assets - current liabilities), and suggest CC/OD vs. LC/BG mix with rationale.'},
{id:107,cat:'bank',diff:'adv',tags:'Restructuring,OTS,RBI Guidelines',title:'Loan Restructuring Advisory – RBI Circular',prompt:'Advise a company with stressed loan on restructuring options under RBI guidelines. Cover: OTS (One-Time Settlement) process, MSME restructuring provisions, RBI resolution framework conditions, eligibility criteria, impact on CIBIL score, steps to initiate with bank, CA certificate requirements for restructuring, and tax treatment of debt waiver received.'},
{id:108,cat:'bank',diff:'easy',tags:'Bank Guarantee,Letter of Credit,BG,LC',title:'Bank Guarantee vs Letter of Credit',prompt:'Explain the difference between Bank Guarantee and Letter of Credit for a corporate making its first export transaction. Cover: types of BGs (performance/financial/advance payment), documentary vs. standby LC, invocation conditions, margin requirements, accounting treatment (contingent liability), and which instrument to use for: (1) advance payment security, (2) goods payment, (3) government contract.'},
{id:109,cat:'bank',diff:'med',tags:'NBFC,RBI,Compliance Calendar',title:'NBFC Compliance Calendar',prompt:'Create a quarterly compliance calendar for a Registered NBFC (non-deposit taking, non-systemically important) for FY [year]. Include: RBI returns (NBS-7, DNBS), Fair Practices Code, KYC/AML compliance, CERSAI registrations, board meeting compliance, concentration norms, IT security guidelines, and SEBI registration if applicable.'},
{id:110,cat:'bank',diff:'adv',tags:'Bond,NCDs,Fixed Income,Valuation',title:'Bond / NCD Investment Analysis',prompt:'Analyze a corporate NCD (Non-Convertible Debenture) investment for a corporate treasury. Face value ₹1 crore, coupon 9.5%, maturity 3 years, current price ₹98 lakh. Compute: yield to maturity (YTM), modified duration, convexity, credit spread vs. G-Sec, tax treatment (interest income vs. capital gain if sold before maturity), and recommendation.'},

// ═══ REAL ESTATE / RERA ═══
{id:111,cat:'rera',diff:'med',tags:'RERA,Registration,Project',title:'RERA Project Registration Checklist',prompt:'Generate a RERA project registration checklist for Maharashtra (MahaRERA). Include: documents required (land title, approvals, architect certificate, promoter disclosure), financial information to upload, escrow account requirement (70% collections), quarterly progress report obligations, and penalty provisions for non-registration.'},
{id:112,cat:'rera',diff:'med',tags:'Builder-Buyer,Agreement,Possession',title:'Builder-Buyer Agreement Analysis',prompt:'Review a builder-buyer agreement for a residential apartment. Identify: RERA compliance (registered project number), possession date, delay penalty (SBI rate + 2%), carpet vs. super built-up area disclosure, force majeure clause scope, maintenance deposit obligations, cancellation conditions, and buyer\'s RERA grievance redressal rights.'},
{id:113,cat:'rera',diff:'adv',tags:'JDA,Joint Development,TDR,Capital Gains',title:'Joint Development Agreement – Tax Analysis',prompt:'Analyze tax implications of a JDA between landowner and developer. Cover: GST on JDA (TDR/FSI supply, S. 7(1)(aa)), Income Tax on landowner (capital gain taxability - year of completion vs. execution, S. 45(5A)), stamp duty implications in your state, and optimal structuring to minimize tax for both parties.'},
{id:114,cat:'rera',diff:'med',tags:'REIT,Investment,Distribution',title:'REIT Investment Advisory',prompt:'Advise an investor on REITs in India. Cover: REIT structure (SPV holding commercial properties), SEBI REIT Regulations, listing on NSE/BSE, distribution obligation (90% of NDI), tax treatment of distributions (interest, dividend, amortization pass-through), capital gains on REIT units, leverage limits, and comparison with direct real estate investment.'},
{id:115,cat:'rera',diff:'med',tags:'Affordable Housing,80-IBA,80EEA',title:'Affordable Housing Tax Benefits',prompt:'Summarize all tax benefits for affordable housing in India: S. 80-IBA (100% profit deduction for developers), buyer\'s S. 80EEA additional interest deduction (₹1.5 lakh), GST exemption/1% on affordable housing, stamp duty concessions in various states, and conditions for claiming each benefit with verification checklist.'},

// ═══ NPO / TRUST / NGO ═══
{id:116,cat:'npo',diff:'med',tags:'Trust,Formation,12A,80G,Registration',title:'Public Charitable Trust Formation Guide',prompt:'Guide through formation of a Public Charitable Trust in Maharashtra. Cover: trust deed contents (objects, trustees, powers), registration with Sub-Registrar, PAN application, S. 12AB registration for income tax exemption, S. 80G approval for donor tax benefits, FCRA registration if foreign funds planned, and annual compliance calendar.'},
{id:117,cat:'npo',diff:'adv',tags:'FCRA,Foreign Donation,Compliance',title:'FCRA Compliance for NGO',prompt:'Create an FCRA compliance checklist for an NGO receiving foreign donations. Include: FCRA registration vs. prior permission, designated FCRA bank account (SBI main branch mandatory), Form FC-4 annual return, quarterly disclosure on FCRA website, permitted/prohibited activities, record-keeping requirements, and audit requirements under FCRA.'},
{id:118,cat:'npo',diff:'med',tags:'Section 8,Trust,Society,Comparison',title:'NPO Structure Comparison – Section 8 vs Trust vs Society',prompt:'Compare three legal forms for setting up a non-profit: Section 8 Company, Public Charitable Trust, and Registered Society. Cover: formation process, governance, tax exemptions available, FCRA eligibility, CSR funding eligibility, dissolution process, and recommendation based on objectives: [describe founder\'s specific goals and scale].'},
{id:119,cat:'npo',diff:'adv',tags:'Form 10B,Trust Audit,S.11,S.12',title:'Form 10B Audit Report – Charitable Trust',prompt:'Prepare a structured audit report under Form 10B for a charitable trust under S. 12AB. Key areas: application of income (85% minimum rule), corpus donations vs. income donations treatment, accumulation of income (Form 9A/10 filing), investment pattern compliance (S. 11(5) specified modes), business income treatment, and anonymous donation S. 115BBC.'},
{id:120,cat:'npo',diff:'med',tags:'CSR,Utilization,Report,Schedule VII',title:'CSR Fund Utilization Report Drafting',prompt:'Draft a CSR fund utilization report for a company that spent ₹45 lakh on CSR during FY [year]. Structure: activity-wise spending, implementing agency details, social impact metrics, unspent amount treatment (transfer to S. 135(6) account within 6 months), format for board report disclosure per Schedule VIII of Companies Act.'},

// ═══ CLIENT COMMUNICATION ═══
{id:121,cat:'client',diff:'easy',tags:'Engagement Letter,Retainer,Scope',title:'Engagement Letter – GST + IT Client',prompt:'Draft a professional engagement letter for a new client – private limited company in FMCG sector. Include: scope (GSTR-1, GSTR-3B, GSTR-9, GSTR-9C, ITR, TDS returns, ROC filings), professional fees (retainer + variable), exclusions, client obligations, data sharing protocol, confidentiality clause, and governing law.'},
{id:122,cat:'client',diff:'easy',tags:'Fee Revision,Rate Increase,Letter',title:'Fee Revision Letter – Existing Client',prompt:'Draft a professional fee revision letter effective from [date] with 20% increase across all compliance services. Tone: assertive yet diplomatic. Highlight: increased compliance burden (new GST provisions, updated ROC requirements), value delivered in past year, and invite a call. Include a response slip for client acknowledgment.'},
{id:123,cat:'client',diff:'easy',tags:'Payment Reminder,Outstanding,Fees',title:'Outstanding Invoice – 3-Stage Reminder',prompt:'Draft three escalating payment reminder messages for a client with outstanding professional fees ₹[amount] overdue by [days]. Message 1: friendly reminder (email). Message 2: firm notice with interest clause (email). Message 3: final notice before legal action (registered letter). Each under 150 words. Maintain professional tone.'},
{id:124,cat:'client',diff:'easy',tags:'Tax Planning,Year-End,Investment',title:'Year-End Tax Saving Advisory Email',prompt:'Draft a client advisory email for Q3/Q4 tax planning. Client is salaried with estimated tax liability ₹1.8 lakh. Suggest: 80C investments (remaining limit), 80D medical insurance, NPS S. 80CCD(1B), HRA optimization, home loan interest claim, and action deadline. Format: scannable with bold headings, under 300 words.'},
{id:125,cat:'client',diff:'easy',tags:'Welcome Kit,New Client,Onboarding',title:'New Client Welcome Kit Content',prompt:'Create content for a new client welcome kit for a CA firm. Include: firm introduction, team bios (short), services offered, compliance calendar for next 3 months, document submission checklist, client portal access guide, WhatsApp group etiquette, and FAQ section. Tone: warm, professional, builds confidence.'},
{id:126,cat:'client',diff:'easy',tags:'WhatsApp,Broadcast,ITR Reminder',title:'WhatsApp Broadcast – ITR Reminder Series',prompt:'Draft a 5-message WhatsApp broadcast series for ITR filing season (AY [year]). Message 1: Season start reminder. Message 2: Document checklist. Message 3: 2 weeks to deadline. Message 4: Last 3 days. Message 5: Post-deadline (belated return advisory). Each under 100 words. Conversational but urgent tone with emoji.'},
{id:127,cat:'client',diff:'easy',tags:'GST Rate,Client Alert,Change',title:'GST Rate Change Client Alert',prompt:'Draft a client alert for GST rate change on [product/service]. Cover: old rate, new rate, effective date, impact on invoicing, credit notes for advance received, steps they need to take, and invite questions. Under 200 words. Suitable for both email and WhatsApp. Jargon-free language.'},
{id:128,cat:'client',diff:'med',tags:'Newsletter,Year-End,Compliance',title:'Year-End Compliance Newsletter',prompt:'Draft a year-end compliance newsletter for CA firm clients (March edition). Cover: due dates for next 3 months (ITR, GST annual return, TDS, ROC), key regulatory changes effective from new FY, tax planning tips before March 31, advance tax reminder, and a partner message. Professional, scannable format.'},
{id:129,cat:'client',diff:'easy',tags:'Referral,Growth,Client Acquisition',title:'Client Referral Request Email',prompt:'Draft a professional email to 5 satisfied long-term clients requesting referrals for the CA firm\'s growing tax advisory and GST practice. Personalize for each client type (HNI, MSME, corporate). Include: specific value delivered to this client, clear ask, referral incentive (fee credit), and one easy action step.'},
{id:130,cat:'client',diff:'med',tags:'Upgrade,Advisory,CFO',title:'Service Upgrade Proposal – Advisory Retainer',prompt:'Draft a proposal to convert a compliance-only client (₹24,000/year) to a full advisory retainer at ₹96,000/year. Position as CFO-lite service. Include: scope (monthly financial review, proactive tax planning, quarterly business advisory call, regulatory updates), ROI examples, and a call-to-action for a 30-minute proposal meeting.'},
{id:131,cat:'client',diff:'med',tags:'Difficult Client,Retention,Communication',title:'Difficult Client Conversation Script',prompt:'Write a script for a CA handling a difficult situation: high-value client is unhappy with a late filing, threatening to leave. Include: how to acknowledge concern professionally without being defensive, immediate remediation offer (dedicated manager, partial fee credit), long-term service improvement commitment, and retention language that rebuilds trust.'},
{id:132,cat:'client',diff:'easy',tags:'LinkedIn,Profile,Brand',title:'LinkedIn Content – Tax Update Post',prompt:'Draft 5 LinkedIn posts for a CA\'s professional page covering: (1) a key income tax change for FY [year], (2) a GST notice handling tip, (3) a common mistake in GSTR-9 filing, (4) a startup tax planning insight, (5) a career advice post for young CAs. Each post: 150-200 words, hook opening line, 3 key takeaways, CTA.'},

// ═══ DOCUMENT DRAFTING ═══
{id:133,cat:'doc',diff:'med',tags:'Partnership Deed,CA Firm',title:'CA Firm Partnership Deed',prompt:'Draft a comprehensive partnership deed for a CA firm with 3 partners. Include: firm name, capital contribution, profit/loss sharing ratio, drawing rights, admission/retirement of partners, death/incapacitation clauses, goodwill valuation method (using 2-year average fees), dispute resolution, and dissolution conditions. Compliance with Indian Partnership Act 1932.'},
{id:134,cat:'doc',diff:'easy',tags:'NDA,Confidentiality,Onboarding',title:'NDA for Client Onboarding',prompt:'Draft a Non-Disclosure Agreement for a CA firm to use with all new clients. Cover: definition of confidential information, obligations of both parties, exclusions (publicly available info), duration (5 years), permitted disclosures (regulatory requirements), return/destruction of information on termination, and jurisdiction (Mumbai).'},
